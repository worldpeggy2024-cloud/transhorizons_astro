title_en: Critical Minerals and the Energy Transition
title_fr: Minéraux critiques et transition énergétique
subtitle_en: >-
  Analyzes how critical minerals are reshaping industrial policy, supply chains,
  and geopolitical positioning, with implications for Canada's role in emerging
  global resource systems
subtitle_fr: >-
  Analyse comment les minéraux critiques redéfinissent la politique industrielle,
  les chaînes d'approvisionnement et le positionnement géopolitique, avec des
  implications pour le rôle du Canada dans les systèmes de ressources mondiaux
  émergents
