keyTakeaways:
  - title_en: Energy Transition Dependency
    title_fr: Dépendance à la transition énergétique
    description_en: >-
      The global shift to renewable energy creates unprecedented demand for
      critical minerals, with supply chains currently concentrated in China
      and the DRC.
    description_fr: >-
      Le virage mondial vers les énergies renouvelables crée une demande sans
      précédent pour les minéraux critiques, dont les chaînes d'approvisionnement
      sont actuellement concentrées en Chine et en RDC.
  - title_en: Canadian Opportunity
    title_fr: Opportunité canadienne
    description_en: >-
      Canada has vast mineral resources, advanced technology, and stable
      governance — but must accelerate development and downstream processing
      to capture market share.
    description_fr: >-
      Le Canada dispose de vastes ressources minérales, d'une technologie
      avancée et d'une gouvernance stable — mais doit accélérer le développement
      et la transformation en aval pour capter des parts de marché.
  - title_en: Strategic Integration
    title_fr: Intégration stratégique
    description_en: >-
      Success requires coordinated action on permitting, processing
      infrastructure, Indigenous partnerships, and international supply chain
      cooperation.
    description_fr: >-
      Le succès exige une action coordonnée sur les permis, les infrastructures
      de transformation, les partenariats autochtones et la coopération
      internationale en matière de chaînes d'approvisionnement.
