    title_fr: Réalité multipolaire
    description_en: >-
      The post-Cold War unipolarity is over. Canada must adapt to a world of
      competing powers and shifting alliances.
    description_fr: >-
      L'unipolarité de l'après-Guerre froide est révolue. Le Canada doit
      s'adapter à un monde de puissances concurrentes et d'alliances mouvantes.
  - title_en: Strategic Assets
    title_fr: Atouts stratégiques
    description_en: >-
      Critical minerals, Arctic resources, and technological capacity are
      Canada's leverage points in a multipolar world.
    description_fr: >-
      Les minéraux critiques, les ressources arctiques et la capacité
      technologique constituent les leviers d'influence du Canada dans un monde
      multipolaire.
  - title_en: Integrated Strategy
    title_fr: Stratégie intégrée
    description_en: >-
      Success requires balancing North American ties, economic diversification,
      military modernization, and supply chain resilience.
    description_fr: >-
      Le succès exige d'équilibrer les liens nord-américains, la diversification
      économique, la modernisation militaire et la résilience des chaînes
      d'approvisionnement.
