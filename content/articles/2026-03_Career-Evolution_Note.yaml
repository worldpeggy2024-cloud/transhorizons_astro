title_en: From Translation Toward Research and Analysis
title_fr: De la traduction vers la recherche et l'analyse
subtitle_en: >-
  A reflection on how institutional translation became long-term training in
  research, curiosity, and analytical writing.
subtitle_fr: >-
  Une réflexion sur la manière dont la traduction institutionnelle est devenue
  une formation de longue durée à la recherche, à la curiosité et à l'écriture
  analytique.
introductionTitle_en: Key reflections
introductionTitle_fr: Réflexions clés
introduction_en: >-
  After more than two decades working as a translator—much of that time
  collaborating with Canadian federal departments such as Statistics Canada and
  Natural Resources Canada—I find myself gradually moving toward research,
  writing, and analysis.


  This transition is not the result of a sudden decision or a rejection of past
  work. Rather, it emerged slowly from an enduring curiosity: a desire to
  understand how societies interpret reality, how institutions frame
  challenges, and how knowledge contributes to collective decision-making.


  Translation placed me close to these processes for many years. Over time, the
  questions behind the texts became as compelling as the texts themselves.
introduction_fr: >-
  Après plus de deux décennies de travail en tant que traductrice — une grande
  partie de ce temps en collaboration avec des ministères fédéraux canadiens
  tels que Statistique Canada et Ressources naturelles Canada — je me retrouve
  progressivement à me tourner vers la recherche, la rédaction et l'analyse.


  Cette transition n'est pas le résultat d'une décision soudaine ou d'un rejet
  du travail passé. Elle a plutôt émergé lentement d'une curiosité persistante
  : le désir de comprendre comment les sociétés interprètent la réalité,
  comment les institutions encadrent les défis, et comment la connaissance
  contribue à la prise de décision collective.


  La traduction m'a placée près de ces processus pendant de nombreuses années.
  Au fil du temps, les questions derrière les textes sont devenues aussi
  captivantes que les textes eux-mêmes.
sections:
  - title_en: Learning Through Translation
    title_fr: Apprendre par la traduction
    content_en: >-
      Translation is often perceived as linguistic conversion. In practice, it
      involves sustained attention to meaning, context, and intention.


      Working on institutional publications meant engaging daily with public
      policy discussions, technical reporting, socioeconomic analysis, and
      governmental communication addressed to Canadians. The task required
      careful reading, verification of terminology, and constant research to
      understand unfamiliar subjects.


      Gradually, the work cultivated habits that extend beyond language:


      • investigating unfamiliar topics before writing about them

      • tracing concepts across disciplines

      • recognizing how institutions explain uncertainty and complexity

      • approaching information with patience rather than quick conclusions


      Instead of positioning translation as expertise in any single field, I
      increasingly see it as long-term training in intellectual curiosity and
      disciplined inquiry.
    content_fr: >-
      La traduction est souvent perçue comme une conversion linguistique. En
      pratique, elle implique une attention soutenue au sens, au contexte et à
      l'intention.


      Travailler sur des publications institutionnelles signifiait s'engager
      quotidiennement dans des discussions de politique publique, des rapports
      techniques, des analyses socioéconomiques et des communications
      gouvernementales adressées aux Canadiens. La tâche exigeait une lecture
      attentive, une vérification de la terminologie et une recherche constante
      pour comprendre des sujets peu familiers.


      Progressivement, le travail a cultivé des habitudes qui vont au-delà de
      la langue :


      • enquêter sur des sujets peu familiers avant d'en écrire

      • tracer des concepts à travers les disciplines

      • reconnaître comment les institutions expliquent l'incertitude et la
      complexité

      • aborder l'information avec patience plutôt que des conclusions rapides


      Au lieu de positionner la traduction comme une expertise dans un seul
      domaine, je la vois de plus en plus comme une formation à long terme en
      curiosité intellectuelle et en enquête disciplinée.
    imagePosition: right
  - title_en: A Growing Interest in Research and Understanding
    title_fr: Un intérêt croissant pour la recherche et la compréhension
    content_en: >-
      Years of collaboration with Canadian public institutions offered a
      privileged vantage point—not as a decision-maker, but as an observer
      accompanying the production of public knowledge.


      Repeated exposure to statistical analysis, resource policy discussions,
      and institutional reporting fostered a deeper interest in questions such
      as:


      • How does Canada understand itself through data?

      • How do governments balance evidence, constraints, and public
      expectations?

      • How do global developments reshape national choices?


      Extended periods spent abroad almost every year also reinforced this
      curiosity. Experiencing different societies firsthand encouraged
      comparison, reflection, and a stronger awareness of Canada's place within
      an interconnected world.


      The motivation behind my professional transition is therefore simple: to
      move closer to the processes of researching, understanding, and
      explaining rather than remaining solely in the role of linguistic
      intermediary.
    content_fr: >-
      Des années de collaboration avec des institutions publiques canadiennes
      m'ont offert un point de vue privilégié — non pas comme décideur, mais
      comme observatrice accompagnant la production de la connaissance publique.


      L'exposition répétée à l'analyse statistique, aux discussions sur la
      politique des ressources et aux rapports institutionnels a favorisé un
      intérêt plus profond pour des questions telles que :


      • Comment le Canada se comprend-il à travers les données ?

      • Comment les gouvernements équilibrent-ils les preuves, les contraintes
      et les attentes du public ?

      • Comment les développements mondiaux remodèlent-ils les choix
      nationaux ?


      Des périodes prolongées passées à l'étranger presque chaque année ont
      également renforcé cette curiosité. Vivre l'expérience de différentes
      sociétés directement a encouragé la comparaison, la réflexion et une plus
      forte conscience de la place du Canada dans un monde interconnecté.


      La motivation derrière ma transition professionnelle est donc simple : me
      rapprocher des processus de recherche, de compréhension et d'explication
      plutôt que de rester uniquement dans le rôle d'intermédiaire linguistique.
    image: /images/lighthouse-sunset.JPG
    imagePosition: left
  - title_en: From Language Work to Analytical Writing
    title_fr: Du travail linguistique à la rédaction analytique
    content_en: >-
      The shift toward analytical writing feels less like a career change than
      a gradual reorientation.


      Translation developed certain working habits that naturally support
      research environments:


      • careful reading before forming conclusions

      • respect for evidence and sources

      • comfort working with complex documentation

      • commitment to clarity when addressing non-specialist audiences


      I do not approach analysis as someone claiming authority, but as someone
      accustomed to learning continuously. The aim is to contribute thoughtful,
      well-researched perspectives grounded in careful observation.
    content_fr: >-
      Le passage vers la rédaction analytique ressemble moins à un changement de
      carrière qu'à une réorientation progressive.


      La traduction a développé certaines habitudes de travail qui soutiennent
      naturellement les environnements de recherche :


      • une lecture attentive avant de former des conclusions

      • le respect des preuves et des sources

      • le confort de travailler avec une documentation complexe

      • l'engagement envers la clarté lorsqu'on s'adresse à des publics non
      spécialisés


      Je n'aborde pas l'analyse comme quelqu'un qui prétend à l'autorité, mais
      comme quelqu'un habitué à apprendre continuellement. L'objectif est de
      contribuer des perspectives réfléchies et bien documentées fondées sur
      l'observation attentive.
    imagePosition: right
  - title_en: Institutional Experience as Context, Not Authority
    title_fr: L'expérience institutionnelle comme contexte, pas autorité
    content_en: >-
      Collaborating for many years with Canadian federal organizations provided
      familiarity with institutional culture, terminology, and communication
      practices. This experience does not confer insider status or policy
      expertise, but it offers contextual understanding of how public
      institutions operate and communicate with citizens.


      It also strengthened an appreciation for public service itself: the quiet,
      often invisible effort required to produce reliable information for
      Canadians.


      That experience contributes to my current objective—to support, even
      modestly, the production and communication of knowledge that helps society
      understand complex challenges.
    content_fr: >-
      Collaborer pendant de nombreuses années avec des organisations fédérales
      canadiennes m'a fourni une familiarité avec la culture institutionnelle,
      la terminologie et les pratiques de communication. Cette expérience ne
      confère pas un statut d'initié ou une expertise politique, mais elle
      offre une compréhension contextuelle de la façon dont les institutions
      publiques fonctionnent et communiquent avec les citoyens.


      Elle a également renforcé l'appréciation du service public lui-même :
      l'effort tranquille, souvent invisible, requis pour produire des
      informations fiables pour les Canadiens.


      Cette expérience contribue à mon objectif actuel — soutenir, même
      modestement, la production et la communication de connaissances qui aident
      la société à comprendre les défis complexes.
    imagePosition: left
  - title_en: "Motivation: Curiosity and Public Contribution"
    title_fr: "Motivation : curiosité et contribution publique"
    content_en: >-
      At the centre of this transition lies a personal motivation rather than a
      professional label.


      I am trying to move toward roles where curiosity, research, and writing
      can contribute to something larger than individual projects. My interest
      is particularly oriented toward subjects that shape Canada's future:
      global change, resources, technology, governance, and international
      dynamics.


      The ambition is not to present definitive answers, but to participate in
      collective understanding—to ask careful questions, examine evidence
      responsibly, and communicate insights accessibly.


      If this path succeeds, it will likely be through incremental
      contributions rather than dramatic change. That perspective feels
      appropriate. Public knowledge advances through many small efforts
      accumulated over time.
    content_fr: >-
      Au centre de cette transition se trouve une motivation personnelle plutôt
      qu'une étiquette professionnelle.


      Je cherche à me rapprocher de rôles où la curiosité, la recherche et la
      rédaction peuvent contribuer à quelque chose de plus grand que des projets
      individuels. Mon intérêt est particulièrement orienté vers des sujets qui
      façonnent l'avenir du Canada : le changement mondial, les ressources, la
      technologie, la gouvernance et la dynamique internationale.


      L'ambition n'est pas de présenter des réponses définitives, mais de
      participer à la compréhension collective — poser des questions
      attentives, examiner les preuves de manière responsable et communiquer les
      perspectives de manière accessible.


      Si cette voie réussit, ce sera probablement par des contributions
      progressives plutôt que par un changement dramatique. Cette perspective
      semble appropriée. La connaissance publique progresse par de nombreux
      petits efforts accumulés au fil du temps.
    image: /images/lighthouse-sunset.JPG
    imagePosition: left
  - title_en: Looking Forward
    title_fr: Vers l'avant
    content_en: >-
      Professional paths do not always follow clear boundaries. Skills
      developed in one domain sometimes reveal unexpected relevance elsewhere.


      After many years devoted to language, I am exploring how those same
      habits—careful reading, sustained research, respect for nuance, and clear
      writing—might support research institutes, public organizations, or
      analytical teams.


      The objective is modest but sincere:


      • to continue learning

      • to better understand the world and Canada's role within it

      • to contribute, in whatever capacity proves useful, to informed public
      dialogue and a constructive future
    content_fr: >-
      Les trajectoires professionnelles ne suivent pas toujours des frontières
      claires. Les compétences développées dans un domaine révèlent parfois une
      pertinence inattendue ailleurs.


      Après de nombreuses années consacrées à la langue, j'explore comment ces
      mêmes habitudes — lecture attentive, recherche soutenue, respect de la
      nuance et écriture claire — pourraient soutenir des instituts de
      recherche, des organisations publiques ou des équipes analytiques.


      L'objectif est modeste mais sincère :


      • continuer à apprendre

      • mieux comprendre le monde et la place du Canada en son sein

      • contribuer, de la manière qui s'avère utile, au dialogue public éclairé
      et à un avenir constructif
    imagePosition: right
