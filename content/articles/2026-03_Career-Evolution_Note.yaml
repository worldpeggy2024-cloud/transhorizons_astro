title_en: From Translation Toward Research and Analysis
subtitle_en: >-
  A reflection on how institutional translation became long-term training in
  research, curiosity, and analytical writing.
introductionTitle_en: Key reflections
introduction_en: >-
  After more than two decades working as a translator —much of that time
  collaborating with Canadian federal departments such as Statistics Canada and
  Natural Resources Canada— I find myself gradually moving toward research and
  analysis.


  This transition is not the result of a sudden decision or a rejection of past
  work. Rather, it emerged slowly from an enduring curiosity: a desire to
  understand how societies interpret reality, how institutions frame challenges,
  and how knowledge contributes to collective decision-making.


  Translation was never only about language. Institutional work required
  continuous engagement with policy, research, and technical systems. It also
  required understanding the ways societies organize and communicate knowledge.
title_fr: De la traduction vers la recherche et l'analyse
subtitle_fr: >-
  Réflexion sur la manière dont la traduction institutionnelle est devenue une
  formation de longue durée en matière de recherche, de curiosité et d'écriture
  analytique.
introductionTitle_fr: Réflexions clés
introduction_fr: >-
  Après plus de deux décennies d’expérience professionnelle en traduction, dont
  une grande partie en collaboration avec des ministères fédéraux canadiens
  comme Statistique Canada et Ressources naturelles Canada, je me dirige
  progressivement vers la recherche et l’analyse.


  Cette transition ne résulte pas d’une décision soudaine ni d’un rejet du
  travail accompli jusque-là. Elle s’est plutôt dessinée lentement, à partir
  d’une curiosité durable : le désir de comprendre comment les sociétés
  interprètent la réalité, comment les institutions formulent les enjeux et
  comment le savoir contribue à la prise de décision collective.


  Traduire n'a jamais été qu'un simple exercice linguistique. Travailler sur du
  contenu institutionnel exige une interaction constante avec les politiques
  publiques, la recherche, les systèmes techniques et les façons dont les
  sociétés organisent et communiquent le savoir.
sections:
  - title_en: Learning Through Translation
    title_fr: Apprendre par la traduction
    content_en: >-
      Translation is often perceived as linguistic conversion. In practice, it
      involves sustained attention to meaning, context, and intention.


      Working on institutional publications means engaging daily with public
      policy discussions, technical reporting, socioeconomic analysis, and
      governmental communication addressed to Canadians. The task requires
      careful reading, verification of terminology, and constant research to
      understand unfamiliar subjects.


      Gradually, the work cultivates habits that extend beyond language:


      • investigating unfamiliar topics before writing about them

      • tracing concepts across disciplines

      • recognizing how institutions explain uncertainty and complexity

      • approaching information with rigour and caution, rather than drawing
      hasty conclusions


      Instead of positioning translation as expertise in any single field, I
      increasingly see it as long-term training in **intellectual curiosity and
      disciplined inquiry.**
    content_fr: |-
      La traduction est souvent perçue comme une conversion linguistique. En pratique, elle exige une attention soutenue au sens, au contexte et à l'intention.

      Travailler sur des publications institutionnelles signifie un contact quotidien avec des discussions sur les politiques publiques, des rapports techniques, des analyses socioéconomiques et des communications gouvernementales destinées à la population canadienne. Cette tâche nécessite une lecture attentive, des vérifications terminologiques et une recherche constante pour comprendre des sujets inconnus.


      Peu à peu, ce travail permet de cultiver des habitudes qui dépassent le cadre de la langue :

      • étudier des sujets peu familiers avant d'écrire à leur propos
      • suivre l'évolution des concepts d'une discipline à l'autre
      • reconnaître la manière dont les institutions expliquent l'incertitude et la complexité
      • aborder l'information avec rigueur et prudence plutôt que de tirer des conclusions hâtives

      Plutôt que de considérer la traduction comme une expertise dans un domaine particulier, j'en viens de plus en plus à la considérer comme une formation de longue durée à la **curiosité intellectuelle et à l'enquête rigoureuse**.
    imagePosition: right
  - title_en: A Growing Interest in Research and Understanding
    title_fr: Intérêt croissant pour la recherche et la compréhension
    content_en: |-
      Years of collaboration with Canadian public institutions offer a privileged vantage point —not as a decision-maker, but as an observer accompanying the production of public knowledge.

      Repeated exposure to statistical analysis, resource policy discussions, and institutional reporting foster a deeper interest in questions such as:

      • How does Canada understand itself through data?
      • How do governments balance evidence, constraints, and public expectations?
      • How do global developments reshape national choices?

      Extended periods spent abroad almost every year also reinforce this curiosity. Experiencing different societies firsthand encourages comparison, reflection, and a stronger awareness of Canada's place within an interconnected world.

      The motivation behind my professional transition is therefore simple: to move closer to the processes of researching, understanding, and explaining rather than remaining solely in the role of linguistic intermediary.
    content_fr: |-
      Travailler pendant des années en collaboration avec des institutions publiques canadiennes m'offre un point de vue privilégié; non pas comme personne chargée de prendre des décisions, mais comme observatrice accompagnant la production de la connaissance publique.


      Une exposition répétée à l'analyse statistique, aux discussions sur la politique des ressources et aux rapports institutionnels favorise un intérêt plus profond pour des questions telles que :

      • Comment le Canada se comprend-il à travers les données?
      • Comment les gouvernements équilibrent-ils les données probantes, les contraintes et les attentes publiques?
      • Comment les évolutions mondiales redéfinissent-elles les choix nationaux?


      Des périodes prolongées passées à l'étranger presque chaque année renforcent également cette curiosité. L'expérience directe de différentes sociétés encourage la comparaison, la réflexion et une conscience plus aiguë de la place du Canada dans un monde interconnecté.

      La motivation derrière ma transition professionnelle est donc simple : me rapprocher des processus de recherche, de compréhension et d'explication plutôt que de demeurer uniquement dans le rôle d'intermédiaire linguistique.
    image: /images/lighthouse-sunset.JPG
    imagePosition: left
  - title_en: From Language Work to Analytical Writing
    title_fr: Du travail linguistique à la rédaction analytique
    content_en: |-
      The shift toward analytical writing feels less like a career change than a gradual reorientation.

      Translation develops certain working habits that naturally support research environments:

      • careful reading before forming conclusions
      • respect for evidence and sources
      • comfort working with complex documentation
      • commitment to clarity when addressing non-specialist audiences

      I do not approach analysis as someone claiming authority, but as someone accustomed to learning continuously. The aim is to contribute thoughtful, well-researched perspectives grounded in careful observation.
    content_fr: |-
      Cette évolution vers la rédaction analytique semble moins être un changement de carrière qu'une réorientation progressive.

      La traduction développe certaines habitudes de travail qui soutiennent naturellement les environnements de recherche :

      • une lecture attentive avant de former des conclusions;
      • le respect des données probantes et des sources;
      • savoir travailler avec une documentation complexe;
      • rechercher la clarté lorsqu'il s'agit de s'adresser à des publics non spécialistes.


      Je n’aborde pas l’analyse comme une personne revendiquant une autorité,
      mais comme quelqu’un qui a l’habitude d’apprendre en continu. L’objectif
      est de contribuer des perspectives réfléchies et solidement documentées,
      ancrées dans une observation attentive.
    imagePosition: right
  - title_en: Institutional Experience as Context, Not Authority
    title_fr: L'expérience institutionnelle comme contexte, non comme autorité
    content_en: >-
      Collaborating with Canadian federal organizations has provided familiarity
      with institutional culture, terminology, and communication practices. This
      experience does not confer insider status or policy expertise, but it
      offers contextual understanding of how public institutions operate and
      communicate with citizens.


      It also strengthens an appreciation for public service itself: the quiet,
      often invisible effort required to produce reliable information for
      Canadians.


      That experience contributes to my current objective—to support, even
      modestly, the production and communication of knowledge that helps society
      understand complex challenges.
    content_fr: >-
      La collaboration avec des organismes fédéraux canadiens m’a permis de me
      familiariser avec la culture institutionnelle, la terminologie et les
      pratiques de communication propres à ces milieux. Cette expérience ne me
      confère ni statut d’initiée ni expertise en matière de politiques
      publiques, mais elle m’offre une compréhension contextuelle du
      fonctionnement des institutions publiques et de leur façon de communiquer
      avec les citoyens.


      Elle a également renforcé mon appréciation du service public lui-même : le
      travail discret, souvent invisible, qu’exige la production d’une
      information fiable à l’intention de la population canadienne.


      Cette expérience contribue à mon objectif actuel : soutenir, même
      modestement, la production et la communication de connaissances qui aident
      la société à comprendre des enjeux complexes.
    imagePosition: left
  - title_en: 'Motivation: Curiosity and Public Contribution'
    title_fr: 'Motivation : curiosité et contribution publique'
    content_en: >-
      At the centre of this transition lies a personal motivation rather than a
      professional label.


      I am trying to move toward roles where curiosity, research, and writing
      can contribute to something larger than individual projects. My interest
      is particularly oriented toward subjects that shape Canada's future:
      global change, resources, technology, governance, and international
      dynamics.


      The ambition is not to present definitive answers, but to participate in
      collective understanding—to ask careful questions, examine evidence
      responsibly, and communicate insights accessibly.


      If this path succeeds, it will likely be through incremental contributions
      rather than dramatic change. That perspective feels appropriate. Public
      knowledge advances through many small efforts accumulated over time.
    content_fr: >-
      Au cœur de cette transition se trouve une motivation personnelle plutôt
      qu'une étiquette professionnelle.


      Je cherche à me rapprocher de rôles où la curiosité, la recherche et la
      rédaction peuvent contribuer à quelque chose qui dépasse les projets
      individuels. Mon intérêt porte particulièrement sur des sujets qui
      façonnent l’avenir du Canada : les transformations mondiales, les
      ressources, la technologie, la gouvernance et les dynamiques
      internationales.


      L'ambition n'est pas de présenter des réponses définitives, mais de
      participer à la compréhension collective : poser des questions avec
      rigueur, examiner les données de manière responsable et communiquer les
      analyses de façon accessible.


      Si cette démarche réussit, ce sera sans doute par des contributions
      progressives plutôt que par un changement spectaculaire. Cette perspective
      me semble appropriée. Le savoir public progresse grâce à de nombreux
      efforts modestes qui s’accumulent au fil du temps
    image: /images/lighthouse-sunset.JPG
    imagePosition: left
  - title_en: Looking Forward
    title_fr: Regarder vers l’avenir
    content_en: >-
      Professional paths do not always follow clear boundaries. Skills developed
      in one domain sometimes reveal unexpected relevance elsewhere.


      After many years devoted to language, I am exploring how those same
      habits—careful reading, sustained research, respect for nuance, and clear
      writing—might support research institutes, public organizations, or
      analytical teams.


      The objective is modest but sincere:


      • to continue learning

      • to better understand the world and Canada's role within it

      • to contribute, in whatever capacity proves useful, to informed public
      dialogue and a constructive future
    content_fr: >-
      Les parcours professionnels ne suivent pas toujours des frontières
      clairement tracées. Des compétences développées dans un domaine révèlent
      parfois une pertinence inattendue ailleurs.


      Après de nombreuses années consacrées à la langue, j'explore comment ces
      mêmes habitudes (lecture attentive, recherche soutenue, respect des
      nuances, clarté rédactionnelle) pourraient être mises au service
      d’instituts de recherche, d’organismes publics ou d’équipes d’analyse.


      L'objectif est modeste mais sincère :


      • continuer à apprendre;

      • mieux comprendre le monde et la place du Canada en son sein;

      • contribuer, dans la mesure où cela peut être utile, à un dialogue public
      éclairé et à un avenir constructif.
    imagePosition: right
