title_en: Canada as a Resource Civilization in the 21th century
subtitle_en: >-
  Examines how Canada's historical development as a resource-based system
  continues to shape its position within emerging global structures defined by
  energy transition, strategic materials, and geopolitical fragmentation
introductionTitle_en: A Resource Civilization
introduction_en: >
  Canada's development has long depended on the ability to organize immense and
  geographically dispersed resource spaces into export-oriented economic
  corridors connected to external industrial markets. This is not simply a
  matter of endowment. It reflects a specific political economy: one in which
  geography produced a structural logic of extraction, transport, and external
  demand that shaped institutions, infrastructure, and territorial organization
  over successive generations.


  A resource economy produces commodities. A resource civilization is organized
  around them. That distinction matters because it reframes the analytical
  question. Canada's strategic relevance is not a recent discovery. But it is
  being revalued — by the energy transition shifting demand toward
  electrification and low-carbon systems, by the growing centrality of critical
  minerals to industrial and technological supply chains, and by geopolitical
  fragmentation that is placing renewed emphasis on the reliability, proximity,
  and political alignment of supplier states.


  Understanding Canada through this lens — as a resource civilization — is the
  starting point for understanding its current position and future trajectory.
title_fr: 'Le Canada : civilisation fondée sur les ressources'
subtitle_fr: >-
  Analyse de la manière dont le développement historique du Canada en tant que
  système fondé sur les ressources continue de structurer sa position dans les
  structures mondiales émergentes définies par la transition énergétique, les
  matériaux stratégiques et la fragmentation géopolitique
introductionTitle_fr: Une civilisation fondée sur les ressources
introduction_fr: >-
  Le développement du Canada repose depuis longtemps sur la capacité à organiser
  d’immenses espaces de ressources, dispersés géographiquement, en corridors
  économiques orientés vers l’exportation et reliés à des marchés industriels
  extérieurs. Ce n’est pas qu’une question d’abondance. C’est l’expression d’une
  économie politique spécifique, dans le cadre de laquelle la géographie a
  produit une logique structurelle d’extraction, de transport et de demande
  externe qui a façonné les institutions, les infrastructures et l’organisation
  territoriale au fil des générations.


  Une économie de ressources produit des matières premières. Une civilisation
  fondée sur les ressources s’organise autour de celles-ci. Cette distinction
  est importante, car elle modifie la question analytique. La pertinence
  stratégique du Canada n’est pas une découverte récente. Elle est toutefois en
  cours de revalorisation, sous l’effet de la transition énergétique qui
  réoriente la demande vers l’électrification et les systèmes carboneutres, du
  rôle central grandissant des minéraux critiques au sein des chaînes
  d’approvisionnement industrielles et technologiques, et de la fragmentation
  géopolitique qui renforce l’importance de la fiabilité, de la proximité et de
  l’alignement politique des États fournisseurs.


  Comprendre le Canada en tant que civilisation fondée sur les ressources est le
  point de départ pour analyser sa position actuelle et sa trajectoire future.
sections:
  - title_en: Historical Formation
    title_fr: Formation historique
    content_en: >
      Prior to colonial integration, Indigenous societies across these
      territories developed resource systems grounded in localized use, seasonal
      cycles, and long-term stewardship of land and ecosystems, underpinned by
      their own governance institutions and legal orders. These systems were not
      organized around large-scale extraction or external markets, but around
      continuity, reciprocity, and balance within specific homelands, where
      responsibilities to land, water, and future generations structured how
      resources were used and shared.


      From fur and fisheries in early colonial trade, to timber and agricultural
      expansion, and later to minerals, industrial inputs, oil, gas, and
      hydroelectric power, the structural character of Canada’s resource system
      was not inherited passively. It was built — through deliberate investments
      in infrastructure, political decisions that overlaid and often disrupted
      Indigenous governance systems by binding distant regions into a shared
      colonial economic framework, and the progressive alignment of Canadian
      production with external centres of demand.


      National infrastructure projects were not merely transportation
      initiatives; they were mechanisms for integrating distant resource
      territories into a coherent export-oriented economic system. Railways
      physically connected extractive regions — timber stands, mining districts,
      agricultural plains — to continental and imperial markets, and in doing so
      they did not merely facilitate trade. They created the spatial
      architecture of the Canadian economy. The alignment of corridors, the
      positioning of ports, the routing of supply chains: these were acts of
      economic state formation as much as engineering.


      Confederation itself must be understood partly in this context. Political
      federation and infrastructure integration were deeply interconnected
      processes. The terms of Confederation bound peripheral resource-producing
      territories to a central economic framework whose logic was continental
      export, first toward British imperial demand and then, increasingly,
      toward American industrial expansion. Canada did not industrialize in
      isolation. Its economic geography was shaped by the markets it served, and
      those markets, in turn, shaped the institutions, capital patterns, and
      corridor hierarchies that persist today.
    content_fr: >-
      Avant l’intégration coloniale, les sociétés autochtones présentes sur ces
      territoires avaient développé des systèmes de ressources fondés sur
      l’usage local, les cycles saisonniers et une intendance à long terme des
      terres et des écosystèmes, portés par leurs propres institutions de
      gouvernance et ordres juridiques. Ces systèmes n’étaient pas organisés
      autour de l’extraction à grande échelle ni des marchés externes, mais
      autour de la continuité, de la réciprocité et de l’équilibre au sein de
      territoires spécifiques, où les responsabilités envers la terre, l’eau et
      les générations futures structuraient l’usage et le partage des
      ressources.


      De la fourrure et des pêches du commerce colonial précoce à l’essor du
      bois et de l’agriculture, puis aux minerais, aux intrants industriels, au
      pétrole, au gaz et à l’hydroélectricité, le caractère structurel du
      système canadien des ressources n’a pas été simplement hérité. Il a été
      construit; par des investissements d’infrastructure délibérés, par des
      décisions politiques qui ont superposé et souvent perturbé les systèmes de
      gouvernance autochtones en rattachant des régions éloignées à un cadre
      économique colonial commun, et par l’alignement progressif de la
      production canadienne sur des centres de demande externes.


      Les grands projets d’infrastructure nationale n’étaient pas de simples
      initiatives de transport; ils constituaient des mécanismes d’intégration
      de territoires d’extraction lointains dans un système économique cohérent
      orienté vers l’exportation. Les chemins de fer ont physiquement relié les
      régions d’extraction (zones forestières, districts miniers, plaines
      agricoles) aux marchés continentaux et impériaux. Ce faisant, ils n’ont
      pas seulement facilité le commerce, ils ont créé l’architecture spatiale
      de l’économie canadienne. Le tracé des corridors, le positionnement des
      ports, l’orientation des chaînes logistiques : autant d’actes de
      construction de l’État économique, autant que d’ingénierie.


      La Confédération elle‑même doit en partie être comprise sous cet angle. La
      fédération politique et l’intégration par l’infrastructure furent deux
      processus profondément liés. Les termes de la Confédération rattachaient
      des territoires périphériques exportateurs de ressources à un cadre
      économique centralisé dont la logique était l’exportation continentale,
      d’abord vers la demande impériale britannique, puis de plus en plus vers
      l’expansion industrielle états-unienne. Le Canada ne s’est pas
      industrialisé en vase clos. Sa géographie économique a été façonnée par
      les marchés qu’il servait, et ces marchés ont à leur tour structuré les
      institutions, les flux de capitaux et les hiérarchies de corridors qui
      persistent aujourd’hui.
    imagePosition: right
  - title_en: Resource Geography
    title_fr: Géographie des ressources
    content_en: >-
      Canada's resource base spans multiple geographically distinct extraction
      zones whose economic viability depends less on abundance alone than on
      infrastructure access, export connectivity, regulatory stability, and
      long-term capital deployment. This is the critical distinction that
      separates a description of Canadian geography from an analysis of the
      Canadian political economy.


      The resource wealth is real — the Western Canada Sedimentary Basin, the
      oil sands, the Boreal forest system, the mineral clusters of Northern
      Saskatchewan and the Labrador Trough, the critical mineral deposits
      distributed across the Shield. But these are not automatically productive
      assets. Their conversion into economic value depends on the full chain:
      extraction, transport, refining, export access, investment, and
      geopolitical positioning. Where that chain is intact, resource territories
      generate sustained economic output. Where it is broken or absent — by
      geography, governance, capital shortfall, or infrastructure gaps —
      resource abundance remains latent.


      This produces a specific pattern of spatial asymmetry: regional
      specialization without equivalent regional development, uneven
      distribution of infrastructure and investment, long capital cycles that
      create structural path dependencies, and concentrated gateway
      vulnerabilities where disruption of a port, pipeline, or corridor can
      cascade across the system. Canada's resource geography, in other words, is
      not a static map of abundance. It is a dynamic system of conversion
      capacity — and the limits of that capacity are as analytically important
      as the resource base itself.
    content_fr: >-
      La base de ressources du Canada se compose de multiples zones d’extraction
      géographiquement distinctes dont la viabilité économique dépend moins de
      l’abondance en soi que de l’accès aux infrastructures, de la connectivité
      à l’exportation, de la stabilité réglementaire et de la capacité à
      mobiliser des capitaux sur le long terme. C’est la distinction centrale
      qui sépare une description de la géographie canadienne d’une analyse de
      son économie politique.


      La richesse en ressources est indéniable : bassin sédimentaire de l’Ouest
      canadien, sables bitumineux, vaste forêt boréale, bassins miniers du Nord
      de la Saskatchewan et de la Fosse du Labrador, gisements de minéraux
      critiques disséminés dans le Bouclier. Cependant, ces ressources ne
      constituent pas automatiquement des actifs productifs. Leur conversion en
      valeur économique repose sur l’ensemble de la chaîne : extraction,
      transport, transformation, accès aux marchés d’exportation,
      investissement, positionnement géopolitique. Là où cette chaîne est
      complète, les territoires de ressources génèrent une activité économique
      soutenue. Là où elle est interrompue ou inexistante (du fait de la
      géographie, de la gouvernance, d’un déficit de capital ou d’un manque
      d’infrastructures), l’abondance reste latente.


      Il en résulte un schéma spécifique d’asymétrie spatiale : spécialisation
      régionale sans développement équivalent, répartition inégale des
      infrastructures et de l’investissement, cycles d’investissement longs qui
      créent des trajectoires structurelles difficiles à inverser, et
      vulnérabilités concentrées aux points de passage où l’interruption d’un
      port, d’un pipeline ou d’un corridor peut avoir des effets en cascade sur
      l’ensemble du système. La géographie des ressources au Canada n’est donc
      pas une carte statique d’abondance, mais un système dynamique de capacité
      de conversion — et les limites de cette capacité sont aussi importantes
      analytiquement que la base de ressources elle‑même.
    imagePosition: right
  - title_en: Infrastructure and Corridors
    title_fr: Infrastructures et corridors
    content_en: >-
      Canada's infrastructure network — pipelines, railways, ports, electricity
      grids, and border-crossing systems — is the physical expression of a
      political economy built around resource export. These systems do not
      merely move commodities. They orient economic gravity. They define which
      territories are integrated into global markets and which remain
      peripheral. They determine the feasibility, cost, and direction of
      resource flows. They create, over time, structural dependency
      relationships that are extremely difficult to rapidly reorient.


      The north-south orientation of Canada's economic system toward the United
      States is not accidental, not ideological, and not temporary. Over
      decades, transport infrastructure, energy systems, manufacturing supply
      chains, and capital integration progressively anchored Canada's economic
      structure to the American market, creating a deeply continental system in
      which investment assumptions, regulatory frameworks, and infrastructure
      routing all reflect southward gravitational pull. That system did not
      emerge from ideological preference. It emerged from successive,
      compounding infrastructure and investment decisions whose accumulated
      weight now constitutes a structural fact.


      This has two important implications. First, the infrastructure that
      enables Canadian resource exports is also a constraint on strategic
      flexibility. Reorienting trade flows, adding processing capacity, or
      redirecting exports toward new markets requires overcoming not just market
      conditions but the embedded geography of the infrastructure itself.
      Second, the corridors represent strategic chokepoints — nodes where
      reliability, capacity, and governance matter enormously. Investment in
      corridor capacity is, in this framework, a form of strategic positioning.
    content_fr: >-
      Le réseau d’infrastructures canadien (pipelines, chemins de fer, ports,
      réseaux électriques, postes frontaliers) est l’expression physique d’une
      économie politique structurée par l’exportation de ressources. Ces
      systèmes ne se contentent pas de déplacer des marchandises. Ils orientent
      la gravité économique. Ils définissent quels territoires sont intégrés aux
      marchés mondiaux et lesquels restent périphériques. Ils déterminent la
      faisabilité, le coût et le sens des flux de ressources. À long terme, ils
      créent des relations de dépendance structurelle qu’il est difficile de
      réorienter rapidement.


      L’orientation nord‑sud du système économique canadien vers les États‑Unis
      n’est ni accidentelle, ni idéologique, ni temporaire. Au fil des
      décennies, les infrastructures de transport, les systèmes énergétiques,
      les chaînes d’approvisionnement industrielles et l’intégration des
      capitaux ont ancré la structure économique du Canada dans le marché
      américain, donnant naissance à un système profondément continental au sein
      duquel les hypothèses d’investissement, les cadres réglementaires et le
      tracé des infrastructures reflètent tous une gravité orientée vers le sud.


      Deux implications en découlent. Premièrement, les infrastructures qui
      soutiennent les exportations canadiennes de ressources sont aussi une
      contrainte sur la flexibilité stratégique. Réorienter les flux
      commerciaux, ajouter des capacités de transformation ou détourner les
      exportations vers de nouveaux marchés suppose de surmonter non seulement
      les conditions de marché, mais aussi la géographie incorporée dans les
      infrastructures. Deuxièmement, ces corridors sont des points névralgiques
      stratégiques : leur fiabilité, leur capacité et leur gouvernance ont un
      poids disproportionné. L’investissement dans la capacité des corridors
      est, dans ce cadre, une forme de positionnement stratégique.
    imagePosition: right
  - title_en: Canada in Global Systems
    title_fr: Le Canada dans les systèmes mondiaux
    content_en: >-
      The global environment in which Canada's resource system operates is
      undergoing structural change. Three dynamics are reshaping the strategic
      map simultaneously: the energy transition is altering which resources
      matter and which supply chains command geopolitical attention; the
      emergence of critical minerals as central inputs to electrification,
      advanced manufacturing, and defence systems is creating new hierarchies of
      resource relevance; and geopolitical fragmentation is increasing the
      premium placed on supplier reliability, political alignment, and
      geographic proximity.


      While the United States remains Canada's primary structural anchor,
      growing interest in European and Indo-Pacific markets reflects broader
      attempts to diversify strategic dependencies within an increasingly
      fragmented global system. Europe represents high-value strategic
      partnership: a political ally with industrial depth, a partner in energy
      transition, and a market with growing appetite for responsibly sourced
      critical materials. Asia represents something more complex. Indo-Pacific
      markets offer genuine growth potential, but they also carry inherent
      exposure. Refining dominance concentrated in specific states,
      manufacturing dependencies in battery and semiconductor supply chains, and
      shipping route vulnerabilities all constitute systemic risks that cannot
      be folded into a simple narrative of export opportunity.


      Asia is not merely a future growth market. It is also a zone of strategic
      competition in which value chain positioning — not raw export volume —
      will determine which countries benefit and which remain at the extraction
      end of the curve. For Canada, that distinction is central to how
      engagement with Indo-Pacific systems should be structured.
    content_fr: >-
      L’environnement mondial au sein duquel fonctionne le système canadien des
      ressources connaît des transformations structurelles. Trois dynamiques
      redessinent simultanément la carte stratégique : la transition énergétique
      modifie la hiérarchie des ressources et des chaînes d’approvisionnement
      qui attirent l’attention géopolitique; l’essor des minéraux critiques
      comme intrants clés de l’électrification, de la fabrication avancée et des
      systèmes de défense génère de nouvelles hiérarchies de pertinence; et la
      fragmentation géopolitique accroît la valeur accordée à la fiabilité des
      fournisseurs, à l’alignement politique et à la proximité géographique.


      Les États‑Unis demeurent l’ancrage structurel principal du Canada.
      Toutefois, l’intérêt croissant pour les marchés européens et
      indo‑pacifiques traduit une volonté plus large de diversifier les
      dépendances stratégiques au sein d'un système mondial de plus en plus
      fragmenté. L’Europe représente un partenariat stratégique de valeur élevé
      : un allié politique doté d’une base industrielle solide, un partenaire
      dans la transition énergétique, et un marché de plus en plus demandeur de
      matériaux critiques « responsables ». L’Asie constitue une réalité plus
      complexe. Les marchés indo‑pacifiques offrent un potentiel de croissance
      réel, mais ils s’accompagnent également d’une exposition structurelle :
      concentration du raffinage dans certains États, dépendance manufacturière
      dans les chaînes de valeur des batteries et des semi‑conducteurs,
      vulnérabilités liées aux routes maritimes et à la rivalité stratégique.


      L’Asie n’est donc pas simplement un « marché de croissance future ». C’est
      aussi un espace de compétition stratégique où le positionnement dans les
      chaînes de valeur (plutôt que le volume brut des exportations) déterminera
      les pays captant la valeur et ceux demeurant cantonnés à l’extraction.
      Pour le Canada, cette distinction est essentielle pour définir la manière
      d’articuler ses relations avec les systèmes indo‑pacifiques.
    imagePosition: left
  - title_en: Constraints and Tensions
    title_fr: Contraintes et tensions
    content_en: >-
      Canada's resource ambitions increasingly collide with governance,
      environmental, and social legitimacy constraints that cannot be reduced to
      administrative delays alone. These are not frictions slowing an otherwise
      frictionless system. They are structural tensions within the model itself
      — tensions that reflect the simultaneous operation of multiple legitimate
      but incompatible imperatives.


      The most significant of these tensions are worth naming directly. The
      demand for accelerated extraction and export development runs in direct
      conflict with the environmental and social commitments that condition
      Canada's credibility as a responsible supplier to allied markets. The
      assertion of Indigenous governance rights — legally grounded,
      constitutionally recognized, and increasingly effective — intersects with
      project timelines in ways that cannot be engineered around without
      political and legal costs that exceed their administrative character. The
      aspiration toward domestic value-added transformation — refining,
      processing, battery manufacturing — confronts infrastructure gaps, capital
      intensity barriers, and structural dependencies on external industrial
      capacity that do not resolve through policy announcement alone. And the
      strategic aspiration toward continental diversification confronts the
      embedded north-south infrastructure and capital architecture described
      above.


      These tensions are not problems to be solved before the real work of
      resource development can proceed. They are the conditions under which that
      development will occur — or fail to occur. Analytical frameworks that
      treat them as obstacles rather than structural features systematically
      underestimate what managing a resource civilization in the 21st century
      actually requires.
    content_fr: >-
      Les ambitions canadiennes en matière de ressources se heurtent de plus en
      plus aux contraintes de gouvernance, d’environnement et de légitimité
      sociale qui ne peuvent être décrites comme de simples délais
      administratifs. Il ne s’agit pas de frottements qui ralentiraient un
      système par ailleurs fluide. Ce sont des tensions structurelles au cœur
      même du modèle; des tensions qui reflètent la coexistence de plusieurs
      impératifs légitimes, mais difficilement compatibles.


      Plusieurs tensions majeures méritent d’être nommées explicitement. La
      volonté d’accélérer l’extraction et l’exportation se heurte aux
      engagements environnementaux et sociaux qui conditionnent la crédibilité
      du Canada en tant que fournisseur responsable pour les marchés alliés.
      L’affirmation des droits de gouvernance autochtone (solidement ancrés sur
      le plan juridique et constitutionnel, et de plus en plus effectifs) influe
      sur les calendriers de projets d’une manière qu’on ne peut contourner sans
      coûts politiques et juridiques qui dépassent leur caractère administratif.
      L’ambition d’accroître la valeur ajoutée domestique (raffinage,
      transformation, fabrication de batteries) est confrontée aux déficits
      d’infrastructures, aux obstacles en matière de capital et aux dépendances
      structurelles envers des capacités industrielles externes qui ne se
      règlent pas par simple annonce de politiques. De plus, l’objectif de
      diversification continentale est entravé par l’architecture profondément
      nord‑sud des infrastructures et des capitaux décrite plus haut.


      Ces tensions ne sont pas des problèmes à éliminer avant que le « vrai »
      travail de développement des ressources ne puisse commencer. Elles
      constituent les conditions dans lesquelles ce développement aura lieu — ou
      échouera. Les cadres analytiques qui les traitent comme de simples
      obstacles, plutôt que comme des caractéristiques structurelles,
      sous‑estiment systématiquement ce que suppose la gestion d’une
      civilisation des ressources au 21ᵉ siècle.
    imagePosition: right
  - title_en: Reframing Canada's Position
    title_fr: Repositionner le Canada
    content_en: >-
      Viewing Canada as a resource civilization shifts the analytical
      perspective from endowment to organization. The relevant question is not
      whether Canada has resources — it demonstrably does — but how the system
      through which those resources are developed, integrated, and exchanged is
      positioned within changing global structures.


      In the current context, strategic positioning depends on integration into
      supply chains beyond extraction, alignment with the industrial and
      technological systems of allied economies, participation in multilateral
      frameworks that confer regulatory and political legitimacy, and investment
      in the conversion capacity — processing, refining, downstream
      manufacturing — that determines where value is captured rather than merely
      where it originates. Canada's trajectory within these systems is not
      predetermined. It depends on whether existing structures adapt to new
      forms of demand and organization, and whether the constraints described
      above are engaged seriously rather than deferred.
    content_fr: >-
      Voir le Canada comme une civilisation des ressources déplace le regard, de
      l’abondance vers l’organisation. La question pertinente n’est pas de
      savoir si le Canada dispose de ressources (la réponse est évidente), mais
      de comprendre comment le système par lequel ces ressources sont mises en
      valeur, intégrées et échangées se positionne au sein de structures
      mondiales en mutation.


      Dans le contexte actuel, le positionnement stratégique dépend de
      l’intégration dans des chaînes de valeur qui dépassent l’extraction, de
      l’alignement avec les systèmes industriels et technologiques des économies
      alliées, de la participation à des cadres multilatéraux qui confèrent
      légitimité politique et réglementaire, et de l’investissement dans la
      capacité de conversion (transformation, raffinage, fabrication en aval)
      qui détermine où la valeur est captée, plutôt que son lieu d'origine. La
      trajectoire du Canada dans ces systèmes n’est pas prédéterminée. Elle
      dépend de la capacité de ses structures existantes à s’adapter à de
      nouvelles formes de demande et d’organisation, ainsi que de la volonté de
      traiter les contraintes évoquées plus haut comme des paramètres
      stratégiques, et non comme des variables secondaires.
    imagePosition: left
  - title_en: Conclusion
    title_fr: Conclusion
    content_en: >-
      In a world increasingly shaped by energy transition, supply-chain
      security, and geopolitical fragmentation, Canada's future influence may
      depend less on escaping its resource foundations than on strategically
      reorganizing them.


      That reorganization is not simply an economic project. It is a political
      one. It requires decisions about where to invest, which corridors to
      prioritize, how to distribute value across extraction zones, how to
      integrate Indigenous governance into development frameworks without
      subordinating it to extraction timelines, and how to position Canadian
      supply chains within allied industrial systems in ways that capture more
      of the value they generate. Canada's historical resource identity —
      organized around extraction, transport, and external demand — is being
      strategically revalued by the dynamics now reshaping global systems.
      Whether that revaluation translates into durable strategic positioning
      will depend on the quality of the institutional and political choices made
      in response to it.
    content_fr: >-
      Dans un monde de plus en plus structuré par la transition énergétique, la
      sécurité des chaînes d’approvisionnement et la fragmentation géopolitique,
      l’influence future du Canada dépendra peut‑être moins de sa capacité à
      s’extraire de ses fondements liés aux ressources que de sa capacité à les
      réorganiser stratégiquement.


      Cette réorganisation n’est pas seulement un projet économique. Il s'agit
      d'un projet politique. Elle implique des choix sur les lieux
      d’investissement, les corridors à prioriser, la manière de répartir la
      valeur entre les zones d’extraction, la façon d’intégrer la gouvernance
      autochtone dans les cadres de développement sans la subordonner aux
      calendriers des projets, ainsi que le positionnement des chaînes
      d’approvisionnement canadiennes au sein des systèmes industriels alliés de
      façon à capter une part accrue de la valeur qu’elles génèrent. L’identité
      historique du Canada comme pays de ressources (organisée autour de
      l’extraction, du transport et de la demande externe) est en cours de
      revalorisation stratégique sous l’effet des dynamiques transformant
      aujourd’hui les systèmes mondiaux. La question est de savoir si cette
      revalorisation se traduira en positionnement stratégique durable; ce qui
      dépendra de la qualité des choix institutionnels et politiques qui seront
      faits en réponse à cette nouvelle donne.
    imagePosition: left
  - title_en: Sources & Notes
    title_fr: Sources et notes
    content_en: >
      This analysis draws on publicly available institutional and historical
      sources, including materials from Statistics Canada, Natural Resources
      Canada, and international research on resource economies and global trade
      systems. Full source documentation available upon request.
    content_fr: >
      Cette analyse s'appuie sur des sources institutionnelles et historiques
      accessibles au public, notamment des documents de Statistique Canada, de
      Ressources naturelles Canada, et des recherches internationales sur les
      économies de ressources et les systèmes commerciaux mondiaux.
      Documentation complète disponible sur demande.
    imagePosition: right
keyTakeaways:
  - title_en: Resource Civilization
    title_fr: Civilisation des ressources
    description_en: >-
      Canada is not merely a resource-rich economy. Its geography,
      infrastructure, institutions, and external relationships have been
      historically organized around resource extraction and export — making it a
      resource civilization in a structural sense.
    description_fr: >-
      Le Canada n'est pas simplement une économie riche en ressources. Sa
      géographie, ses infrastructures, ses institutions et ses relations
      extérieures ont été historiquement organisées autour de l'extraction et de
      l'exportation de ressources naturelles, ce qui en fait une véritable
      civilisation fondée sur les ressources, au sens structurel.
  - title_en: Structural Continuity
    title_fr: Continuité structurelle
    description_en: >-
      Successive phases of Canadian development — from fur and timber to oil and
      now critical minerals — have reproduced the same pattern: extraction at
      the periphery, transport through corridors, export to external markets.
      The structure persists as the resources change.
    description_fr: >-
      Les phases successives du développement canadien (de la fourrure et du
      bois au pétrole puis, aujourd’hui, aux minéraux critiques) ont reproduit
      le même schéma : extraction en périphérie, transport par corridors,
      exportation vers des marchés extérieurs. La structure demeure, même si les
      ressources changent.
  - title_en: Strategic Positioning
    title_fr: Positionnement stratégique
    description_en: >-
      In the context of energy transition and geopolitical fragmentation, the
      strategic question for Canada is not whether to rely on resources, but how
      its resource-based system integrates into new industrial, technological,
      and geopolitical networks beyond extraction alone.
    description_fr: >-
      Dans le contexte de transition énergétique et de fragmentation
      géopolitique, la question stratégique pour le Canada n'est pas de savoir
      s'il doit s'appuyer sur ses ressources, mais comment son système fondé sur
      les ressources s'intègre dans de nouveaux réseaux industriels,
      technologiques et géopolitiques, au-delà de l'extraction.
