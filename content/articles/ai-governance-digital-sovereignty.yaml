sections:
  - title_en: Artificial Intelligence as a System of Power
    title_fr: Artificial Intelligence as a System of Power
    content_en: >
      Artificial intelligence is often presented as a technological innovation.
      Increasingly, it functions as an organizing force across economic,
      political, and security systems.


      AI systems influence:


      • information flows

      • economic productivity

      • military capabilities

      • regulatory frameworks


      As a result, AI is not only a technological domain, but a field of
      strategic competition, where governance models and technological capacity
      interact.
    content_fr: >
