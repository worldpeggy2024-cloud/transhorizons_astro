keyTakeaways:
  - title_en: Governance Divergence
    title_fr: Divergence des gouvernances
    description_en: >-
      The US, EU, and China are pursuing distinct AI governance approaches,
      creating a fragmented global landscape where Canada must navigate multiple
      frameworks.
    description_fr: >-
      Les États-Unis, l'UE et la Chine poursuivent des approches distinctes de
      gouvernance de l'IA, créant un paysage mondial fragmenté dans lequel le
      Canada doit naviguer entre plusieurs cadres.
  - title_en: Digital Dependence
    title_fr: Dépendance numérique
    description_en: >-
      Canada's digital infrastructure and services are heavily dependent on
      foreign technology, creating vulnerabilities and limiting strategic
      autonomy.
    description_fr: >-
      L'infrastructure et les services numériques du Canada dépendent fortement
      des technologies étrangères, créant des vulnérabilités et limitant
      l'autonomie stratégique.
  - title_en: Strategic Opportunity
    title_fr: Opportunité stratégique
    description_en: >-
      Canada can leverage its AI research strength and democratic values to
      become a trusted voice in global AI governance while building digital
      sovereignty.
    description_fr: >-
      Le Canada peut tirer parti de sa force en recherche sur l'IA et de ses
      valeurs démocratiques pour devenir une voix de confiance dans la
      gouvernance mondiale de l'IA tout en bâtissant sa souveraineté numérique.
