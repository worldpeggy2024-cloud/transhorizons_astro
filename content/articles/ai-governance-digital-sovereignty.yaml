    imagePosition: right
  - title_en: Diverging Governance Models
    title_fr: Diverging Governance Models
    content_en: >
      Major jurisdictions are developing distinct approaches to AI governance.


      The European Union emphasizes a regulatory framework centered on risk
      classification, fundamental rights, and accountability. The United States
      prioritizes innovation and market-led development, with more limited
      federal regulatory intervention. China integrates AI governance into
      broader state structures, combining industrial policy with security and
      content regulation.


      These approaches reflect different institutional priorities:


      • rights-based governance

      • innovation-driven systems

      • state-centric control


      The result is a fragmented landscape in which no single model dominates,
      and where regulatory and technological systems evolve in parallel.
