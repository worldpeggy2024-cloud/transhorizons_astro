title_en: AI Governance and Digital Sovereignty
title_fr: Gouvernance de l'IA et souveraineté numérique
subtitle_en: >-
  Examines how divergent approaches to artificial intelligence governance are
  reshaping digital power structures, with implications for Canada's position
  within emerging technological systems.
subtitle_fr: >-
  Examines how divergent approaches to artificial intelligence governance are
