title_en: Travel, Observation, and the Formation of an Analytical Perspective
subtitle_en: >-
  How sustained travel across continents became a method of inquiry and shaped
  an analytical perspective grounded in direct observation.
introductionTitle_en: Key observations
title_fr: Voyage, observation et formation d’une perspective analytique
subtitle_fr: >-
  Comment de longs voyages sur plusieurs continents sont devenus une méthode
  d'enquête et ont façonné une perspective analytique ancrée dans l'observation
  directe.
introductionTitle_fr: Observations clés
sections:
  - title_en: From Translation to Analysis
    title_fr: De la traduction à l'analyse
    content_en: >-
      My professional life began in languages, but languages were never the
      destination. They were an entry point into something larger: understanding
      how societies organize themselves, how institutions function, and how
      civilizations coexist on a shared planet.


      Raised in France, I initially followed a scientific path before pivoting
      toward languages—English and Spanish first, then Russian, later Chinese
      studies alongside translation training. That shift did not represent a
      rejection of science but rather an expansion of curiosity: moving from
      equations toward human systems.


      From the age of nineteen, travel became continuous and practical rather
      than merely a romantic aspiration. Summers were spent working abroad—first
      as a chambermaid in Edinburgh, Scotland; later operating a beach boardwalk
      arcade in California; working retail at the Statue of Liberty; working in
      pubs while studying in London through Erasmus; and completing translation
      training and a master’s degree in English while moving between France, New
      York, Madrid, the south of England and Montréal.


      These were not journeys merely undertaken for leisure. They were early
      exercises in adaptation—learning how societies function from within
      everyday life. Translation offers professional mobility, but travel
      provides education.


      Over time, sustained institutional translation sharpened a broader
      analytical attention to the ways institutions, economies, and cultures
      operate in practice.
    content_fr: >-
      Ma vie professionnelle a commencé par les langues, mais les langues n'ont
      jamais été la destination. Elles ont été un point d'entrée vers quelque
      chose de plus vaste : comprendre comment les sociétés s'organisent,
      comment les institutions fonctionnent, et comment les civilisations
      coexistent sur une planète commune.


      Durant mon enfance et adolescence en France, j'ai d'abord suivi un
      parcours scientifique avant de me tourner vers les langues : l'anglais et
      l'espagnol d'abord, puis quelques années d'étude du russe, puis du chinois
      parallèlement à une formation en traduction. Cette réorientation n'a pas
      été un rejet des sciences, mais plutôt un élargissement de ma curiosité :
      passer des équations aux systèmes humains.


      Dès l’âge de dix-neuf ans, le voyage est devenu une réalité continue et
      concrète, plutôt qu'une seule aspiration romantique. Mes étés se passaient
      à travailler à l'étranger : d'abord comme femme de chambre à Édimbourg en
      Écosse, puis dans un parc d'attraction californien, la boutique de la
      Statue de la Liberté à New York, des pubs pendant mes études à Londres
      dans le cadre d’Erasmus, avant de poursuivre et de terminer ma formation
      en traduction entre la France, New York, Madrid, le sud de l'Angleterre et
      Montréal, et obtenir ma maîtrise d'anglais.


      Ces déplacements n’étaient pas de simples voyages de loisir. Ils
      constituaient des exercices d’adaptation; une manière d’apprendre comment
      les sociétés fonctionnent de l’intérieur, à travers la vie quotidienne. La
      traduction offre une mobilité professionnelle, mais le voyage constitue
      une forme d’éducation.


      Avec le temps, traduire dans le secteur institutionnel a affiné une
      attention analytique plus large aux façons dont les institutions, les
      économies et les cultures fonctionnent concrètement.
    imagePosition: right
  - title_en: Observation Rather Than Tourism
    title_fr: Observation plutôt que tourisme
    image: /images/PICT4876.JPG
    content_en: >-
      Travel, for me, was never primarily about destinations. It became a method
      of inquiry. Fluency in local languages was rarely the reality. Most
      encounters happened through rudimentary English, gestures, shared travel
      time, or simple acts of cooperation. Understanding emerged not from
      perfect conversation but from presence—observing infrastructure, public
      behaviour, institutional order, work routines, transport systems, and
      social tensions visible in everyday life.


      Observation proved more revealing than dialogue. One learns quickly that
      societies communicate through patterns: transportation systems, housing
      forms, public space usage, attitudes toward authority, environmental
      stewardship, or economic improvisation. These elements reveal how
      communities adapt to geography, history, and technological change.


      Travel became a form of informal field observation.
    content_fr: >-
      Pour moi, le voyage n'a jamais été principalement une question de
      destinations. Il est devenu une méthode d'enquête. La maîtrise des langues
      locales était rarement une réalité. La plupart des rencontres se faisaient
      au moyen d’un anglais rudimentaire, de gestes, de temps de déplacement
      partagé ou de simples actes de coopération. La compréhension émergeait non
      pas d'une conversation parfaite, mais de la présence : de l’observation
      des infrastructures, des comportements publics, de l’ordre institutionnel,
      des routines de travail, des systèmes de transport et des tensions
      sociales visibles dans la vie quotidienne.


      L'observation s'est avérée plus révélatrice que le dialogue. On apprend
      rapidement que les sociétés communiquent par des structures récurrentes :
      les systèmes de transport, les formes d’habitat, l'usage de l'espace
      public, les rapports à l'autorité, la gestion environnementale, ou les
      formes d’adaptation économique. Ces éléments révèlent la manière dont les
      communautés s'adaptent à la géographie, à l'histoire et aux
      transformations technologiques.


      Le voyage est ainsi progressivement devenu une forme d’observation de
      terrain informelle.
    imagePosition: right
  - title_en: Early Professional Formation Across Continents
    title_fr: Formation professionnelle précoce sur plusieurs continents
    content_en: >-
      Europe provided the first comparative framework. Work in Dublin as a
      localization specialist at Microsoft exposed me to globalization at an
      operational level — how technology companies translate not only software,
      but organizational culture across jurisdictions. Then, North America
      became a second frame of reference, no longer distant or theoretical, but
      experienced directly.


      I emigrated to Canada, crossing the Atlantic by cargo ship — a slow and
      physical passage that made the change of continent feel concrete. The move
      marked a decisive transformation. Freelance translation enabled geographic
      mobility across the country: from Montréal to Québec’s more distant
      regions, Prairie cities, the West Coast, and two of Canada’s three
      territorial capitals. Canada was not simply another country encountered
      through travel. It became a place of civic belonging.


      Becoming Canadian meant joining a society attempting something
      historically rare: a functioning multicultural state where diversity is
      not theoretical but administrative, social, and daily reality. Living
      within that framework produced lasting gratitude and intellectual interest
      in how plural societies maintain cohesion.
    content_fr: >-
      L’Europe a fourni le premier cadre comparatif. Mon travail à Dublin en
      tant que localisatrice chez Microsoft m'a exposée à la mondialisation au
      niveau opérationnel; la manière dont les entreprises technologiques
      traduisent non seulement les logiciels, mais aussi la culture
      organisationnelle à travers différents cadres nationaux. L’Amérique du
      Nord est ensuite devenue un second cadre de référence, non plus distant ou
      théorique, mais directement vécu.
       
      J’ai émigré au Canada en traversant l’Atlantique en cargo : passage lent
      et physique qui a rendu le changement de continent concret. Ce
      déménagement a marqué une transformation décisive. La traduction
      indépendante m'a permis une mobilité géographique dans l'ensemble du pays
      : de Montréal aux régions plus éloignées du Québec, aux villes des
      Prairies, à la côte Ouest, ainsi qu’à deux des trois capitales
      territoriales du Canada. Le Canada n’était pas simplement un autre pays
      découvert par le voyage. Il est devenu un lieu d’appartenance civique.


      Devenir Canadienne signifiait rejoindre une société tentant quelque chose
      d'historiquement rare : un État multiculturel fonctionnant où la diversité
      n'est pas théorique mais administrative, sociale et quotidienne. Vivre
      dans ce cadre suscite une gratitude durable et un intérêt intellectuel
      pour la façon dont les sociétés plurielles maintiennent leur cohésion.
    imagePosition: right
  - title_en: Travel as Field Research
    title_fr: Le voyage comme recherche sur le terrain
    content_en: >-
      Once professional stability allowed it, travel expanded into sustained
      global exploration. Participation in a medical caravan in Morocco became
      an early confrontation with inherited stereotypes and the complexity of
      North African identities. A 4×4 expedition across Mauritania introduced
      the realities of geography shaping civilization. Extended road journeys
      across the British Isles revealed regional economic contrasts within
      advanced economies.


      Asia marked a turning point. A ten-month journey beginning in Hong Kong
      and Southeast Asia included an extended stay and study in China, in
      Shanghai but also through thousands of kilometers by train across the
      country. This exploration extended to Japan, Mongolia, Tibet, and
      ultimately ended with the Trans-Siberian journey back to Europe.


      Later returns to Siberia confirmed a deep intellectual fascination with
      frontier regions—places where environment, infrastructure, and state power
      intersect unevenly, and where political centres can feel distant from
      daily realities.


      Subsequent years expanded the observational map:


      • Gemological travel linking geology, trade networks, and global markets

      • Extended journeys across Australia and New Zealand

      • South American travel sometimes by bus through Brazil, Argentina, Chile,
      and Uruguay

      • Repeated long stays in Japan focused on slow observation of collective
      order and social coordination

      • Overland exploration across Europe's institutional and historical
      centers

      • Transcontinental rail journeys across North America

      • Extended residence periods in Seoul following the pandemic


      Across decades, movement increasingly followed a consistent principle:
      travel slowly, fly as little as possible, and remain long enough for
      patterns to emerge.
    content_fr: >-
      Une fois la stabilité professionnelle obtenue, le voyage s'est élargi en
      exploration mondiale prolongée. La participation à une caravane médicale
      au Maroc a constitué une première confrontation avec les stéréotypes
      hérités et la complexité des identités nord-africaines. Une expédition en
      4×4 à travers la Mauritanie a révélé la manière dont la géographie façonne
      les civilisation. De longs voyages par la route dans les îles britanniques
      ont mis en évidence les contrastes économiques régionaux au sein
      d'économies avancées.


      L'Asie a marqué un tournant. Un voyage de dix mois amorcé à Hong Kong et
      en Asie du Sud-Est a compris un séjour prolongé et des études en Chine, à
      Shanghai, mais aussi au cours de plusieurs milliers de kilomètres
      parcourus en train à travers le pays. Cette exploration s’est poursuivie
      jusqu'au Japon, en Mongolie, au Tibet, avant de se terminer par un voyage
      en Transsibérien pour regagner l'Europe.


      Des retours ultérieurs en Sibérie ont confirmé une profonde fascination
      intellectuelle pour les régions-frontières : ces lieux où l’environnement,
      les infrastructures et le pouvoir de l’État s’entrecroisent de manière
      inégale, et où les centres politiques peuvent sembler éloignés des
      réalités quotidiennes.


      Les années suivantes ont étendu la carte observationnelle :


      • voyages gemmologiques reliant la géologie, les réseaux commerciaux et
      les marchés mondiaux;

      • longs séjours en Australie et en Nouvelle-Zélande;

      • voyage en Amérique du Sud, parfois en autobus, à travers le Brésil,
      l'Argentine, le Chili et l'Uruguay;

      • séjours prolongés répétés au Japon axés sur l'observation lente de
      l’ordre collectif et de la coordination sociale;

      • exploration terrestre des centres institutionnels et historiques de
      l'Europe;

      • traversées ferroviaires transcontinentales en Amérique du Nord;

      • périodes de résidence prolongée à Séoul après la pandémie.


      Au fil des décennies, le déplacement a de plus en plus obéi à un principe
      constant : voyager lentement, prendre l’avion le moins possible et rester
      assez longtemps pour que les dynamiques deviennent perceptibles.
    imagePosition: right
  - title_en: Civilizations Seen from the Ground
    title_fr: Les civilisations vues du terrain
    content_en: >-
      What sustained travel gradually revealed is that civilizations emerge
      through continuous interaction between geography, resources, political
      organization, historical memory, and technological adaptation.
      Environmental conditions matter deeply, but so do systems of power,
      culture, and collective adaptation. Markets in Southeast Asia, rail
      networks in Japan, resource economies in Canada, post-industrial regions
      in Europe, or frontier settlements in Siberia all demonstrate variations
      of the same human project: organizing life under constraints.


      Geopolitics, viewed from this perspective, ceases to be abstract
      competition between states. It becomes the interaction of societies
      attempting to secure stability, dignity, and continuity. Direct
      observation complicates simplified narratives. No region fits easily into
      external categories of success or failure. Everywhere, adaptation is
      ongoing.
    content_fr: >-
      Ce que ces voyages prolongés ont progressivement révélé : les
      civilisations émergent d’une interaction continue entre la géographie, les
      ressources, l’organisation politique, la mémoire historique et
      l’adaptation technologique. Les conditions environnementales jouent un
      rôle déterminant, mais les systèmes de pouvoir, la culture et les formes
      d’adaptation collective en jouent un tout aussi important. Les marchés
      d'Asie du Sud-Est, les réseaux ferroviaires du Japon, les économies de
      ressources du Canada, les régions postindustrielles d'Europe ou les
      régions de peuplement pionnier en Sibérie sont tous des exemples de
      variations d'un même projet humain : organiser la vie en tenant compte de
      contraintes.


      Vue sous cet angle, la géopolitique cesse d'être une concurrence abstraite
      entre États. Elle devient l'interaction de sociétés qui cherchent à
      assurer leur stabilité, leur dignité et leur continuité. L'observation
      directe complexifie les récits simplifiés. Aucune région ne s’inscrit
      aisément dans des catégories extérieures de réussite ou d'échec. Partout,
      l'adaptation se poursuit.
