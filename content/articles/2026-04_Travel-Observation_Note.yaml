keyTakeaways:
  - title_en: Travel as inquiry
    title_fr: Le voyage comme méthode d'enquête
    description_en: >-
      Travel as observation—not tourism—provides insights into how societies
      function and adapt.
    description_fr: >-
      Le voyage comme observation (et non comme tourisme) offre un éclairage sur
      la manière dont les sociétés fonctionnent et s’adaptent.
  - title_en: Language as worldview
    title_fr: La langue comme vision du monde
    description_en: >-
      Understanding how different cultures think and communicate shapes a deeper
      understanding of geopolitics.
    description_fr: >-
      Comprendre comment les différentes cultures pensent et communiquent permet
      d’approfondir la compréhension de la géopolitique.
  - title_en: Geopolitics as lived experience
    title_fr: La géopolitique comme expérience vécue
    description_en: >-
      Understanding geopolitics requires direct observation and human connection
      across societies.
    description_fr: >-
      Comprendre la géopolitique exige une observation directe et des liens
      humains entre les sociétés.
  - title_en: Institutional scale
    title_fr: Échelle institutionnelle
    description_en: >-
      Economic systems and institutions operate at human scale; understanding
      them requires understanding people.
    description_fr: >-
      Les systèmes économiques et les institutions fonctionnent à l'échelle
      humaine; les comprendre suppose de comprendre les personnes.
  - title_en: Complexity and resilience
    title_fr: Complexité et résilience
    description_en: >-
      The world is more complex and resilient than any single narrative
      suggests.
    description_fr: >-
      Le monde est plus complexe et résilient que ne le laisse entendre tout
      récit unique.
