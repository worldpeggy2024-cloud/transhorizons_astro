title_en: Travel, Observation, and the Making of an Institutional Analyst
title_fr: "Récits de voyage : perspectives d'un traducteur"
subtitle_en: >-
  How sustained travel across continents became a method of inquiry and shaped
  an analytical perspective grounded in direct observation.
subtitle_fr: >-
  Comment des voyages prolongés sur plusieurs continents sont devenus une
  méthode d'enquête et ont façonné une perspective analytique ancrée dans
  l'observation directe.
