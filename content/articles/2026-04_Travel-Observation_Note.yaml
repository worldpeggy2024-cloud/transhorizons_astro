sections:
  - title_en: From Translation to Analysis
    title_fr: De la traduction à l'analyse
    content_en: >-
      My professional life began in languages, but languages were never the
      destination. They were an entry point into something larger: understanding
      how societies organize themselves, how institutions function, and how
      civilizations coexist on a shared planet.


      Raised in France, I initially followed a scientific path before pivoting
      toward languages during adolescence—English and Spanish first, then
      Russian, later Chinese studies alongside translation training. That shift
      did not represent a rejection of science but rather an expansion of
      curiosity: moving from equations toward human systems.


      From the age of nineteen, travel became continuous and practical rather
      than romantic. Summers were spent working abroad—first as a chambermaid
      in Edinburgh, later operating an arcade in California, working retail at
      the Statue of Liberty, studying in London through Erasmus, and completing
      translation training while moving between France, New York, Madrid, and
      Montréal.


      These were not journeys undertaken for leisure. They were early exercises
      in adaptation—learning how societies function from within everyday life.
      Translation offered professional mobility, but travel provided education.


      Over time, the center of gravity shifted: less interest in linguistic
      mediation itself, and more in observing how institutions, economies, and
      cultures operate in practice.
    content_fr: >-
      Ma vie professionnelle a commencé par les langues, mais les langues n'ont
      jamais été la destination. Elles ont été un point d'entrée vers quelque
      chose de plus grand : comprendre comment les sociétés s'organisent,
      comment les institutions fonctionnent, et comment les civilisations
      coexistent sur une planète partagée.


      Élevée en France, j'ai d'abord suivi un parcours scientifique avant de
      me tourner vers les langues à l'adolescence — l'anglais et l'espagnol
      d'abord, puis le russe, puis plus tard l'étude du chinois aux côtés de
      la formation en traduction. Ce changement ne représentait pas un rejet de
      la science mais plutôt une expansion de la curiosité : passer des
      équations aux systèmes humains.


      À partir de dix-neuf ans, le voyage est devenu continu et pratique plutôt
      que romantique. Les étés ont été passés à travailler à l'étranger —
      d'abord comme femme de chambre à Édimbourg, puis exploitant une arcade en
      Californie, travaillant dans le commerce de détail à la Statue de la
      Liberté, étudiant à Londres via Erasmus, et complétant ma formation en
      traduction en me déplaçant entre la France, New York, Madrid et Montréal.


      Ce n'étaient pas des voyages entrepris pour les loisirs. C'étaient des
      exercices précoces d'adaptation — apprendre comment les sociétés
      fonctionnent à partir de la vie quotidienne. La traduction a offert une
      mobilité professionnelle, mais le voyage a fourni l'éducation.


      Au fil du temps, le centre de gravité s'est déplacé : moins d'intérêt
      pour la médiation linguistique elle-même, et plus pour observer comment
      les institutions, les économies et les cultures fonctionnent en pratique.
  - title_en: Observation Rather Than Tourism
    title_fr: L'observation plutôt que le tourisme
    content_en: >-
      Travel, for me, was never primarily about destinations. It became a
      method of inquiry. Fluency in local languages was rarely the reality.
      Most encounters happened through rudimentary English, gestures, shared
      meals, or simple acts of cooperation. Understanding emerged not from
      perfect conversation but from presence—watching markets open at dawn,
      observing infrastructure, public behavior, institutional order, or social
      tensions visible in everyday routines.


      Observation proved more revealing than dialogue. One learns quickly that
      societies communicate through patterns: transportation systems, housing
      forms, public space usage, attitudes toward authority, environmental
      stewardship, or economic improvisation. These elements reveal how
      communities adapt to geography, history, and technological change.


      Travel became fieldwork without formal designation.
    content_fr: >-
      Pour moi, le voyage n'a jamais été principalement une question de
      destinations. Il est devenu une méthode d'enquête. La fluidité dans les
      langues locales était rarement la réalité. La plupart des rencontres se
      faisaient par l'anglais rudimentaire, les gestes, les repas partagés, ou
      de simples actes de coopération. La compréhension émergeait non pas de la
      conversation parfaite mais de la présence — regarder les marchés s'ouvrir
      à l'aube, observer les infrastructures, le comportement public, l'ordre
      institutionnel, ou les tensions sociales visibles dans les routines
      quotidiennes.


      L'observation s'est avérée plus révélatrice que le dialogue. On apprend
      rapidement que les sociétés communiquent par des modèles : les systèmes
      de transport, les formes de logement, l'utilisation de l'espace public,
      les attitudes envers l'autorité, l'intendance environnementale, ou
      l'improvisation économique. Ces éléments révèlent comment les communautés
      s'adaptent à la géographie, à l'histoire et aux changements
      technologiques.


      Le voyage est devenu une recherche sur le terrain sans désignation
      formelle.
  - title_en: Early Professional Formation Across Continents
    title_fr: Formation professionnelle précoce sur plusieurs continents
    content_en: >-
      Before emigrating, Europe and North America formed the first comparative
      framework. Work in Dublin as a localization specialist at Microsoft
      exposed me to globalization at an operational level—how technology
      companies translate not only software but organizational culture across
      jurisdictions.


      Shortly afterward, I emigrated to Canada, arriving by cargo ship. The
      move marked a decisive transformation. Freelance translation enabled
      geographic mobility across the country: Québec, Northern regions, Prairie
      cities, the West Coast, and remote communities. Canada was not simply
      another country encountered during travel. It became a civic belonging.


      Becoming Canadian meant joining a society attempting something
      historically rare: a functioning multicultural state where diversity is
      not theoretical but administrative, social, and daily reality. Living
      within that framework produced lasting gratitude and intellectual interest
      in how plural societies maintain cohesion.
    content_fr: >-
      Avant d'émigrer, l'Europe et l'Amérique du Nord ont formé le premier
      cadre comparatif. Le travail à Dublin en tant que spécialiste en
      localisation chez Microsoft m'a exposée à la mondialisation au niveau
      opérationnel — comment les entreprises technologiques traduisent non
      seulement les logiciels mais aussi la culture organisationnelle entre les
      juridictions.


      Peu après, j'ai émigré au Canada, arrivant par cargo. Ce déménagement a
      marqué une transformation décisive. La traduction indépendante m'a permis
      une mobilité géographique dans tout le pays : le Québec, les régions du
      Nord, les villes des Prairies, la Côte-Ouest et les communautés éloignées.
      Le Canada n'était pas simplement un autre pays rencontré pendant le voyage.
      C'est devenu un sentiment d'appartenance civique.


      Devenir Canadienne signifiait rejoindre une société tentant quelque chose
      d'historiquement rare : un État multiculturel fonctionnant où la diversité
      n'est pas théorique mais administrative, sociale et quotidienne. Vivre au
      sein de ce cadre a produit une gratitude durable et un intérêt
      intellectuel pour la façon dont les sociétés plurielles maintiennent la
      cohésion.
  - title_en: Travel as Field Research
    title_fr: Le voyage comme recherche sur le terrain
    content_en: >-
      Once professional stability allowed it, travel expanded into sustained
      global exploration. Participation in a medical caravan in Morocco became
      an early confrontation with inherited stereotypes and the complexity of
      North African identities. A 4×4 expedition across Mauritania introduced
      the realities of geography shaping civilization. Extended road and rail
      journeys across the British Isles revealed regional economic contrasts
      within advanced economies.


      Asia marked a turning point. A ten-month journey beginning in Hong Kong
      and Southeast Asia evolved into extended residence and study in China,
      including months in Shanghai and thousands of kilometers traveled by
      train across the country. Movement continued through Japan, Mongolia,
      Tibet, and ultimately the Trans-Siberian Railway back to Europe.


      Later returns to Siberia confirmed a deep intellectual fascination with
      frontier regions—places where environment, infrastructure, and state
      power intersect visibly.


      Subsequent years expanded the observational map:


      • Gemological travel linking geology, trade networks, and global markets

      • Extended journeys across Australia and New Zealand

      • South American travel by bus and rail through Brazil, Argentina, Chile,
      and Uruguay

      • Repeated long stays in Japan focused on slow observation

      • Overland exploration across Europe's institutional and historical centers

      • Transcontinental rail journeys across North America

      • Extended residence periods in Seoul following the pandemic


      Across decades, movement increasingly followed a consistent principle:
      travel slowly, fly little when possible, and remain long enough for
      patterns to emerge.
    content_fr: >-
      Une fois la stabilité professionnelle obtenue, le voyage s'est élargi en
      exploration mondiale soutenue. La participation à une caravane médicale
      au Maroc a été une première confrontation avec les stéréotypes hérités et
      la complexité des identités nord-africaines. Une expédition en 4×4 à
      travers la Mauritanie a présenté les réalités de la géographie façonnant
      la civilisation. Les voyages prolongés en voiture et en train dans les
      îles britanniques ont révélé les contrastes économiques régionaux au sein
      des économies avancées.


      L'Asie a marqué un tournant. Un voyage de dix mois commençant à Hong Kong
      et en Asie du Sud-Est s'est transformé en résidence prolongée et en études
      en Chine, incluant des mois à Shanghai et des milliers de kilomètres
      parcourus en train à travers le pays. Le mouvement a continué via le
      Japon, la Mongolie, le Tibet, et finalement le Transsibérien de retour en
      Europe.


      Les retours ultérieurs en Sibérie ont confirmé une fascination
      intellectuelle profonde pour les régions frontalières — des endroits où
      l'environnement, les infrastructures et le pouvoir d'État se croisent
      visiblement.


      Les années suivantes ont étendu la carte observationnelle :


      • Voyages gemmologiques reliant la géologie, les réseaux commerciaux et
      les marchés mondiaux

      • Voyages prolongés en Australie et Nouvelle-Zélande

      • Voyage en Amérique du Sud en bus et en train à travers le Brésil,
      l'Argentine, le Chili et l'Uruguay

      • Séjours prolongés et répétés au Japon axés sur l'observation lente

      • Exploration terrestre à travers les centres institutionnels et
      historiques de l'Europe

      • Voyages en train transcontinentaux en Amérique du Nord

      • Périodes de résidence prolongée à Séoul après la pandémie


      Sur des décennies, le mouvement a de plus en plus suivi un principe
      constant : voyager lentement, voler peu autant que possible, et rester
      assez longtemps pour que les modèles émergent.
  - title_en: Civilizations Seen from the Ground
    title_fr: Les civilisations vues du terrain
    content_en: >-
      What sustained travel revealed is simple but often overlooked:
      civilizations are ecological responses. Geography, climate, resources,
      and historical memory shape institutions far more deeply than ideology
      alone. Markets in Southeast Asia, rail networks in Japan, resource
      economies in Canada, post-industrial regions in Europe, or frontier
      settlements in Siberia all demonstrate variations of the same human
      project—organizing life under constraints.


      Geopolitics, viewed from this perspective, ceases to be abstract
      competition between states. It becomes the interaction of societies
      attempting to secure stability, dignity, and continuity. Direct
      observation complicates simplified narratives. No region fits easily into
      external categories of success or failure. Everywhere, adaptation is
      ongoing.
    content_fr: >-
      Ce que le voyage soutenu a révélé est simple mais souvent oublié : les
      civilisations sont des réponses écologiques. La géographie, le climat,
      les ressources et la mémoire historique façonnent les institutions bien
      plus profondément que l'idéologie seule. Les marchés en Asie du Sud-Est,
      les réseaux ferroviaires au Japon, les économies de ressources au Canada,
      les régions post-industrielles en Europe, ou les colonies frontalières en
      Sibérie démontrent tous des variations du même projet humain — organiser
      la vie sous des contraintes.


      La géopolitique, vue de cette perspective, cesse d'être une compétition
      abstraite entre États. Elle devient l'interaction de sociétés tentant de
      sécuriser la stabilité, la dignité et la continuité. L'observation directe
      complique les récits simplifiés. Aucune région ne correspond facilement
      aux catégories externes de succès ou d'échec. Partout, l'adaptation est
      en cours.
