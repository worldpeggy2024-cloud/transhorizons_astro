en:
  backLabel: Back to home
  method:
    heading: Research Approach
    label: Overview
    body: >-
      TransHorizons is an independent analytical initiative focused on
      understanding how large-scale systems shape geopolitical, economic, and
      technological outcomes.


      Research is based primarily on publicly available institutional and
      authoritative sources, including national statistical agencies, federal
      departments, international organizations, and peer-reviewed research.


      The approach is grounded in the analysis of structural dynamics rather
      than isolated events, with particular attention to Canada's position
      within evolving global systems.


      Research combines institutional documentation, cross-domain synthesis, and
      continuous monitoring of international developments to produce structured,
      accessible analysis.
  scope:
    heading: Analytical Scope
    intro: 'The work examines interconnected systems across four primary domains:'
    items:
      - title: Structural systems
        desc: >-
          Long-term patterns shaping Canada's development, including geography,
          resource orientation, and integration into global markets.
      - title: Material systems
        desc: >-
          Resource-based systems such as energy, critical minerals, and forest
          ecosystems, including their role in industrial and environmental
          transformations.
      - title: Technological systems
        desc: >-
          Digital infrastructure, artificial intelligence, and governance
          frameworks shaping emerging forms of economic and political power.
      - title: Economic and trade systems
        desc: >-
          Trade relationships, industrial policy, and supply chain dynamics,
          particularly within North American and transatlantic contexts.
    closing: >-
      These domains are treated as interdependent components of a broader system
      rather than as separate areas of analysis.
  sources:
    heading: Sources Monitored
    intro: >-
      Research is based primarily on publicly available institutional and
      authoritative sources, including:
    items: >-
      national statistical agencies (e.g., Statistics Canada);

      federal departments and agencies (e.g., Natural Resources Canada);

      international organizations (e.g., International Energy Agency, OECD,
      World Bank);

      peer-reviewed academic research and scientific publications;

      official reports, policy documents, and technical publications.
    closing: >-
      These sources are supplemented by ongoing monitoring of geopolitical
      developments, economic indicators, and sector-specific data.
  process:
    heading: Update Rhythm
    intro: 'Research outputs follow a mixed rhythm:'
    items:
      - bold: Analytical essays
        rest: ' (long-form): published periodically and focused on structural themes;'
      - bold: Research notes
        rest: ': occasional reflections linked to ongoing developments;'
      - bold: Maps and visualizations
        rest: >-
          : produced alongside analytical essays and, in some cases, developed
          further as standalone visual explorations.
    closing: >-
      This structure supports both long-term analytical work and the progressive
      development of thematic visual frameworks.
  mapping:
    heading: Mapping Methodology
    body: >-
      Mapping is used as a tool for analyzing and synthesizing spatial and
      systemic dynamics.


      Maps and visualizations are intended in particular to:
    items: >-
      reveal spatial relationships between resources, infrastructure, and
      geopolitical dynamics;

      synthesize complex datasets into readable systems;

      support comparative analysis across regions and strategic spaces;

      illustrate structural dynamics and long-term transformations.
    closing: >-
      They combine publicly available data, institutional sources, and
      independent interpretation.
  traceability:
    heading: Source Traceability & Verification
    body: >-
      This research practice places strong emphasis on the traceability of
      information.


      All analysis is grounded in sources that can be:
    items: |-
      Clearly identified
      Independently verified
      Traced to their original institutional origin
    closing: >-
      Analytical outputs are not based on unreferenced synthesis. Where
      intermediary tools are used, underlying sources are systematically
      identified and cross-checked against primary documentation.
  tools:
    heading: Use of Analytical Tools
    intro: >-
      Analytical tools, including AI-assisted systems, are integrated into the
      research and drafting process as support instruments.


      They are used to:
    usedItems: |-
      explore lines of inquiry;
      structure and organize complex information;
      support drafting and synthesis.
    p3: 'However:'
    howeverItems: |-
      they are not treated as reliable sources;
      they do not determine analytical conclusions;
      outputs are not accepted without verification.
    outro: >-
      All content is systematically reviewed, validated, and grounded in
      traceable documentation.


      The analytical responsibility -- including source selection,
      interpretation, and final validation -- remains with the author.


      The use of AI expands the capacity to explore complex systems, while
      increasing the importance of verification, coherence, and accountability.
  principles:
    heading: Analytical Principles
    intro: 'The analytical process follows a set of guiding principles:'
    items:
      - title: Structural focus
        desc: >-
          Emphasis on structural dynamics and system-level interactions rather
          than short-term events or commentary
      - title: Cross-domain synthesis
        desc: >-
          Integration of economic, geopolitical, environmental, and
          technological perspectives
      - title: Comparative observation
        desc: >-
          Use of international comparisons to identify structural differences
          and patterns
      - title: Clarity and accessibility
        desc: >-
          Translation of complex material into structured analysis accessible to
          non-specialists
      - title: Source transparency
        desc: >-
          Reliance on traceable, verifiable information, with documentation and
          sources available upon request
  limits:
    heading: Limits & Uncertainty
    body: >-
      This work is based on open-source information and is subject to data
      limitations, uncertainty, and the constraints of independent research.


      Limitations include:
    items: >-
      incomplete or delayed data in certain domains;

      uncertainty in long-term projections, particularly in climate and
      technological systems;

      constraints inherent to independent research without access to proprietary
      datasets.
    closing: >-
      Where uncertainty exists, it is treated as part of the analytical context
      rather than eliminated.
  referencing:
    heading: Referencing Approach
    sources:
      heading: Sources & Documentation
      body: >-
        Analysis is grounded in publicly available institutional sources. Rather
        than relying on exhaustive academic referencing, sources are integrated
        into the analytical narrative.


        Key institutions, datasets, and publications are identified where
        relevant to ensure transparency and traceability.
    citation:
      heading: Citation Philosophy
      intro: 'The objective is to balance readability and traceability:'
      items: >-
        References anchor analysis rather than document every input

        Priority is given to primary and institutional sources

        Over-citation is avoided to preserve clarity

        Synthesis may integrate multiple sources without listing each
        individually
      closing: >-
        This approach reflects practices used in policy analysis and applied
        research environments.
  position:
    heading: Position
    body: >-
      TransHorizons operates at the intersection of institutional analytical
      standards and independent research.


      The objective is to contribute structured, source-based analysis that
      clarifies complex global dynamics without relying on institutional
      affiliation or proprietary data access.
fr:
  backLabel: Retour à l'accueil
  method:
    heading: Approche de recherche
    label: Pratique analytique
    body: >-
      TransHorizons est une initiative analytique indépendante axée sur la
      compréhension de la manière dont les grands systèmes influencent les
      dynamiques géopolitiques, économiques et technologiques.


      Les recherches s’appuient principalement sur des sources institutionnelles
      et faisant autorité accessibles au public, notamment les organismes
      nationaux de statistique, les ministères fédéraux, les organisations
      internationales et les travaux de recherche évalués par les pairs.


      L’approche repose sur l’analyse des dynamiques structurelles plutôt que
      sur l’examen d’événements isolés, en mettant particulièrement l'accent sur
      la position du Canada au sein de systèmes mondiaux en évolution.


      Les travaux combinent documentation institutionnelle, synthèse
      interdisciplinaire et suivi des développements internationaux afin de
      produire des analyses structurées et accessibles.
  scope:
    heading: Champ d’analyse
    intro: >-
      Les travaux examinent des systèmes interconnectés dans quatre grands
      domaines :
    items:
      - title: Systèmes structurels
        desc: >-
          Les tendances à long terme qui façonnent le développement du Canada,
          notamment la géographie, l’orientation vers les ressources et
          l’intégration aux marchés mondiaux.
      - title: Systèmes matériels
        desc: >-
          Les systèmes fondés sur les ressources, tels que l’énergie, les
          minéraux critiques et les écosystèmes forestiers, ainsi que leur rôle
          dans les transformations industrielles et environnementales.
      - title: Systèmes technologiques
        desc: >-
          Les infrastructures numériques, l’intelligence artificielle et les
          cadres de gouvernance qui façonnent de nouvelles formes de pouvoir
          économique et politique.
      - title: Systèmes économiques et commerciaux
        desc: >-
          Les relations commerciales, les politiques industrielles et les
          dynamiques des chaînes d’approvisionnement, particulièrement dans les
          contextes nord-américain et transatlantique.
    closing: >-
      Ces domaines sont abordés comme des composantes interdépendantes d’un
      système plus vaste, plutôt que comme des champs d’analyse distincts.
  sources:
    heading: Sources utilisées
    intro: >-
      La recherche s’appuie principalement sur des sources institutionnelles et
      faisant autorité accessibles au public, notamment :
    items: >-
      les organismes statistiques nationaux, par exemple Statistique Canada;

      les ministères et organismes fédéraux, par exemple Ressources naturelles
      Canada;

      les organisations internationales, par exemple l’Agence internationale de
      l’énergie, l’OCDE et la Banque mondiale;

      des travaux universitaires évalués par les pairs et des publications
      scientifiques;

      des rapports officiels, des documents de politique publique et des
      publications techniques.
    closing: >-
      Ces sources sont complétées par un suivi continu des développements
      géopolitiques, des indicateurs économiques et des données propres à
      certains secteurs.
  process:
    heading: Rythme de mise à jour
    intro: 'Les travaux de recherche suivent un rythme mixte :'
    items:
      - bold: Analyses
        rest: ': publiées périodiquement et axées sur des thèmes structurels;'
      - bold: Notes de recherche
        rest: ': réflexions ponctuelles liées à des évolutions en cours;'
      - bold: Cartes et visualisations
        rest: >-
          : produites en parallèle des analyses et, dans certains cas,
          approfondies sous forme d’explorations visuelles autonomes.
    closing: >-
      Cette structure permet de soutenir à la fois un travail analytique de long
      terme et le développement progressif de cadres visuels thématiques.
  mapping:
    heading: Méthodologie cartographique
    body: >-
      La cartographie est utilisée comme outil d’analyse et de synthèse des
      dynamiques spatiales et systémiques.


      Les cartes et illustrations visent notamment à :
    items: >-
      révéler les relations spatiales entre ressources, infrastructures et
      dynamiques géopolitiques;

      synthétiser des ensembles de données complexes sous forme de systèmes
      lisibles;

      soutenir l’analyse comparative entre régions et espaces stratégiques;

      illustrer les dynamiques structurelles et les transformations à long
      terme.
    closing: >-
      Elles combinent des données accessibles au public, des sources
      institutionnelles et une interprétation indépendante.
  traceability:
    heading: Traçabilité et vérification des sources
    body: >-
      Cette pratique de recherche accorde une grande importance a la tracabilite
      de l'information.


      Toute analyse est fondee sur des sources pouvant etre :
    items: |-
      Clairement identifiees
      Verifiees de maniere independante
      Retracees jusqu'a leur origine institutionnelle
    closing: >-
      Les productions analytiques ne reposent pas sur des syntheses non
      referencees. Lorsque des outils intermediaires sont utilises, les sources
      sous-jacentes sont systematiquement identifiees et recoupees avec la
      documentation primaire.
  tools:
    heading: Utilisation d'outils analytiques
    intro: >-
      Des outils d’analyse, y compris des systèmes assistés par l’intelligence
      artificielle, sont intégrés au processus de recherche et de rédaction à
      titre d’instruments de soutien.


      Ils sont utilisés pour :
    usedItems: |-
      explorer des pistes de recherche;
      structurer et organiser des informations complexes;
      appuyer la rédaction et la synthèse.
    p3: 'Cependant :'
    howeverItems: |-
      ils ne sont pas considérés comme des sources d'informations fiables;
      ils ne déterminent pas les conclusions analytiques;
      les résultats produits ne sont pas acceptés sans vérification.
    outro: >-
      L’ensemble du contenu fait l’objet d’une révision systématique, d’une
      validation et d’un ancrage dans une documentation vérifiable.


      La responsabilité analytique (y compris la sélection des sources,
      l’interprétation et la validation finale) demeure assumée par l’autrice.


      L’utilisation de l’IA accroît les capacités d’exploration de systèmes
      complexes, tout en renforçant l’importance de la vérification, de la
      cohérence et de la responsabilité.
  principles:
    heading: Principes d’analyse
    intro: 'Le processus d’analyse repose sur un ensemble de principes directeurs :'
    items:
      - title: Attention portée aux structures
        desc: >-
          Accent mis sur les dynamiques structurelles et les interactions à
          l’échelle des systèmes, plutôt que sur les événements de court terme
          ou le commentaire conjoncturel.
      - title: Synthèse interdomaines
        desc: >-
          Intégration de perspectives économiques, géopolitiques,
          environnementales et technologiques.
      - title: Observation comparative
        desc: >-
          Recours aux comparaisons internationales afin de dégager les
          différences structurelles et les tendances récurrentes.
      - title: Clarté et accessibilité
        desc: >-
          Transformation de contenus complexes en analyses structurées,
          accessibles aux non-spécialistes.
      - title: Transparence des sources
        desc: >-
          Appui sur des informations traçables et vérifiables, avec documents et
          sources disponibles sur demande.
  limits:
    heading: Limites et incertitude
    body: >-
      Ces travaux s’appuient sur des informations de sources ouvertes et
      demeurent soumis aux limites des données disponibles, à l’incertitude et
      aux contraintes propres à la recherche indépendante.


      Ces limites comprennent notamment :
    items: >-
      des données incomplètes ou différées dans certains domaines;

      une incertitude entourant les projections à long terme, en particulier
      dans le cas des systèmes climatiques et technologiques;

      les contraintes inhérentes à une recherche indépendante menée sans accès à
      des ensembles de données propriétaires.
    closing: >-
      Lorsque l’incertitude est présente, elle est intégrée au contexte
      analytique plutôt que d'être éliminée.
  referencing:
    heading: Approche de référencement
    sources:
      heading: Sources et documentation
      body: >-
        L'analyse repose sur des sources institutionnelles accessibles au
        public. Plutot que de s'appuyer sur un referencement academique
        exhaustif, les sources sont integrees dans la narration analytique.


        Les institutions, ensembles de donnees et publications cles sont
        identifies lorsque pertinent, afin d'assurer la transparence et la
        tracabilite.
    citation:
      heading: Philosophie de citation
      intro: 'L''objectif est d''equilibrer lisibilite et tracabilite :'
      items: >-
        Les references ancrent l'analyse plutot que de documenter chaque source

        La priorite est accordee aux sources primaires et institutionnelles

        La surcitation est evitee pour preserver la clarte

        La synthese peut integrer plusieurs sources sans les enumerer
        individuellement
      closing: >-
        Cette approche reflecte les pratiques utilisees dans les environnements
        d'analyse des politiques et de recherche appliquee.
  position:
    heading: Positionnement
    body: >-
      TransHorizons se situe au croisement des normes d’analyse institutionnelle
      et de la recherche indépendante.


      L’objectif est de contribuer à une analyse structurée et fondée sur les
      sources, visant à favoriser la compréhension de dynamiques mondiales
      complexes sans s’appuyer sur une affiliation institutionnelle ni sur un
      accès à des données exclusives.
