en:
  pageTitle: Research Approach
  backLabel: Back to home
  method:
    heading: Research Approach
    label: Overview
    body: |-
      TransHorizons is an independent analytical initiative focused on understanding how large-scale systems shape geopolitical, economic, and technological outcomes.

      Research is based primarily on publicly available institutional and authoritative sources, including national statistical agencies, federal departments, international organizations, and peer-reviewed research.

      The approach is grounded in the analysis of structural dynamics rather than isolated events, with particular attention to Canada's position within evolving global systems.

      Research combines institutional documentation, cross-domain synthesis, and continuous monitoring of international developments to produce structured, accessible analysis.
  scope:
    heading: Analytical Scope
    intro: 'The work examines interconnected systems across four primary domains:'
    items:
      - title: Structural systems
        desc: >-
          Long-term patterns shaping Canada's development, including geography,
          resource orientation, and integration into global markets.
      - title: Material systems
        desc: >-
          Resource-based systems such as energy, critical minerals, and forest
          ecosystems, including their role in industrial and environmental
          transformations.
      - title: Technological systems
        desc: >-
          Digital infrastructure, artificial intelligence, and governance
          frameworks shaping emerging forms of economic and political power.
      - title: Economic and trade systems
        desc: >-
          Trade relationships, industrial policy, and supply chain dynamics,
          particularly within North American and transatlantic contexts.
    closing: >-
      These domains are treated as interdependent components of a broader system
      rather than as separate areas of analysis.
  sources:
    heading: Sources Monitored
    intro: >-
      Research is based primarily on publicly available institutional and
      authoritative sources, including:
    items: |-
      national statistical agencies (e.g., Statistics Canada);
      federal departments and agencies (e.g., Natural Resources Canada);
      international organizations (e.g., International Energy Agency, OECD, World Bank);
      peer-reviewed academic research and scientific publications;
      official reports, policy documents, and technical publications.
    closing: >-
      These sources are supplemented by ongoing monitoring of geopolitical
      developments, economic indicators, and sector-specific data.
  process:
    heading: Update Rhythm
    intro: 'Research outputs follow a mixed rhythm:'
    items:
      - bold: Analytical essays
        rest: ' (long-form): periodic, focused on structural themes;'
      - bold: Research notes
        rest: ' (short-form): more frequent, reflecting ongoing developments;'
      - bold: Maps and visualizations
        rest: ': updated as relevant data becomes available.'
    closing: >-
      This structure supports both long-term analysis and responsiveness to
      emerging developments.
  mapping:
    heading: Mapping Methodology
    body: |-
      Geospatial analysis is used to visualize system structures and relationships.

      Maps and visual outputs focus on:
    items: |-
      resource distribution and infrastructure networks;
      supply chain configurations;
      geopolitical and regional dynamics.
    closing: >-
      Mapping is used as a complementary tool to support analytical
      interpretation rather than as an end in itself.
  traceability:
    heading: "Source Traceability \u0026 Verification"
    body: |-
      This research practice places strong emphasis on the traceability of information.

      All analysis is grounded in sources that can be:
    items: |-
      Clearly identified
      Independently verified
      Traced to their original institutional origin
    closing: >-
      Analytical outputs are not based on unreferenced synthesis. Where
      intermediary tools are used, underlying sources are systematically
      identified and cross-checked against primary documentation.
  tools:
    heading: Use of Analytical Tools
    intro: |-
      Analytical tools, including AI-assisted systems, are integrated into the research and drafting process as support instruments.

      They are used to:
    usedItems: |-
      explore lines of inquiry;
      structure and organize complex information;
      support drafting and synthesis.
    p3: 'However:'
    howeverItems: |-
      they are not treated as sources;
      they do not determine analytical conclusions;
      outputs are not accepted without verification.
    outro: |-
      All content is systematically reviewed, validated, and grounded in traceable documentation.

      The analytical responsibility -- including source selection, interpretation, and final validation -- remains fully with the author.

      The use of AI expands the capacity to explore complex systems, while increasing the importance of verification, coherence, and accountability.
  principles:
    heading: Analytical Principles
    intro: 'The analytical process follows a set of guiding principles:'
    items:
      - title: Structural focus
        desc: >-
          Emphasis on structural dynamics and system-level interactions rather
          than short-term events or commentary
      - title: Cross-domain synthesis
        desc: >-
          Integration of economic, geopolitical, environmental, and
          technological perspectives
      - title: Comparative observation
        desc: >-
          Use of international comparisons to identify structural differences
          and patterns
      - title: Clarity and accessibility
        desc: >-
          Translation of complex material into structured analysis accessible
          to non-specialists
      - title: Source transparency
        desc: >-
          Reliance on traceable, verifiable information, with full documentation
          available upon request
  limits:
    heading: "Limits \u0026 Uncertainty"
    body: |-
      This work is based on open-source information and is subject to data limitations, uncertainty, and the constraints of independent research.

      Limitations include:
    items: |-
      incomplete or delayed data in certain domains;
      uncertainty in long-term projections, particularly in climate and technological systems;
      constraints inherent to independent research without access to proprietary datasets.
    closing: >-
      Where uncertainty exists, it is treated as part of the analytical context
      rather than eliminated.
  referencing:
    heading: Referencing Approach
    sources:
      heading: "Sources \u0026 Documentation"
      body: |-
        Analysis is grounded in publicly available institutional sources. Rather than relying on exhaustive academic referencing, sources are integrated into the analytical narrative.

        Key institutions, datasets, and publications are identified where relevant to ensure transparency and traceability.
    citation:
      heading: Citation Philosophy
      intro: 'The objective is to balance readability and traceability:'
      items: |-
        References anchor analysis rather than document every input
        Priority is given to primary and institutional sources
        Over-citation is avoided to preserve clarity
        Synthesis may integrate multiple sources without listing each individually
      closing: >-
        This approach reflects practices used in policy analysis and applied
        research environments.
  position:
    heading: Position
    body: |-
      TransHorizons operates at the intersection of institutional analytical standards and independent research.

      The objective is to contribute structured, source-based analysis that clarifies complex global dynamics without relying on institutional affiliation or proprietary data access.
fr:
  pageTitle: Approche de recherche
  backLabel: "Retour \u00E0 l'accueil"
  method:
    heading: "M\u00E9thode et approche"
    label: Pratique analytique
    body: |-
      TransHorizons applique une pratique analytique structuree, ancree dans la documentation institutionnelle, la recherche multidisciplinaire et le suivi a long terme des systemes geopolitiques, des ressources et de la technologie.

      Cette initiative s'appuie sur plus de vingt-cinq ans d'engagement aupres d'institutions federales canadiennes, notamment Statistique Canada et Ressources naturelles Canada, ou le travail analytique est fonde sur des donnees documentees, des systemes statistiques et des environnements de recherche axes sur les politiques.

      L'objectif n'est pas le commentaire, mais la clarification : traduire les connaissances institutionnelles dispersees en analyses structurees des systemes mondiaux.

      La recherche combine documentation institutionnelle, synthese interdisciplinaire et suivi continu des developpements internationaux pour produire une analyse structuree et accessible.
  scope:
    heading: "P\u00E9rim\u00E8tre analytique"
    intro: >-
      La recherche porte sur les dynamiques structurelles a long terme plutot
      que sur les developpements a court terme. Les domaines principaux
      comprennent :
    items:
      - title: "Syst\u00E8mes structurels"
        desc: >-
          Dynamiques a long terme faconnant le developpement du Canada, notamment
          la geographie, l'orientation vers les ressources et l'integration aux
          marches mondiaux.
      - title: "Syst\u00E8mes mat\u00E9riels"
        desc: >-
          Systemes fondes sur les ressources tels que l'energie, les mineraux
          critiques et les ecosystemes forestiers, y compris leur role dans les
          transformations industrielles et environnementales.
      - title: "Syst\u00E8mes technologiques"
        desc: >-
          Infrastructure numerique, intelligence artificielle et cadres de
          gouvernance faconnant les formes emergentes de pouvoir economique et
          politique.
      - title: "Syst\u00E8mes \u00E9conomiques et commerciaux"
        desc: >-
          Relations commerciales, politique industrielle et dynamiques des
          chaines d'approvisionnement, notamment dans les contextes
          nord-americain et transatlantique.
    closing: >-
      Ces domaines sont traites comme des composantes interdependantes d'un
      systeme plus large plutot que comme des domaines d'analyse distincts.
  sources:
    heading: "Sources surveill\u00E9es"
    intro: >-
      L'analyse repose principalement sur des sources institutionnelles et
      primaires accessibles au public, notamment :
    items: |-
      Les ministeres et organismes federaux canadiens
      Les organisations internationales (p. ex., Agence internationale de l'energie, OCDE, Banque mondiale)
      Les agences statistiques nationales et les ensembles de donnees officiels
      La documentation parlementaire et les documents de politique
      Les publications academiques et scientifiques
      Les rapports sectoriels et industriels
      Le renseignement en sources ouvertes
    closing: >-
      La priorite est accordee aux documents verificables produits dans des
      cadres institutionnels responsables.
  process:
    heading: "Processus de recherche et rythme de mise \u00E0 jour"
    intro: 'La recherche suit un modele de surveillance continue :'
    items:
      - bold: Suivi continu
        rest: ' des publications et ensembles de donnees institutionnels'
      - bold: Comparaison interdisciplinaire
        rest: ' et identification de schemas'
      - bold: "Elaboration"
        rest: " de notes analytiques et d'observations intermediaires"
      - bold: "Synthese periodique"
        rest: " sous forme d'essais et de rapports structures"
    closing: >-
      Les publications sont diffusees lorsque la coherence analytique est
      atteinte, plutot que selon un calendrier editorial fixe.
  mapping:
    heading: "M\u00E9thodologie cartographique"
    body: |-
      La cartographie est utilisee comme outil analytique plutot que comme simple complement visuel.

      Les cartes visent a :
    items: |-
      Reveler les relations spatiales entre les ressources, les infrastructures et les dynamiques geopolitiques
      Synthetiser des ensembles de donnees complexes en systemes lisibles
      Soutenir l'analyse comparative entre regions
      Illustrer les schemas structurels a long terme
    closing: >-
      Elles combinent des donnees accessibles au public, des sources
      institutionnelles et une interpretation independante.
  traceability:
    heading: "Tra\u00E7abilit\u00E9 et v\u00E9rification des sources"
    body: |-
      Cette pratique de recherche accorde une grande importance a la tracabilite de l'information.

      Toute analyse est fondee sur des sources pouvant etre :
    items: |-
      Clairement identifiees
      Verifiees de maniere independante
      Retracees jusqu'a leur origine institutionnelle
    closing: >-
      Les productions analytiques ne reposent pas sur des syntheses non
      referencees. Lorsque des outils intermediaires sont utilises, les sources
      sous-jacentes sont systematiquement identifiees et recoupees avec la
      documentation primaire.
  tools:
    heading: Utilisation des outils analytiques
    intro: |-
      Les outils analytiques, y compris les systemes assistes par intelligence artificielle, sont integres au processus de recherche et de redaction en tant qu'instruments de soutien.

      Ils sont utilises pour :
    usedItems: |-
      Explorer des pistes d'analyse
      Organiser et structurer l'information
      Soutenir la redaction du contenu analytique
    p3: 'Cependant :'
    howeverItems: |-
      Ils ne sont pas traites comme des sources
      Ils ne determinent pas les conclusions analytiques
      Les resultats ne sont pas acceptes sans verification
    outro: |-
      Tout le contenu est systematiquement revu, valide et ancre dans une documentation tracable.

      La responsabilite analytique -- y compris la selection des sources, l'interpretation et la validation finale -- reste entierement celle de l'auteure.

      Dans ce contexte, le recours a l'IA ne remplace pas le travail analytique. Il deplace l'accent vers la verification, la structuration et la responsabilite.
  principles:
    heading: Principes analytiques
    intro: "L'approche analytique repose sur un ensemble de principes directeurs :"
    items:
      - title: Ancrage institutionnel
        desc: Appui sur des sources documentees et verificables
      - title: Analyse structurelle
        desc: Accent sur les systemes et transformations a long terme
      - title: "Synthese interdisciplinaire"
        desc: "Integration de la geopolitique, des ressources, de l'economie et de la technologie"
      - title: Observation comparative
        desc: "Identification de schemas entre regions et systemes"
      - title: "Clarte plutot que complexite"
        desc: Communication accessible sans perte de rigueur
  limits:
    heading: Limites et incertitude
    body: |-
      Les systemes geopolitiques, economiques et technologiques sont par nature complexes et en evolution.

      En consequence :
    items: |-
      L'analyse privilegie l'interpretation structurelle plutot que la prediction a court terme
      Les conclusions demeurent provisoires et susceptibles d'etre revisees
      Les limites des donnees et les contraintes de visibilite sont reconnues
      La cartographie et la synthese impliquent des choix d'interpretation
    closing: >-
      L'incertitude est traitee comme une condition a rendre explicite, non a
      eliminer.
  referencing:
    heading: "Approche de r\u00E9f\u00E9rencement"
    sources:
      heading: Sources et documentation
      body: |-
        L'analyse repose sur des sources institutionnelles accessibles au public. Plutot que de s'appuyer sur un referencement academique exhaustif, les sources sont integrees dans la narration analytique.

        Les institutions, ensembles de donnees et publications cles sont identifies lorsque pertinent, afin d'assurer la transparence et la tracabilite.
    citation:
      heading: Philosophie de citation
      intro: "L'objectif est d'equilibrer lisibilite et tracabilite :"
      items: |-
        Les references ancrent l'analyse plutot que de documenter chaque source
        La priorite est accordee aux sources primaires et institutionnelles
        La surcitation est evitee pour preserver la clarte
        La synthese peut integrer plusieurs sources sans les enumerer individuellement
      closing: >-
        Cette approche reflecte les pratiques utilisees dans les environnements
        d'analyse des politiques et de recherche appliquee.
  position:
    heading: Position
    body: |-
      TransHorizons opere en tant qu'initiative de recherche independante cherchant a s'aligner sur les normes analytiques institutionnelles tout en conservant la souplesse de l'enquete independante.

      L'objectif est de contribuer a une analyse structuree et fondee sur des donnees probantes a une comprehension plus large des transformations mondiales affectant le Canada et le systeme international.