    },
    {
      "title": "Criminal violence escalation (PCC/CV expansion)",
      "trigger": "PCC and Comando Vermelho territorial expansion into the Legal Amazon and northeast Brazil — with ACLED recording a 12% rise in security-force fatalities in 2025 [acled-latam-november-2025] and Maranhão reaching record violence levels — could breach a threshold where state security capacity is structurally overwhelmed, generating investment-deterring no-go zones in agribusiness corridors and port logistics hubs.",
      "probability": "High",
      "impact": "Med",
      "timeHorizon": "0–6 months (May–Oct 2026)",
      "leadingIndicators": "ACLED monthly event count for Brazil exceeding 3-year rolling average by >20% [acled-brazil-country-profile]; UNODC homicide rate reversing its modest downward trend and rising above 22 per 100,000 [unodc-data-portal-homicide-brazil]; federal security-force deployment orders to additional states beyond Rio de Janeiro and Bahia.",
      "mitigants": "Federal security interventions and National Public Security Programme deployments; cross-state intelligence-sharing agreements under the Ministry of Justice framework; WJP rule-of-law improvement trend providing incremental prosecutorial capacity [wjp-rule-of-law-2025-brazil]."
    },
    {
      "title": "Currency crisis and capital flight",
      "trigger": "A combination of a widening current account deficit — USD 68.8 billion in 2025, equivalent to 3.02% of GDP [bcb-external-sector-stats-march-2026] — alongside a global risk-off episode (e.g., escalation of Middle East conflict, US recession) or domestic fiscal slippage could trigger rapid BRL depreciation, amplifying inflation and forcing the BCB to abandon its nascent easing cycle [bcb-copom-selic-april-2026].",
      "probability": "Med",
      "impact": "High",
      "timeHorizon": "3–9 months (Aug 2026 – Feb 2027)",
      "leadingIndicators": "BRL/USD crossing R$6.20 on a sustained basis; BCB international reserves declining more than 8% from current levels; BIS-reported cross-border claims withdrawal from Brazil accelerating [bis-locational-banking-brazil]; Focus Survey 2026 exchange-rate forecast exceeding R$6.50 [bcb-focus-market-readout].",
      "mitigants": "USD 77.7 billion FDI fully financing the current account gap [bcb-external-sector-stats-march-2026]; international reserves above USD 360 billion providing intervention buffer; BCB's inflation-targeting credibility and swap-line readiness [bcb-monetary-policy-report-march-2026]."
    },
    {
      "title": "Amazon deforestation and environmental security risk",
      "trigger": "Acceleration of illegal deforestation — particularly in the Cerrado and transitional forest zones — driven by land-grabbing networks linked to organized crime could trigger EU–Mercosur implementation clauses requiring suspension of preferential tariff schedules [eu-mercosur-agreement-text-ec], generate retaliatory import restrictions from key trading partners, and expose Brazilian commodity exporters to systemic ESG divestment flows.",
      "probability": "Med",
      "impact": "Med",
      "timeHorizon": "6–18 months (Nov 2026 – May 2028)",
      "leadingIndicators": "INPE/PRODES deforestation alerts exceeding 11,000 km² annually; EU parliamentary committees invoking deforestation regulation Article 10 compliance review against Brazilian suppliers [eu-mercosur-agreement-text-ec]; ACLED events in forest-frontier municipalities rising [acled-latam-november-2025].",
      "mitigants": "Lula administration's stated zero-deforestation commitment backed by PPCDAm federal plan; EU–Mercosur sustainability chapter enforcement creating external accountability [brazil-mre-mercosur-eu-factsheet]; IBAMA enforcement budget increase and SIPRI-tracked military deployment to border zones [sipri-milex-2025-factsheet]."
    },
    {
      "title": "Coalition collapse and government paralysis",
      "trigger": "The Lula government's congressional base — already exhibiting its lowest vote-loyalty rate since 1995 [freedom-house-brazil-2025] — could fracture if the fiscal adjustment required under the arcabouço fiscal [stn-fiscal-outlook-2025-h2] forces cuts to patronage-laden transfers that sustain Centrão support, particularly should a corruption investigation implicating a key coalition partner emerge in the pre-election window.",
      "probability": "Med",
      "impact": "Med",
      "timeHorizon": "3–8 months (Aug–Dec 2026)",
      "leadingIndicators": "Government losing three or more consecutive roll-call votes on priority legislation; IMF Article IV consultation flagging fiscal rule non-compliance [imf-article-iv-2025-brazil]; BCB Focus Survey presidential approval dropping below 30% in consecutive months [bcb-focus-market-readout]; key Centrão party formally leaving the government coalition.",
      "mitigants": "Brazil's coalitional presidentialism provides established mechanisms for cabinet reshuffles and budget deals that can re-anchor wavering allies [imf-article-iv-2025-brazil]; decentralised federal structure limits national paralysis from central-government dysfunction; WJP institutional checks constrain executive unilateralism [wjp-rule-of-law-2025-brazil]."
    }
  ]
risks_fr: |-
  [
    {
      "title": "Polarisation électorale et stress institutionnel post-électoral",
      "trigger": "L'élection générale d'octobre 2026 — la première depuis la condamnation de Bolsonaro à 27 ans [stf-bolsonaro-conviction-ruling] — risque de produire un résultat contesté ou un candidat de droite dure exploitant les griefs judiciaires ; un résultat serré pourrait déclencher des manifestations de masse, des campagnes de délégitimation institutionnelle, ou une remobilisation de réseaux alignés sur l'armée déjà poursuivis pour la tentative de coup d'État de 2022.",
      "probability": "High",
      "impact": "High",
      "timeHorizon": "5–12 mois (oct. 2026 – avr. 2027)",
      "leadingIndicators": "L'écart entre les principaux candidats se rétrécissant à moins de 5 points de pourcentage [freedom-house-brazil-2025] ; le TSE (tribunal électoral) émettant des ordonnances d'urgence contre la désinformation ; la loyauté aux votes de la coalition gouvernementale tombant encore en dessous du plancher actuel de 72 % [freedom-house-brazil-2025] ; augmentation des événements de violence politique codés par ACLED [acled-brazil-country-profile].",
      "mitigants": "Effet dissuasif du STF établi par 29 condamnations liées au complot de coup d'État [stf-bolsonaro-conviction-ruling] ; tribunal électoral indépendant avec un solide bilan d'application ; norme post-1985 de transfert ininterrompu du pouvoir au Brésil [freedom-house-fiw-2026-global]."
    },
    {
      "title": "Détérioration budgétaire et spirale de la dette souveraine",
      "trigger": "La dette publique brute à 78,7 % du PIB [stn-monthly-debt-report-jan-2026] avec des coûts nets d'intérêt approchant 7 % du PIB [stn-fiscal-outlook-2025-h2] crée un piège de dynamique de dette : si le solde primaire dépasse la tolérance de -0,25 pp de la règle budgétaire — plausible compte tenu des engagements de dépenses pré-électoraux incluant l'exemption d'impôt sur le revenu proposée de R$5 000 — les primes de risque implicites du marché pourraient pousser les rendements réels au-dessus du taux de croissance, déclenchant une spirale d'endettement auto-renforçante.",
      "probability": "Med",
      "impact": "High",
      "timeHorizon": "6–18 mois (nov. 2026 – mai 2028)",
      "leadingIndicators": "La prévision IPCA sur 12 mois du sondage Focus BCB dépassant le plafond de 5 % [bcb-focus-market-readout] ; la courbe des contrats DI à terme s'accentuant de plus de 200 pb sur la duration 2 ans ; le solde primaire mensuel STN affichant un déficit >0,5 % du PIB [stn-resultado-tesouro-march-2026] ; dégradation par le FMI des perspectives de dette à moyen terme du Brésil [imf-weo-april-2026-brazil].",
      "mitigants": "La règle arcabouço fiscal impose un plafond légal à la croissance des dépenses [stn-fiscal-outlook-2025-h2] ; l'indépendance opérationnelle de la BCB contraint le financement monétaire [bcb-monetary-policy-report-march-2026] ; les entrées d'IDE de 77,7 milliards USD [bcb-external-sector-stats-march-2026] constituent un tampon de financement externe à court terme."
    },
    {
      "title": "Escalade de la violence criminelle (expansion PCC/CV)",
      "trigger": "L'expansion territoriale du PCC et du Comando Vermelho dans l'Amazonie légale et le nord-est du Brésil — ACLED enregistrant une hausse de 12 % des décès des forces de sécurité en 2025 [acled-latam-november-2025] et le Maranhão atteignant des niveaux de violence records — pourrait franchir un seuil où la capacité sécuritaire de l'État est structurellement dépassée, créant des zones de non-droit qui dissuadent l'investissement dans les corridors agro-industriels et les hubs logistiques portuaires.",
      "probability": "High",
      "impact": "Med",
      "timeHorizon": "0–6 mois (mai–oct. 2026)",
      "leadingIndicators": "Le nombre mensuel d'événements ACLED pour le Brésil dépassant de plus de 20 % la moyenne sur 3 ans [acled-brazil-country-profile] ; le taux d'homicides UNODC inversant sa légère tendance à la baisse et dépassant 22 pour 100 000 [unodc-data-portal-homicide-brazil] ; ordres de déploiement des forces de sécurité fédérales dans des États supplémentaires au-delà de Rio de Janeiro et de Bahia.",
      "mitigants": "Interventions fédérales de sécurité et déploiements du Programme national de sécurité publique ; accords de partage de renseignements inter-États dans le cadre du ministère de la Justice ; tendance à l'amélioration de l'état de droit du WJP renforçant progressivement la capacité de poursuite [wjp-rule-of-law-2025-brazil]."
    },
    {
      "title": "Crise monétaire et fuite des capitaux",
      "trigger": "Une combinaison d'un déficit courant croissant — 68,8 milliards USD en 2025, soit 3,02 % du PIB [bcb-external-sector-stats-march-2026] — associée à un épisode mondial d'aversion au risque (p. ex., escalade du conflit au Moyen-Orient, récession américaine) ou à un dérapage budgétaire intérieur pourrait déclencher une dépréciation rapide du BRL, amplifiant l'inflation et contraignant la BCB à abandonner son cycle d'assouplissement naissant [bcb-copom-selic-april-2026].",
      "probability": "Med",
      "impact": "High",
      "timeHorizon": "3–9 mois (août 2026 – févr. 2027)",
      "leadingIndicators": "BRL/USD franchissant R$6,20 de façon durable ; réserves internationales de la BCB baissant de plus de 8 % par rapport aux niveaux actuels ; accélération du retrait des créances transfrontalières déclaré par la BRI [bis-locational-banking-brazil] ; prévision du taux de change 2026 du sondage Focus dépassant R$6,50 [bcb-focus-market-readout].",
      "mitigants": "Les IDE de 77,7 milliards USD financent intégralement le déficit du compte courant [bcb-external-sector-stats-march-2026] ; réserves internationales supérieures à 360 milliards USD offrant un tampon d'intervention ; crédibilité du ciblage de l'inflation de la BCB et disponibilité des lignes de swap [bcb-monetary-policy-report-march-2026]."
    },
    {
      "title": "Déforestation amazonienne et risque de sécurité environnementale",
      "trigger": "L'accélération de la déforestation illégale — notamment dans le Cerrado et les zones forestières de transition — menée par des réseaux d'accaparement de terres liés à la criminalité organisée pourrait déclencher les clauses de mise en œuvre UE–Mercosur exigeant la suspension des calendriers tarifaires préférentiels [eu-mercosur-agreement-text-ec], générer des restrictions d'importation de représailles de la part des principaux partenaires commerciaux, et exposer les exportateurs de matières premières brésiliens à des flux systémiques de désinvestissement ESG.",
      "probability": "Med",
      "impact": "Med",
      "timeHorizon": "6–18 mois (nov. 2026 – mai 2028)",
      "leadingIndicators": "Alertes de déforestation INPE/PRODES dépassant 11 000 km² annuellement ; comités parlementaires européens invoquant l'examen de conformité à l'Article 10 du règlement sur la déforestation contre les fournisseurs brésiliens [eu-mercosur-agreement-text-ec] ; hausse des événements ACLED dans les municipalités frontalières forestières [acled-latam-november-2025].",
      "mitigants": "Engagement de déforestation zéro de l'administration Lula soutenu par le plan fédéral PPCDAm ; application du chapitre durabilité de l'UE–Mercosur créant une responsabilité externe [brazil-mre-mercosur-eu-factsheet] ; augmentation du budget d'application de l'IBAMA et déploiement militaire suivi par le SIPRI dans les zones frontalières [sipri-milex-2025-factsheet]."
    },
    {
      "title": "Effondrement de la coalition et paralysie gouvernementale",
      "trigger": "La base parlementaire du gouvernement Lula — affichant déjà son taux de loyauté aux votes le plus bas depuis 1995 [freedom-house-brazil-2025] — pourrait se fracturer si l'ajustement budgétaire requis par l'arcabouço fiscal [stn-fiscal-outlook-2025-h2] impose des coupes dans les transferts à fort clientélisme qui maintiennent le soutien du Centrão, en particulier si une enquête pour corruption impliquant un partenaire clé de coalition émerge dans la fenêtre pré-électorale.",
      "probability": "Med",
      "impact": "Med",
      "timeHorizon": "3–8 mois (août–déc. 2026)",
      "leadingIndicators": "Le gouvernement perdant trois votes nominatifs consécutifs ou plus sur des législations prioritaires ; la consultation de l'Article IV du FMI signalant une non-conformité à la règle budgétaire [imf-article-iv-2025-brazil] ; la popularité présidentielle dans le sondage Focus BCB tombant en dessous de 30 % plusieurs mois de suite [bcb-focus-market-readout] ; un parti clé du Centrão quittant formellement la coalition gouvernementale.",
      "mitigants": "Le présidentialisme de coalition brésilien fournit des mécanismes établis de remaniements ministériels et d'accords budgétaires pouvant re-ancrer les alliés hésitants [imf-article-iv-2025-brazil] ; la structure fédérale décentralisée limite la paralysie nationale due au dysfonctionnement du gouvernement central ; les contrôles institutionnels du WJP contraignent l'unilatéralisme exécutif [wjp-rule-of-law-2025-brazil]."
    }
  ]
