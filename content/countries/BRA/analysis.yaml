executiveSnapshot_en: >-
  Regime type: Federal presidential republic (Senate 81 seats, Chamber 513
  seats). Luiz Inácio Lula da Silva (PT) is president since January 2023,
  seeking a fourth term in the October 4, 2026 general election. V-Dem Liberal
  Democracy Index 0.71 (2024); Freedom House score 73/100 (2026 report)
  [vdem-dataset-v16][freedom-house-fiw-2026-global].

  Political equilibrium: Highly polarized. Lula governs via "coalitional
  presidentialism" across 11+ parties; government vote-loyalty fell to 72% in
  early 2026, the lowest since 1995. Former president Bolsonaro was convicted in
  late 2025 to 27 years for leading the 2022 coup attempt and barred from office
  until 2060. His son Flávio Bolsonaro leads the right-wing opposition
  [stf-bolsonaro-conviction-ruling][freedom-house-brazil-2025].

  Economic model: GDP R$12.7 trillion (2025); grew 2.3% in 2025, fifth
  consecutive year of growth, decelerating from 3.4% in 2024. IMF 2026 growth
  forecast upgraded to 1.9%. Selic easing cycle underway: 14.50% as of 29 April
  2026. Full-year 2025 IPCA at 4.26%, above the 3% target; 2026 consensus at
  4.80%
  [ibge-gdp-2025-annual][imf-weo-april-2026-brazil][bcb-copom-selic-april-2026][ibge-ipca-december-2025].

  Fiscal: 12-month primary deficit at 1.03% of GDP (March 2026). Gross public
  debt 78.7% of GDP; net interest costs ~7% of GDP. Tesouro Nacional's
  medium-term baseline projects stabilisation conditional on maintaining the
  arcabouço fiscal rule — politically difficult pre-election
  [stn-resultado-tesouro-march-2026][stn-monthly-debt-report-jan-2026][stn-fiscal-outlook-2025-h2].

  External: 2025 current account deficit USD 68.8 bn (3.02% of GDP), fully
  covered by USD 77.7 bn FDI. Trade surplus Jan—Apr 2026: USD 23.3 bn.
  EU—Mercosur Agreement entered provisional application 1 May 2026
  [bcb-external-sector-stats-march-2026][mdic-balanca-comercial-april-2026][eu-mercosur-agreement-text-ec].

  Security: Homicide rate 19.3/100,000 (UNODC 2023); modest downward trend but
  fragile. ACLED recorded 12% rise in security-force fatalities in 2025; October
  2025 Rio operation killed 121 — deadliest on record. PCC and CV expanding into
  Legal Amazon and northeast
  [unodc-data-portal-homicide-brazil][acled-latam-november-2025].

  Top 3 risks (5—18 months): (1) Contested October 2026 election triggering
  institutional breakdown; (2) Fiscal slippage beyond arcabouço tolerance
  initiating sovereign debt spiral; (3) PCC/CV territorial expansion
  overwhelming state security capacity.

  Watch items (4—12 weeks): Polling gap between top candidates; BCB Focus Survey
  IPCA forecast trend; ACLED event count trajectory in northeast Brazil.

  Data confidence: High. All key figures sourced from IBGE, BCB, Tesouro
  Nacional, IMF, SIPRI, Freedom House, WJP, ACLED, UNODC, and STF primary
  records.
executiveSnapshot_fr: >-
  Type de régime : République présidentielle fédérale (Sénat 81 sièges, Chambre
  513 sièges). Luiz Inácio Lula da Silva (PT) est président depuis janvier 2023,
  en quête d'un quatrième mandat lors des élections générales du 4 octobre 2026.
  Indice de démocratie libérale V-Dem 0,71 (2024); score Freedom House 73/100
  (rapport 2026) [vdem-dataset-v16][freedom-house-fiw-2026-global].

  Équilibre politique : Hautement polarisé. Lula gouverne via le «
  présidentialisme de coalition » avec 11+ partis ; la loyauté aux votes du
  gouvernement est tombée à 72 % début 2026, son niveau le plus bas depuis 1995.
  L'ancien président Bolsonaro a été condamné fin 2025 à 27 ans pour avoir
  dirigé la tentative de coup d'État de 2022 et interdit de fonctions jusqu'en
  2060. Son fils Flávio Bolsonaro dirige l'opposition de droite
  [stf-bolsonaro-conviction-ruling][freedom-house-brazil-2025].

  Modèle économique : PIB de R$12,7 billions (2025); croissance de 2,3 % en
  2025, cinquième année consécutive, en décélération par rapport aux 3,4 % de
  2024. Prévision de croissance FMI 2026 relevée à 1,9 %. Cycle
  d'assouplissement Selic en cours : 14,50 % au 29 avril 2026. IPCA annuel 2025
  à 4,26 %, au-dessus de l'objectif de 3 % ; consensus 2026 à 4,80 %
  [ibge-gdp-2025-annual][imf-weo-april-2026-brazil][bcb-copom-selic-april-2026][ibge-ipca-december-2025].

  Budgétaire : Déficit primaire cumulé sur 12 mois à 1,03 % du PIB (mars 2026).
  Dette publique brute 78,7 % du PIB ; coûts nets d'intérêt ~7 % du PIB. La
  trajectoire de référence à moyen terme du Tesouro Nacional projette une
  stabilisation sous condition du respect de la règle arcabouço fiscal — défi
  politique important en période pré-électorale
  [stn-resultado-tesouro-march-2026][stn-monthly-debt-report-jan-2026][stn-fiscal-outlook-2025-h2].

  Extérieur : Déficit courant 2025 de 68,8 milliards USD (3,02 % du PIB),
  entièrement couvert par 77,7 milliards USD d'IDE. Excédent commercial
  janv.—avr. 2026 : 23,3 milliards USD. L'accord UE—Mercosur est entré en
  application provisoire le 1er mai 2026
  [bcb-external-sector-stats-march-2026][mdic-balanca-comercial-april-2026][eu-mercosur-agreement-text-ec].

  Sécurité : Taux d'homicides 19,3/100 000 (UNODC 2023) ; tendance modérément à
  la baisse mais fragile. ACLED enregistre une hausse de 12 % des décès des
  forces de sécurité en 2025 ; l'opération de Rio en octobre 2025 a tué 121
  personnes — la plus meurtrière jamais enregistrée. Le PCC et le CV s'étendent
  dans l'Amazonie légale et le nord-est
  [unodc-data-portal-homicide-brazil][acled-latam-november-2025].

  Top 3 risques (5—18 mois) : (1) Élection d'octobre 2026 contestée déclenchant
  une rupture institutionnelle ; (2) Dérapage budgétaire au-delà de la tolérance
  de l'arcabouço initiant une spirale de dette souveraine ; (3) Expansion
  territoriale PCC/CV dépassant la capacité sécuritaire de l'État.

  Éléments à surveiller (4—12 semaines) : Écart de sondage entre les principaux
  candidats ; tendance des prévisions IPCA du sondage Focus BCB ; trajectoire du
  nombre d'événements ACLED dans le nord-est brésilien.

  Confiance dans les données : Élevée. Tous les chiffres clés proviennent de
  sources primaires : IBGE, BCB, Tesouro Nacional, FMI, SIPRI, Freedom House,
  WJP, ACLED, UNODC et STF.

  Équilibre politique : Hautement polarisé. L'approbation de Lula ~44%,
  désapprobation ~51% (mars 2026). Opposition menée par Flávio Bolsonaro
  (soutenu par son père Jair Bolsonaro) en égalité avec Lula dans les scénarios
  de second tour. Coalition fragile ; Lula a forcé un remaniement ministériel
  (mars 2026) pour renforcer l'unité. Le Congrès est fragmenté entre 30+ partis
  ; aucun parti n'est dominant. La démocratie institutionnelle est résiliente
  mais la polarisation est aiguë.

  Modèle économique : Grande économie de revenu intermédiaire (PIB nominal ~2,1
  billions de dollars). Structure duelle : (1) Exportations de matières
  premières (agriculture, minéraux, pétrole) ; (2) Services et fabrication. Les
  pressions inflationnistes augmentent ; le déficit budgétaire prévu est de 8,1
  % du PIB (2026)—le plus grand d'Amérique latine. La dette publique augmente.
  Le taux Selic est à 14,75 % (mars 2026). Croissance prévue 1,7 % (2026), en
  dessous du potentiel. Instabilité monétaire ; le Real se déprécie.

  Top 3 risques (6—18 mois) : (1) Polarisation électorale et stress
  institutionnel si la faction Bolsonaro conteste les résultats ou intensifie la
  confrontation ; (2) Crise budgétaire due à un déficit insoutenable et à une
  dette croissante, forçant l'austérité ou risquant le défaut ; (3) Escalade de
  la violence criminelle alors que le PCC et le CV diversifient les opérations
  et que les États-Unis les désignent comme organisations terroristes.

  Top 3 éléments à surveiller (4—12 semaines) : (1) Résultats des élections du 4
  octobre 2026 et conséquences immédiates—risque de rupture institutionnelle si
  le résultat serré est contesté ; (2) Politique monétaire de la Banque centrale
  et stabilité monétaire—la faiblesse du Real pourrait déclencher des fuites de
  capitaux ; (3) Escalade de la violence des gangs et opérations
  policières—risque de déstabilisation si les opérations majeures échouent.

  Dépendances externes : Les exportations de pétrole et de matières premières
  sont vulnérables aux chocs des prix mondiaux. Dépendance commerciale envers la
  Chine (plus grand partenaire commercial) ; coopération en sécurité avec les
  États-Unis ; alignement BRICS. La déforestation amazonienne est liée à la
  criminalité organisée ; menace de sécurité environnementale. Couverture
  géopolitique entre la rivalité États-Unis-Chine.

  Posture de sécurité : Violence interne élevée (taux de meurtres au-dessus des
  moyennes mondiales). Les organisations criminelles (PCC, CV) opèrent comme des
  entreprises transnationales ; infiltration de la chaîne d'approvisionnement du
  carburant, de la fintech, de l'immobilier. Les opérations policières sont de
  plus en plus militarisées ; le raid de Rio d'octobre 2025 a tué 120+ personnes
  (l'opération la plus meurtrière de l'application de la loi dans l'histoire du
  pays). Le contrôle des gangs des favelas affecte ~4 millions de personnes. Les
  États-Unis envisagent de désigner le PCC/CV comme organisations terroristes.

  Orientation diplomatique : Membre des BRICS ; accent sur la coopération
  Sud-Sud. Couverture entre les États-Unis et la Chine ; dépendance économique
  de Pékin, liens de sécurité avec Washington. La protection de l'Amazonie est
  centrale au positionnement international du Brésil ; les engagements
  environnementaux sont liés aux accords climatiques et à la pression
  internationale. Le Brésil médiatise les différends régionaux en Amérique du
  Sud ; acteur clé du MERCOSUR (bloc commercial sud-américain).

  Confiance dans les données : Moyen-Élevé. Le Brésil dispose de données
  institutionnelles solides (Banque centrale, statistiques IBGE). Presse libre
  (Folha, O Globo, Estadão). Cependant, les données sur la violence des gangs
  sont incomplètes ; les opérations de sécurité manquent de transparence. Les
  sondages électoraux sont soumis à l'incertitude.

  Perspective de base : Volatilité élevée jusqu'aux élections d'octobre 2026.
  Trois points critiques : (1) Campagne électorale (avril—octobre 2026)—la
  polarisation est susceptible de s'intensifier ; (2) Jour des élections du 4
  octobre et conséquences immédiates—stress institutionnel si contesté ; (3)
  Transition post-électorale (novembre—décembre 2026)—risque de confrontation si
  la faction Bolsonaro rejette les résultats. La crise budgétaire est un risque
  à long terme ; la violence criminelle est un risque aigu. Le gagnant fera face
  à un espace budgétaire limité et à des défis de sécurité.
political_powerStructure_en: >-
  Brazil operates as a federal presidential republic in which executive
  authority nominally concentrated in the Planalto must be continuously bartered
  with a fragmented, multi-party legislature — a system scholars call
  "coalitional presidentialism" [freedom-house-brazil-2025]. President Luiz
  Inácio Lula da Silva's third-term government initially assembled support from
  more than eleven parties and secured broad majorities in both chambers, but
  doing so required extensive concessions to the centrist Centrão bloc whose
  loyalty is transactional rather than ideological [imf-article-iv-2025-brazil].
  The structural tension between executive ambition and legislative
  price-setting was laid bare in April—May 2026, when the Senate rejected Lula's
  Supreme Court nominee and Congress overrode his veto on the Dosimetria
  sentencing law within 24 hours — government voting loyalty having fallen to
  72%, the lowest level since 1995 [freedom-house-brazil-2025]. The former
  president Jair Bolsonaro was convicted by the Supreme Federal Court (STF) in
  late 2025, receiving a 27-year-and-three-month sentence for leading an armed
  criminal organization aimed at violently nullifying the 2022 election result,
  a ruling with significant implications for the October 2026 presidential race
  [stf-bolsonaro-conviction-ruling].
political_powerStructure_fr: >-
  Le Brésil fonctionne comme une république présidentielle fédérale dans
  laquelle l'autorité exécutive nominalement concentrée au Planalto doit être
  continuellement négociée avec un législatif fragmenté et multipartite — un
  système que les chercheurs appellent le "présidentialisme de coalition"
  [freedom-house-brazil-2025]. Le gouvernement du troisième mandat du président
  Luiz Inácio Lula da Silva a initialement rassemblé le soutien de plus de onze
  partis et obtenu de larges majorités dans les deux chambres, mais cela a
  nécessité d'importantes concessions au bloc centriste Centrão dont la loyauté
  est transactionnelle plutôt qu'idéologique [imf-article-iv-2025-brazil]. La
  tension structurelle entre l'ambition exécutive et le marchandage législatif a
  été mise en évidence en avril—mai 2026, lorsque le Sénat a rejeté le candidat
  de Lula à la Cour suprême et que le Congrès a annulé son veto sur la loi
  Dosimetria dans les 24 heures — la loyauté des votes gouvernementaux ayant
  chuté à 72 %, le niveau le plus bas depuis 1995 [freedom-house-brazil-2025].
  L'ancien président Jair Bolsonaro a été condamné par le Tribunal fédéral
  suprême (STF) fin 2025, recevant une peine de 27 ans et trois mois pour avoir
  dirigé une organisation criminelle armée visant à annuler violemment le
  résultat de l'élection de 2022, une décision aux implications significatives
  pour la course présidentielle d'octobre 2026
  [stf-bolsonaro-conviction-ruling].
political_stabilityDrivers_en: >-
  Brazil's democratic resilience rests on institutional pillars that have, so
  far, withstood serious stress-testing: a supreme judiciary willing to
  prosecute a sitting former president, electoral courts that already barred
  Bolsonaro from office until 2030, and a V-Dem Liberal Democracy Index score of
  0.71 in 2024 — ranking Brazil alongside Japan and above most peer emerging
  markets [vdem-dataset-v16]. Freedom House rates Brazil Free with an aggregate
  score of 72/100 in its 2025 report, recognising competitive elections and
  vibrant public debate while flagging political polarisation and journalist
  harassment as persistent vulnerabilities
  [freedom-house-brazil-2025][freedom-house-fiw-2026-global]. The STF's December
  2025 completion of the coup-plot proceedings — resulting in 29 convictions of
  military officers and civilian co-conspirators — sent a credible deterrence
  signal ahead of the 2026 general election, strengthening the norm that
  extra-constitutional power seizure carries real judicial cost
  [stf-bolsonaro-conviction-ruling]. Brazil's electoral system, though contested
  rhetorically, has produced unbroken competitive transfers of power since 1985,
  providing an institutional floor that distinguishes it from more fragile peers
  in the region [freedom-house-fiw-2026-global].
political_stabilityDrivers_fr: >-
  La résilience démocratique du Brésil repose sur des piliers institutionnels
  qui ont, jusqu'à présent, résisté à de sérieux tests : un pouvoir judiciaire
  suprême prêt à poursuivre un ancien président, des tribunaux électoraux qui
  ont déjà interdit à Bolsonaro d'exercer des fonctions jusqu'en 2030, et un
  score de l'Indice de démocratie libérale V-Dem de 0,71 en 2024 — plaçant le
  Brésil aux côtés du Japon et au-dessus de la plupart des marchés émergents
  comparables [vdem-dataset-v16]. Freedom House classe le Brésil comme Libre
  avec un score agrégé de 72/100 dans son rapport 2025, reconnaissant des
  élections compétitives et un débat public dynamique tout en signalant la
  polarisation politique et le harcèlement des journalistes comme des
  vulnérabilités persistantes
  [freedom-house-brazil-2025][freedom-house-fiw-2026-global]. L'achèvement par
  le STF en décembre 2025 des procédures liées au complot de coup d'État —
  aboutissant à 29 condamnations d'officiers militaires et de co-conspirateurs
  civils — a envoyé un signal de dissuasion crédible avant les élections
  générales de 2026, renforçant la norme selon laquelle la prise de pouvoir
  extra-constitutionnelle entraîne un vrai coût judiciaire
  [stf-bolsonaro-conviction-ruling]. Le système électoral brésilien, bien que
  contesté rhétoriquement, a produit des transferts de pouvoir compétitifs
  ininterrompus depuis 1985, fournissant un plancher institutionnel qui le
  distingue de ses homologues plus fragiles dans la région
  [freedom-house-fiw-2026-global].
political_shockAbsorbers_en: >-
  Brazil's multi-layered federal architecture — 26 states, the Federal District,
  and over 5,500 municipalities with constitutionally guaranteed revenue-sharing
  — disperses political and fiscal risk across a territory larger than the
  continental United States, limiting the capacity of any single political shock
  to cascade nationally [imf-article-iv-2025-brazil]. The World Justice Project
  Rule of Law Index 2025 places Brazil 78th of 143 countries globally and 17th
  of 32 in Latin America and the Caribbean, with improving scores on regulatory
  enforcement and civil justice functioning as partial buffers against arbitrary
  policy reversal [wjp-rule-of-law-2025-brazil][wjp-rol-brazil-factor-scores].
  An independent central bank — operating under the inflation-targeting
  framework with a formal 3% target and 1.5 percentage-point tolerance band —
  provides monetary-policy credibility that constrains even fiscally
  expansionary administrations from monetising deficits
  [bcb-monetary-policy-report-march-2026]. The Bolsa Família cash-transfer
  network and minimum-wage indexation create deep social-contract anchors:
  household consumption, though it decelerated sharply to 1.3% growth in 2025,
  has never contracted in the data series, providing a political legitimacy
  floor for any government during downturns [ibge-gdp-2025-annual].
political_shockAbsorbers_fr: >-
  L'architecture fédérale à plusieurs niveaux du Brésil — 26 États, le District
  fédéral et plus de 5 500 municipalités bénéficiant d'un partage
  constitutionnellement garanti des revenus — disperse les risques politiques et
  budgétaires sur un territoire plus grand que les États-Unis continentaux,
  limitant la capacité de tout choc politique unique à se propager à l'échelle
  nationale [imf-article-iv-2025-brazil]. L'Indice de l'État de droit 2025 du
  World Justice Project place le Brésil 78e sur 143 pays au niveau mondial et
  17e sur 32 en Amérique latine et aux Caraïbes, avec des scores en amélioration
  sur l'application réglementaire et le fonctionnement de la justice civile
  servant de tampons partiels contre les renversements de politique arbitraires
  [wjp-rule-of-law-2025-brazil][wjp-rol-brazil-factor-scores]. Une banque
  centrale indépendante — opérant dans le cadre du ciblage de l'inflation avec
  un objectif formel de 3 % et une bande de tolérance de 1,5 point de
  pourcentage — fournit une crédibilité de politique monétaire qui contraint
  même les administrations expansionnistes budgétairement à ne pas monétiser les
  déficits [bcb-monetary-policy-report-march-2026]. Le réseau de transferts en
  espèces Bolsa Família et l'indexation du salaire minimum créent de solides
  ancres de contrat social : la consommation des ménages, bien qu'elle ait
  fortement décéléré à 1,3 % de croissance en 2025, n'a jamais subi de
  contraction dans la série de données, fournissant un plancher de légitimité
  politique pour tout gouvernement en période de ralentissement
  [ibge-gdp-2025-annual].
economy_macroReality_en: >-
  Brazil's GDP expanded 2.3% in 2025 — the fifth consecutive year of growth —
  reaching R$12.7 trillion in current values, though this represented a material
  deceleration from the 3.4% recorded in 2024
  [ibge-gdp-2025-annual][ibge-scnt-q4-2025][worldbank-mpo-brazil-2026]. The
  slowdown was concentrated in household consumption, which grew only 1.3% as
  the Selic rate's long stay at 15% — the highest level since 2006 — constrained
  credit and depressed demand; full-year 2025 IPCA closed at 4.26%, above the 3%
  central target
  [bcb-copom-selic-april-2026][ibge-gdp-2025-annual][ibge-ipca-december-2025][ibge-ipca-statistical-release].
  The BCB's Monetary Policy Committee (Copom) initiated a cautious easing cycle
  in March 2026 with a 25-basis-point cut to 14.75%, followed by a second
  unanimous cut to 14.50% on 29 April 2026, though Middle-East-driven oil at
  approximately USD 108 per barrel and a Focus Survey 2026 IPCA forecast of
  4.80% — above the 4.50% target ceiling — limited the committee's latitude
  [bcb-copom-selic-april-2026][bcb-copom-statements][bcb-focus-market-readout].
  The IMF's April 2026 World Economic Outlook upgraded Brazil's 2026 growth
  forecast to 1.9%, supported by improved energy export terms-of-trade and
  strong carry-over momentum from H2 2025, even as the Fund cautioned that
  tightening global financial conditions could produce a modest 2027 slowdown
  [imf-weo-april-2026-brazil].
economy_macroReality_fr: >-
  Le PIB du Brésil a augmenté de 2,3 % en 2025 — la cinquième année consécutive
  de croissance — atteignant 12,7 billions de R$ en valeurs courantes, bien que
  cela représentait une décélération matérielle par rapport aux 3,4 %
  enregistrés en 2024
  [ibge-gdp-2025-annual][ibge-scnt-q4-2025][worldbank-mpo-brazil-2026]. Le
  ralentissement s'est concentré dans la consommation des ménages, qui n'a
  augmenté que de 1,3 % alors que le long maintien du taux Selic à 15 % — le
  niveau le plus élevé depuis 2006 — contraignait le crédit et déprimait la
  demande ; l'IPCA annuel 2025 a clôturé à 4,26 %, au-dessus de l'objectif
  central de 3 %
  [bcb-copom-selic-april-2026][ibge-gdp-2025-annual][ibge-ipca-december-2025][ibge-ipca-statistical-release].
  Le Comité de politique monétaire de la BCB (Copom) a lancé un cycle
  d'assouplissement prudent en mars 2026 avec une réduction de 25 points de base
  à 14,75 %, suivie d'une deuxième réduction unanime à 14,50 % le 29 avril 2026,
  bien que le pétrole à environ 108 USD par baril dû au Moyen-Orient et une
  prévision IPCA 2026 du sondage Focus de 4,80 % — au-dessus du plafond cible de
  4,50 % — aient limité la latitude du comité
  [bcb-copom-selic-april-2026][bcb-copom-statements][bcb-focus-market-readout].
  Le FMI dans ses Perspectives économiques mondiales d'avril 2026 a relevé la
  prévision de croissance du Brésil pour 2026 à 1,9 %, soutenu par
  l'amélioration des termes de l'échange à l'exportation d'énergie et un fort
  élan de report du second semestre 2025, même si le Fonds a averti que le
  resserrement des conditions financières mondiales pourrait produire un léger
  ralentissement en 2027 [imf-weo-april-2026-brazil].
economy_externalVulnerability_en: >-
  Brazil's current account deficit reached USD 68.8 billion in 2025, equivalent
  to 3.02% of GDP — the largest annual shortfall since 2014 — driven primarily
  by an 8.9% shrinkage in the goods trade surplus and a persistent USD 52.9
  billion services deficit
  [bcb-external-sector-stats-march-2026][bcb-external-sector-q1-2026-text]. The
  deficit was, however, more than fully financed: foreign direct investment
  inflows totalled USD 77.7 billion, or 3.41% of GDP, providing adequate
  balance-of-payments coverage without recourse to short-term portfolio debt
  [bcb-external-sector-stats-march-2026]. In Q1 2026, Brazil's export momentum
  improved, with goods exports rising 7.1% year-on-year to USD 82.3 billion and
  a Q1 trade surplus of USD 14.2 billion, partly reflecting higher commodity
  prices tied to the Middle East conflict [mdic-balanca-comercial-april-2026].
  Gross public debt closed 2025 at 78.7% of GDP — a level that, combined with
  net interest costs approaching 7% of GDP, leaves Brazil highly sensitive to
  shifts in global risk appetite and domestic real interest rates, particularly
  given the BIS-tracked concentration of cross-border bank claims on Brazilian
  sovereign paper
  [stn-monthly-debt-report-jan-2026][bis-locational-banking-brazil].
economy_externalVulnerability_fr: >-
  Le déficit du compte courant du Brésil a atteint 68,8 milliards USD en 2025,
  soit 3,02 % du PIB — le plus grand déficit annuel depuis 2014 — principalement
  dû à une réduction de 8,9 % de l'excédent commercial des biens et un déficit
  de services persistant de 52,9 milliards USD
  [bcb-external-sector-stats-march-2026][bcb-external-sector-q1-2026-text]. Le
  déficit a toutefois été plus que totalement financé : les entrées
  d'investissements directs étrangers ont totalisé 77,7 milliards USD, soit 3,41
  % du PIB, fournissant une couverture adéquate de la balance des paiements sans
  recours à la dette de portefeuille à court terme
  [bcb-external-sector-stats-march-2026]. Au T1 2026, la dynamique des
  exportations brésiliennes s'est améliorée, avec des exportations de biens en
  hausse de 7,1 % en glissement annuel à 82,3 milliards USD et un excédent
  commercial de 14,2 milliards USD au T1, reflétant en partie la hausse des prix
  des matières premières liée au conflit au Moyen-Orient
  [mdic-balanca-comercial-april-2026]. La dette publique brute a clôturé 2025 à
  78,7 % du PIB — un niveau qui, combiné à des coûts nets d'intérêt approchant 7
  % du PIB, rend le Brésil très sensible aux changements dans l'appétit pour le
  risque mondial et les taux d'intérêt réels intérieurs, notamment compte tenu
  de la concentration des créances bancaires transfrontalières sur les titres
  souverains brésiliens suivie par la BRI
  [stn-monthly-debt-report-jan-2026][bis-locational-banking-brazil][bis-global-liquidity-q4-2025].
economy_politicalEconomy_en: >-
  Brazil's fiscal framework — the 2023 arcabouço fiscal (fiscal rule) — targets
  a zero primary balance with a ±0.25 percentage-point tolerance band; the
  government reported a primary deficit of approximately 0.1% of GDP in 2025,
  nominally within band, though when court-mandated payments (precatórios) and
  congressional exemptions are included the effective cash deficit approaches
  0.48% of GDP [stn-resultado-tesouro-march-2026][stn-fiscal-outlook-2025-h2].
  The Secretaria do Tesouro Nacional projects an escalating gross debt
  trajectory in the short term with stabilisation only in the medium run,
  contingent on the government maintaining its fiscal consolidation commitments
  — a political challenge given Lula's pre-election spending promises including
  a monthly R$5,000 income-tax exemption
  [stn-fiscal-outlook-2025-h2][stn-monthly-debt-report-jan-2026]. The
  EU—Mercosur Partnership Agreement entered provisional application on 1 May
  2026 after Brazil's Congress ratified it on 4 March, offering a structural
  trade-liberalisation dividend that economists estimate could modestly reduce
  the custo Brasil and channel new FDI into manufacturing over the medium term
  [eu-mercosur-agreement-text-ec][brazil-mre-mercosur-eu-factsheet]. WTO data
  and Brazil's tariff profile confirm that the economy remains among the more
  protected large emerging markets, and the adjustment costs of the EU—Mercosur
  deal — particularly for sheltered domestic industry sectors — will constitute
  a political economy friction point throughout the 2026—2030 implementation
  window [wto-brazil-tariff-trade-profile].
economy_politicalEconomy_fr: >-
  Le cadre budgétaire brésilien — l'arcabouço fiscal de 2023 (règle budgétaire)
  — cible un solde primaire nul avec une bande de tolérance de ±0,25 point de
  pourcentage; le gouvernement a déclaré un déficit primaire d'environ 0,1 % du
  PIB en 2025, nominalement dans la bande, bien que lorsque les paiements
  imposés par les tribunaux (precatórios) et les exemptions du Congrès sont
  inclus, le déficit de trésorerie effectif approche 0,48 % du PIB
  [stn-resultado-tesouro-march-2026][stn-fiscal-outlook-2025-h2]. La Secretaria
  do Tesouro Nacional projette une trajectoire de dette brute croissante à court
  terme avec une stabilisation uniquement à moyen terme, contingente au maintien
  par le gouvernement de ses engagements de consolidation budgétaire — un défi
  politique étant donné les promesses de dépenses pré-électorales de Lula
  incluant une exonération d'impôt sur le revenu mensuelle de R$5 000
  [stn-fiscal-outlook-2025-h2][stn-monthly-debt-report-jan-2026]. L'Accord de
  partenariat UE—Mercosur est entré en application provisoire le 1er mai 2026
  après sa ratification par le Congrès brésilien le 4 mars, offrant un dividende
  de libéralisation commerciale structurelle que les économistes estiment
  pourrait modestement réduire le custo Brasil et canaliser de nouveaux IDE vers
  le secteur manufacturier à moyen terme
  [eu-mercosur-agreement-text-ec][brazil-mre-mercosur-eu-factsheet]. Les données
  de l'OMC et le profil tarifaire du Brésil confirment que l'économie reste
  parmi les grands marchés émergents les plus protégés, et les coûts
  d'ajustement de l'accord UE—Mercosur — en particulier pour les secteurs
  industriels domestiques protégés — constitueront un point de friction
  d'économie politique tout au long de la fenêtre de mise en œuvre 2026—2030
  [wto-brazil-tariff-trade-profile].
security_internal_en: >-
  Brazil recorded approximately 44,100 intentional homicides in 2024 — a rate
  near 20.5 per 100,000 people — the lowest absolute count since 2012 yet still
  among the highest in the world for a nation at its income level; UNODC data
  from 2023 place the rate at 19.3 per 100,000, confirming a modest structural
  downward trend [unodc-data-portal-homicide-brazil]. This trajectory is
  nonetheless fragile: ACLED data document a 12% rise in fatalities from
  security-force confrontations with armed non-state groups in the first eleven
  months of 2025 compared to 2024, including an October 2025 Rio de Janeiro
  operation that resulted in at least 121 deaths — the deadliest such
  intervention recorded in ACLED's Brazil dataset since 2018
  [acled-brazil-country-profile][acled-latam-november-2025]. The Primeiro
  Comando da Capital (PCC) and Comando Vermelho (CV) have expanded territorial
  control into the Legal Amazon and Brazil's impoverished northeast, with
  violence in Maranhão state reaching its highest levels on record in mid-2025
  as rival criminal organisations competed for drug-trafficking corridors
  [acled-latam-november-2025]. The WJP's Order and Security sub-index ranks
  Brazil 111th of 143 countries — a figure that captures both the homicide
  burden and the chronic impunity that sustains it — posing a tangible
  constraint on foreign investment in logistics, agribusiness, and energy
  infrastructure [wjp-rol-brazil-factor-scores].
security_internal_fr: >-
  Le Brésil a enregistré environ 44 100 homicides intentionnels en 2024 — un
  taux proche de 20,5 pour 100 000 personnes — le nombre absolu le plus bas
  depuis 2012 mais encore parmi les plus élevés au monde pour un pays à son
  niveau de revenu ; les données de l'UNODC de 2023 placent le taux à 19,3 pour
  100 000, confirmant une tendance à la baisse structurelle modeste
  [unodc-data-portal-homicide-brazil]. Cette trajectoire est néanmoins fragile :
  les données d'ACLED documentent une hausse de 12 % des décès lors des
  confrontations des forces de sécurité avec des groupes armés non étatiques
  dans les onze premiers mois de 2025 par rapport à 2024, dont une opération de
  Rio de Janeiro en octobre 2025 qui a abouti à au moins 121 morts —
  l'intervention la plus meurtrière enregistrée dans le jeu de données ACLED du
  Brésil depuis 2018 [acled-brazil-country-profile][acled-latam-november-2025].
  Le Primeiro Comando da Capital (PCC) et le Comando Vermelho (CV) ont étendu
  leur contrôle territorial à l'Amazonie légale et au nord-est défavorisé du
  Brésil, avec une violence dans l'État du Maranhão atteignant ses niveaux les
  plus élevés jamais enregistrés à mi-2025 alors que des organisations
  criminelles rivales se disputaient les corridors de trafic de drogue
  [acled-latam-november-2025]. Le sous-indice Ordre et Sécurité du WJP classe le
  Brésil 111e sur 143 pays — un chiffre qui capture à la fois le fardeau des
  homicides et l'impunité chronique qui le maintient — posant une contrainte
  tangible sur les investissements étrangers dans la logistique,
  l'agro-industrie et les infrastructures énergétiques
  [wjp-rol-brazil-factor-scores].
security_diplomacy_en: >-
  Brazil under Lula has pursued a multi-vector foreign policy anchored in
  strategic autonomy — deepening Mercosur integration, cultivating BRICS
  relationships, and selectively engaging Western partners — without formally
  aligning with any bloc, a posture that simultaneously maximises diplomatic
  optionality and generates investor uncertainty about Brazil's geopolitical
  reliability [imf-article-iv-2025-brazil]. Military expenditure rose 13% in
  real terms to USD 23.9 billion in 2025, driven primarily by naval
  modernisation programmes, making Brazil the largest defence spender in South
  America and the 21st largest globally at a moment when SIPRI records the 11th
  consecutive annual increase in world military outlays
  [sipri-milex-2025-factsheet][sipri-milex-database]. The provisional entry into
  force of the EU—Mercosur Partnership Agreement on 1 May 2026 — covering a
  combined market of over 700 million people — represents the most consequential
  trade-diplomacy milestone in Brazil's post-Cold War history, though
  parliamentary ratification in several EU member states remains pending and
  could yet constrain full implementation
  [eu-mercosur-agreement-text-ec][brazil-mre-mercosur-eu-factsheet]. Brazil's
  Transparency International Corruption Perceptions Index score of 35/100 in
  2025 — ranking 107th of 182 countries and below both the global and Latin
  American averages of 42 — continues to act as a structural drag on sovereign
  credibility, institutional trust, and the country's ability to attract
  premium-tier institutional foreign investment [ti-cpi-2025].
security_diplomacy_fr: >-
  Le Brésil sous Lula a poursuivi une politique étrangère multi-vecteurs ancrée
  dans l'autonomie stratégique — approfondissant l'intégration du Mercosur,
  cultivant les relations BRICS et s'engageant sélectivement avec les
  partenaires occidentaux — sans s'aligner formellement sur aucun bloc, une
  posture qui maximise simultanément les options diplomatiques et génère une
  incertitude chez les investisseurs quant à la fiabilité géopolitique du Brésil
  [imf-article-iv-2025-brazil]. Les dépenses militaires ont augmenté de 13 % en
  termes réels à 23,9 milliards USD en 2025, principalement dues aux programmes
  de modernisation navale, faisant du Brésil le plus grand dépensier de défense
  en Amérique du Sud et le 21e au niveau mondial à un moment où le SIPRI
  enregistre la 11e augmentation annuelle consécutive des dépenses militaires
  mondiales [sipri-milex-2025-factsheet][sipri-milex-database]. L'entrée en
  vigueur provisoire de l'Accord de partenariat UE—Mercosur le 1er mai 2026 —
  couvrant un marché combiné de plus de 700 millions de personnes — représente
  le jalon de diplomatie commerciale le plus important de l'histoire post-Guerre
  froide du Brésil, bien que la ratification parlementaire dans plusieurs États
  membres de l'UE reste en attente et pourrait encore contraindre la mise en
  œuvre complète
  [eu-mercosur-agreement-text-ec][brazil-mre-mercosur-eu-factsheet]. Le score de
  35/100 de l'Indice de perception de la corruption de Transparency
  International du Brésil en 2025 — classant 107e sur 182 pays et en dessous des
  moyennes mondiale et latino-américaine de 42 — continue d'agir comme un frein
  structurel sur la crédibilité souveraine, la confiance institutionnelle et la
  capacité du pays à attirer des investissements institutionnels étrangers de
  premier rang [ti-cpi-2025].
