executiveSnapshot_en: >-
  Regime type: Constitutional monarchy with parliamentary democracy; bicameral
  legislature (House of Commons, House of Lords); executive power held by Prime
  Minister [1]. Current Prime Minister: Keir Starmer (Labour Party); government
  formed after July 2024 general election with 412 Labour seats (majority in
  650-seat Commons) [1] [2]. Monarch: King Charles III (ceremonial head of
  state); no executive power [1]. Parliamentary system: House of Commons (650
  elected seats) holds legislative power; House of Lords (approximately 800
  members) provides secondary review; no fixed-term parliaments [1].
  Constitutional framework: UK Constitution uncodified; based on common law,
  statutes, and conventions; Supreme Court (12 justices) serves as final arbiter
  since 2009 [3]. Electoral system: First-past-the-post (FPTP); general
  elections held every 5 years maximum; next general election by January 2029
  [2]. Civil service: Non-partisan professional bureaucracy; Foreign Office,
  Treasury, Home Office, Ministry of Defence report to government [1].

  Current political equilibrium: Labour government holds 412 seats (63% of
  Commons); comfortable majority allows legislative agenda [2]. Conservative
  Party (opposition) holds 121 seats; significant decline from 2019 (365 seats);
  internal party divisions on Brexit, immigration, economic policy [2]. Liberal
  Democrats hold 72 seats; Scottish National Party (SNP) holds 9 seats; other
  parties hold 36 seats [2]. Political polarization: moderate compared to
  2016–2024 period; Brexit divisions persist but less acute; immigration and
  economic inequality remain contentious [4]. Ruling coalition: Labour
  government with no coalition partners (single-party majority); internal party
  unity generally strong [2]. Opposition capacity: Conservative Party weakened;
  internal leadership contests; regional parties (SNP, Plaid Cymru) hold
  influence in Scotland and Wales [2]. Civil society: strong independent media,
  trade unions, civil rights organizations; street mobilization capacity
  moderate [5].

  Economic model: High-income economy with $3.1 trillion nominal GDP (2025);
  services sector dominates (80% of GDP) with finance, insurance, professional
  services [6]. Financial services: London remains global financial center;
  banking, insurance, asset management generate significant export revenue and
  tax revenue [6]. Manufacturing sector (10% of GDP) declining; key sectors:
  pharmaceuticals, aerospace, automotive, chemicals [6]. Energy sector:
  transitioning from fossil fuels; renewable energy capacity expanding; North
  Sea oil/gas declining [7]. Trade: post-Brexit trade agreements with EU (Trade
  and Cooperation Agreement) and other partners; trade friction with EU
  increased; goods exports to EU declined [8]. Domestic consumption: strong
  consumer spending; high household debt (~100% of disposable income); real
  wages stagnant 2008–2024 [6]. Inequality: significant regional disparities
  (London vs. North); income inequality elevated; poverty rates rising [9].

  Top 3 risks (6–18 months): (1) Economic stagnation — weak growth, high
  inflation, rising unemployment could trigger recession and fiscal pressures
  [6] [10]; (2) NHS crisis escalation — healthcare system under severe strain,
  waiting lists at record levels, strikes possible [11]; (3) Social unrest —
  cost-of-living crisis, inequality, austerity measures could trigger protests
  and labor strikes [5] [12].

  Top 3 watch items (4–12 weeks): (1) Bank of England monetary policy and
  inflation trajectory; (2) Labour government fiscal policy and public spending
  decisions; (3) NHS performance metrics and industrial action risk.

  External dependencies: Exports: $650 billion annually (2025); concentrated in
  financial services (40%), professional services (15%), pharmaceuticals (8%),
  machinery (7%), other [8]. Imports: $750 billion annually (2025); concentrated
  in machinery (20%), minerals (15%), vehicles (12%), chemicals (10%), other
  [8]. Trade balance: deficit of ~$100 billion annually; services surplus offset
  by goods deficit [8]. EU trade: post-Brexit friction; goods trade with EU
  declined 15–20%; services trade maintained [8]. Energy imports: ~50% of
  electricity from renewables; natural gas imports from Norway, Netherlands,
  Russia (limited); oil imports from Middle East, Africa [7]. Capital flows:
  London attracts significant foreign direct investment (FDI); UK pension funds
  and insurance companies hold large foreign assets [13]. Debt holders: ~60% of
  government debt held domestically (UK banks, pension funds, insurance
  companies); ~40% held by foreign investors [14]. Currency: British pound (GBP)
  freely floating; exchange rate volatile; no fixed peg [15].

  Security posture: Internal violence: low compared to historical standards;
  terrorism risk from Islamic extremists and far-right groups; occasional
  protests and labor strikes [5] [12]. State capacity: Armed Forces (82,000
  active personnel) operationally capable; police forces (130,000) handle law
  enforcement; no evidence of security force disloyalty [16]. Intelligence
  services: MI5 (Security Service) operates domestically; MI6 (Secret
  Intelligence Service) operates internationally; GCHQ (Government
  Communications Headquarters) conducts signals intelligence; credible threat
  assessment capacity [16]. Border security: UK border control post-Brexit;
  immigration enforcement active [17]. Nuclear weapons: UK possesses 225
  warheads; continuous at-sea deterrent; NATO member [18]. Cybersecurity
  threats: state-sponsored hacking from Russia, China; critical infrastructure
  vulnerability; financial sector targeted [19].

  Diplomatic orientation: NATO alliance strong; defense cooperation with U.S.,
  France, Germany [20]. EU relationship: post-Brexit; Trade and Cooperation
  Agreement in place; political tensions on Northern Ireland protocol, fishing
  rights [21]. U.S. alliance: "special relationship"; defense cooperation,
  intelligence sharing (Five Eyes alliance with U.S., Canada, Australia, New
  Zealand) [20]. Russia relationship: adversarial; sanctions on Russia over
  Ukraine; military support to Ukraine [22]. China relationship: competitive;
  technology competition; concerns over foreign investment in critical
  infrastructure [23]. Commonwealth relationships: historical ties with former
  colonies; trade relationships with Canada, Australia, India, others [24].
  Regional leadership: G7 member; OECD member; World Bank, IMF shareholder [25].

  Data confidence: HIGH for macro-economic data (Office for National Statistics,
  Bank of England); HIGH for political structure (UK Parliament); MEDIUM for
  social unrest trends (protest data); MEDIUM for NHS performance (NHS England
  data); HIGH for security assessments (official sources).

  Baseline outlook: Labour government pursuing centrist economic policy;
  moderate growth (1–2% annually) constrained by global headwinds and domestic
  structural challenges; NHS crisis persisting; social unrest manageable but
  rising; no near-term regime change risk; 2029 general election will be
  contested.
executiveSnapshot_fr: >-
  Type de régime : Monarchie constitutionnelle avec démocratie parlementaire;
  législature bicamérale (Chambre des communes, Chambre des lords) ; le pouvoir
  exécutif est détenu par le Premier ministre [1]. Premier ministre actuel :
  Keir Starmer (Parti travailliste) ; gouvernement formé après les élections
  générales de juillet 2024 avec 412 sièges travaillistes (majorité aux Communes
  de 650 sièges) [1] [2]. Monarque : Roi Charles III (chef d'État cérémoniel) ;
  pas de pouvoir exécutif [1]. Système parlementaire : Chambre des communes (650
  sièges élus) détient le pouvoir législatif ; Chambre des lords (~800 membres)
  fournit un examen secondaire ; pas de parlements à durée fixe [1]. Cadre
  constitutionnel : Constitution britannique non codifiée ; basée sur la common
  law, les statuts et les conventions ; Cour suprême (12 juges) sert d'arbitre
  final depuis 2009 [3]. Système électoral : Scrutin uninominal à un tour (FPTP)
  ; les élections générales se tiennent tous les 5 ans maximum ; prochaines
  élections générales en janvier 2029 [2]. Fonction publique : bureaucratie
  professionnelle non partisane ; Foreign Office, Trésor, Home Office, Ministère
  de la Défense rapportent au gouvernement [1].

  Équilibre politique actuel : gouvernement travailliste détient 412 sièges (63
  % des Communes) ; majorité confortable permet l'agenda législatif [2]. Parti
  conservateur (opposition) détient 121 sièges ; déclin significatif par rapport
  à 2019 (365 sièges) ; divisions internes du parti sur le Brexit,
  l'immigration, la politique économique [2]. Libéraux-démocrates détiennent 72
  sièges ; Parti national écossais (SNP) détient 9 sièges ; autres partis
  détiennent 36 sièges [2]. Polarisation politique : modérée par rapport à la
  période 2016–2024 ; les divisions du Brexit persistent mais moins aiguës ;
  l'immigration et l'inégalité économique restent contentieuses [4]. Coalition
  au pouvoir : gouvernement travailliste sans partenaires de coalition (majorité
  d'un seul parti) ; l'unité interne du parti généralement forte [2]. Capacité
  de l'opposition : Parti conservateur affaibli ; les concours de leadership
  internes ; les partis régionaux (SNP, Plaid Cymru) détiennent l'influence en
  Écosse et au Pays de Galles [2]. Société civile : médias indépendants forts,
  syndicats, organisations de droits civiques ; capacité de mobilisation de rue
  modérée [5].

  Modèle économique : Économie à revenu élevé avec PIB nominal de 3,1 billions
  de dollars (2025) ; le secteur des services domine (80 % du PIB) avec finance,
  assurance, services professionnels [6]. Services financiers : Londres reste
  centre financier mondial ; la banque, l'assurance, la gestion d'actifs
  génèrent des revenus d'exportation significatifs et des revenus fiscaux [6].
  Secteur manufacturier (10 % du PIB) en déclin ; secteurs clés : produits
  pharmaceutiques, aérospatiale, automobile, produits chimiques [6]. Secteur
  énergétique : transition des combustibles fossiles ; la capacité d'énergie
  renouvelable s'expande ; le pétrole/gaz de la mer du Nord en déclin [7].
  Commerce : accords commerciaux post-Brexit avec l'UE (Accord de commerce et de
  coopération) et autres partenaires ; les frictions commerciales avec l'UE ont
  augmenté ; les exportations de biens vers l'UE ont diminué [8]. Consommation
  intérieure : dépenses de consommation forte ; dette des ménages élevée (~100 %
  du revenu disponible) ; les salaires réels stagnants 2008–2024 [6]. Inégalité
  : disparités régionales significatives (Londres vs. Nord) ; inégalité des
  revenus élevée ; les taux de pauvreté augmentent [9].

  Les 3 principaux risques (6–18 mois) : (1) Stagnation économique — croissance
  faible, inflation élevée, chômage croissant pourraient déclencher une
  récession et des pressions budgétaires [6] [10] ; (2) Escalade de la crise du
  NHS — le système de santé sous tension sévère, les listes d'attente à des
  niveaux records, les grèves possibles [11] ; (3) Agitation sociale — crise du
  coût de la vie, inégalité, mesures d'austérité pourraient déclencher des
  protestations et des grèves du travail [5] [12].

  Les 3 principaux éléments à surveiller (4–12 semaines) : (1) Politique
  monétaire de la Banque d'Angleterre et trajectoire de l'inflation ; (2)
  Politique budgétaire du gouvernement travailliste et décisions de dépenses
  publiques ; (3) Métriques de performance du NHS et risque d'action
  industrielle.

  Dépendances externes : Exportations : 650 milliards de dollars annuellement
  (2025) ; concentrées dans les services financiers (40 %), services
  professionnels (15 %), produits pharmaceutiques (8 %), machines (7 %), autres
  [8]. Importations : 750 milliards de dollars annuellement (2025) ; concentrées
  dans les machines (20 %), minéraux (15 %), véhicules (12 %), produits
  chimiques (10 %), autres [8]. Solde commercial : déficit de ~100 milliards de
  dollars annuellement ; le surplus des services compense le déficit des biens
  [8]. Commerce avec l'UE : frictions post-Brexit ; le commerce des biens avec
  l'UE a diminué de 15–20 % ; le commerce des services maintenu [8].
  Importations d'énergie : ~50 % de l'électricité à partir d'énergies
  renouvelables ; importations de gaz naturel de Norvège, Pays-Bas, Russie
  (limité) ; importations de pétrole du Moyen-Orient, Afrique [7]. Flux de
  capitaux : Londres attire des investissements directs étrangers significatifs
  (IDE) ; les fonds de pension britanniques et les compagnies d'assurance
  détiennent de grands actifs étrangers [13]. Détenteurs de la dette : ~60 % de
  la dette publique détenue au niveau intérieur (banques britanniques, fonds de
  pension, compagnies d'assurance) ; ~40 % détenue par des investisseurs
  étrangers [14]. Monnaie : livre sterling (GBP) flottement libre ; taux de
  change volatil ; pas de parité fixe [15].

  Posture de sécurité : Violence interne : faible par rapport aux normes
  historiques ; risque de terrorisme de la part des extrémistes islamiques et
  des groupes d'extrême droite ; protestations occasionnelles et grèves du
  travail [5] [12]. Capacité de l'État : Forces armées (82 000 personnel actif)
  opérationnellement capables ; forces de police (130 000) gèrent l'application
  de la loi ; aucune preuve de déloyauté des forces de sécurité [16]. Services
  de renseignement : MI5 (Service de sécurité) opère au niveau intérieur ; MI6
  (Service de renseignement secret) opère à l'international ; GCHQ (Quartier
  général des communications gouvernementales) mène le renseignement de signaux
  ; capacité d'évaluation des menaces crédible [16]. Sécurité des frontières :
  contrôle des frontières britanniques post-Brexit ; application de
  l'immigration active [17]. Armes nucléaires : le Royaume-Uni possède 225
  ogives ; dissuasion continue en mer ; membre de l'OTAN [18]. Menaces
  cybernétiques : piratage parrainé par l'État de la Russie, Chine ;
  vulnérabilité des infrastructures critiques ; le secteur financier est ciblé
  [19].

  Orientation diplomatique : Alliance OTAN forte ; coopération en défense avec
  États-Unis, France, Allemagne [20]. Relation avec l'UE : post-Brexit ; Accord
  de commerce et de coopération en place ; tensions politiques sur le protocole
  d'Irlande du Nord, droits de pêche [21]. Alliance avec les États-Unis :
  "relation spéciale" ; coopération en défense, partage de renseignements
  (alliance Five Eyes avec États-Unis, Canada, Australie, Nouvelle-Zélande)
  [20]. Relation avec la Russie : adversariale ; sanctions contre la Russie pour
  l'Ukraine ; soutien militaire à l'Ukraine [22]. Relation avec la Chine :
  compétitive ; compétition technologique ; préoccupations concernant
  l'investissement étranger dans les infrastructures critiques [23]. Relations
  du Commonwealth : liens historiques avec d'anciennes colonies ; relations
  commerciales avec Canada, Australie, Inde, autres [24]. Leadership régional :
  membre du G7 ; membre de l'OCDE ; actionnaire de la Banque mondiale, FMI [25].

  Confiance des données : ÉLEVÉE pour les données macroéconomiques (Office for
  National Statistics, Banque d'Angleterre) ; ÉLEVÉE pour la structure politique
  (Parlement britannique) ; MOYENNE pour les tendances d'agitation sociale
  (données de protestation) ; MOYENNE pour les performances du NHS (données NHS
  England) ; ÉLEVÉE pour les évaluations de sécurité (sources officielles).

  Perspective de base : gouvernement travailliste poursuivant une politique
  économique centriste ; croissance modérée (1–2 % annuellement) limitée par les
  vents contraires mondiaux et les défis structurels intérieurs ; la crise du
  NHS persiste ; l'agitation sociale gérée mais croissante ; aucun risque de
  changement de régime à court terme ; les élections générales de 2029 seront
  contestées.
political_powerStructure_en: >-
  Prime Minister Keir Starmer (Labour Party) holds executive authority; Cabinet
  of ~25 ministers; Starmer's authority derives from Labour party holding 412
  Commons seats [1] [2]. Prime Minister's inner circle includes: Chancellor of
  the Exchequer, Foreign Secretary, Home Secretary, Secretary of State for
  Health; Number 10 (Prime Minister's Office) controls policy agenda [2].
  Monarch King Charles III (ceremonial role); no executive power; provides
  constitutional legitimacy [1]. House of Commons (650 elected seats) holds
  legislative power; Speaker of the House elected by members; government must
  maintain confidence of Commons [1]. House of Lords (~800 members); provides
  secondary review; can delay legislation but cannot block indefinitely;
  hereditary peers, appointed peers, bishops [1]. Supreme Court of the United
  Kingdom (12 justices); independent; final arbiter on constitutional matters
  since 2009 [3]. Electoral Commission operates independently; conducts
  elections; no evidence of electoral manipulation in 2024 general election [2].
  Media: BBC (public broadcaster) operates under charter; independent editorial
  control; private media (The Guardian, The Times, Daily Telegraph, Sky News,
  ITV) maintain editorial independence; press freedom strong [26]. Armed Forces:
  British Army (73,000), Royal Navy (30,000), Royal Air Force (32,000); report
  to Minister of Defence; no evidence of military factionalism [16].
  Intelligence services: MI5, MI6, GCHQ report to government; oversight by
  Intelligence and Security Committee of Parliament [16].
political_powerStructure_fr: >-
  Le Premier ministre Keir Starmer (Parti travailliste) détient l'autorité
  exécutive ; Cabinet de ~25 ministres ; l'autorité de Starmer provient du Parti
  travailliste détenant 412 sièges aux Communes [1] [2]. Le cercle intérieur du
  Premier ministre comprend : Chancelier de l'Échiquier, Secrétaire aux affaires
  étrangères, Secrétaire d'État à l'intérieur, Secrétaire d'État à la santé ;
  Number 10 (Bureau du Premier ministre) contrôle l'agenda politique [2].
  Monarque Roi Charles III (rôle cérémoniel) ; pas de pouvoir exécutif ; fournit
  la légitimité constitutionnelle [1]. Chambre des communes (650 sièges élus)
  détient le pouvoir législatif ; Président de la Chambre élu par les membres ;
  le gouvernement doit maintenir la confiance des Communes [1]. Chambre des
  lords (~800 membres) ; fournit un examen secondaire ; peut retarder la
  législation mais ne peut pas bloquer indéfiniment ; pairs héréditaires, pairs
  nommés, évêques [1]. Cour suprême du Royaume-Uni (12 juges) ; indépendante ;
  arbitre final sur les questions constitutionnelles depuis 2009 [3]. Commission
  électorale fonctionne de manière indépendante ; mène les élections ; aucune
  preuve de manipulation électorale aux élections générales de 2024 [2]. Médias
  : BBC (radiodiffuseur public) fonctionne sous charte ; contrôle éditorial
  indépendant ; les médias privés (The Guardian, The Times, Daily Telegraph, Sky
  News, ITV) maintiennent l'indépendance éditoriale ; la liberté de presse est
  forte [26]. Forces armées : Armée britannique (73 000), Marine royale (30
  000), Armée de l'air royale (32 000) ; rapportent au Ministre de la Défense ;
  aucune preuve de factionnalisme militaire [16]. Services de renseignement :
  MI5, MI6, GCHQ rapportent au gouvernement ; surveillance par le Comité du
  renseignement et de la sécurité du Parlement [16].
political_stabilityDrivers_en: >-
  Legitimacy rests on democratic elections and constitutional monarchy [1].
  Economic growth averaging 1–2% annually (2015–2025); below historical average;
  real wages stagnant; public services underfunded [6]. Institutional strength:
  UK has strong democratic institutions, independent judiciary, civil service;
  no evidence of institutional capture [3]. Labour government mandate: won 2024
  election with clear majority; public support for change after Conservative
  government (2010–2024) [2]. Regional devolution: Scotland, Wales, Northern
  Ireland have devolved governments; power-sharing arrangements generally
  functional [1]. Trade unions: organized labor; significant strike capacity;
  public sector unions active [5]. Business community: generally supportive of
  Labour government; concerns over tax policy and regulation [27]. Civil
  society: strong independent media, civil rights organizations, environmental
  groups; street mobilization capacity moderate [5]. Opposition weakness:
  Conservative Party divided; internal leadership contests; limited immediate
  threat to Labour government [2].
political_stabilityDrivers_fr: >-
  La légitimité repose sur les élections démocratiques et la monarchie
  constitutionnelle [1]. Croissance économique moyenne de 1–2 % annuellement
  (2015–2025) ; en dessous de la moyenne historique ; les salaires réels
  stagnants ; les services publics sous-financés [6]. Force institutionnelle :
  le Royaume-Uni a des institutions démocratiques fortes, une magistrature
  indépendante, une fonction publique ; aucune preuve de capture
  institutionnelle [3]. Mandat du gouvernement travailliste : a remporté les
  élections de 2024 avec une majorité claire ; soutien public pour le changement
  après le gouvernement conservateur (2010–2024) [2]. Dévolution régionale :
  l'Écosse, le Pays de Galles, l'Irlande du Nord ont des gouvernements dévolus ;
  les arrangements de partage du pouvoir généralement fonctionnels [1].
  Syndicats : travail organisé ; capacité de grève significative ; les syndicats
  du secteur public actifs [5]. Communauté commerciale : généralement favorable
  au gouvernement travailliste ; préoccupations concernant la politique fiscale
  et la réglementation [27]. Société civile : médias indépendants forts,
  organisations de droits civiques, groupes environnementaux ; capacité de
  mobilisation de rue modérée [5]. Faiblesse de l'opposition : Parti
  conservateur divisé ; les concours de leadership internes ; menace immédiate
  limitée au gouvernement travailliste [2].
political_shockAbsorbers_en: >-
  Absorbers: Bank of England independent and credible; inflation-targeting
  framework functional; currency freely floating [15]. Fiscal buffers:
  government can borrow at low rates (gilt yields ~4%); foreign exchange
  reserves adequate [14]. Institutional resilience: UK has strong democratic
  institutions, independent judiciary, professional civil service; no evidence
  of institutional fragility [3]. Elite consensus on democratic governance
  strong; no evidence of elite consensus breakdown [3]. Accelerants: Inflation
  spike from energy prices could trigger wage-price spiral and labor unrest
  [10]. Recession: global trade contraction, domestic consumption weakness could
  trigger unemployment increase and fiscal pressures [6]. NHS crisis escalation:
  healthcare system collapse could trigger public sector strikes and social
  unrest [11]. Social unrest: cost-of-living crisis, inequality, austerity
  measures could trigger protests and labor strikes [5] [12]. Political
  fragmentation: Conservative Party collapse could produce hung parliament in
  2029 election [2].
political_shockAbsorbers_fr: >-
  Absorbeurs : Banque d'Angleterre indépendante et crédible ; cadre de ciblage
  de l'inflation fonctionnel ; monnaie flottement libre [15]. Tampons
  budgétaires : le gouvernement peut emprunter à des taux bas (rendements des
  gilts ~4 %) ; les réserves de change adéquates [14]. Résilience
  institutionnelle : le Royaume-Uni a des institutions démocratiques fortes, une
  magistrature indépendante, une fonction publique professionnelle ; aucune
  preuve de fragilité institutionnelle [3]. Consensus des élites sur la
  gouvernance démocratique fort ; aucune preuve d'effondrement du consensus des
  élites [3]. Accélérateurs : pic d'inflation dû aux prix de l'énergie pourrait
  déclencher une spirale salaires-prix et agitation du travail [10]. Récession :
  contraction du commerce mondial, faiblesse de la consommation intérieure
  pourraient déclencher une augmentation du chômage et des pressions budgétaires
  [6]. Escalade de la crise du NHS : effondrement du système de santé pourrait
  déclencher des grèves du secteur public et agitation sociale [11]. Agitation
  sociale : crise du coût de la vie, inégalité, mesures d'austérité pourraient
  déclencher des protestations et des grèves du travail [5] [12]. Fragmentation
  politique : l'effondrement du Parti conservateur pourrait produire un
  parlement suspendu aux élections de 2029 [2].
economy_macroReality_en: >-
  GDP growth forecast at 1–2% annually for 2026–2027; below historical average
  (2–3%) due to global headwinds and domestic structural challenges [6].
  Services sector (finance, insurance, professional services) growing 1–2%
  annually; manufacturing sector declining 0–1% annually; energy sector
  transitioning [6]. Inflation currently ~3% (target: 2%); above Bank of England
  comfort zone; rate hikes likely [15]. Interest rates: Bank of England base
  rate at 4.5–5%; mortgage rates elevated; consumer credit expensive [15].
  Unemployment: currently ~4%; forecast to rise to 5% by 2027 due to economic
  slowdown [10]. Real wages: stagnant since 2008; real wage growth forecast at
  0–1% annually [6]. Fiscal consolidation underway; government deficit ~4% of
  GDP (2025–2026); deficit-to-GDP ratio manageable but rising interest rates
  increase debt servicing costs [14]. Government debt-to-GDP ~100%; elevated by
  historical standards; debt servicing costs rising [14]. Domestic capital
  markets (gilts, deposits) primary financing source; foreign investment in UK
  gilts significant (~40% of stock) [14]. Government committed to fiscal
  discipline; spending restraint and tax increases underway; political economy
  of consolidation difficult with public service demands [2] [6]. Food price
  inflation moderating from 2022–2024 peaks; supply chains normalized; energy
  price volatility persists [10]. Oil and natural gas prices volatile;
  geopolitical risks (Middle East, Russia) create upside pressure; renewable
  energy transition accelerating [7]. British pound weakness (vs. U.S. dollar)
  increases import costs; energy and commodity imports affected; pass-through to
  consumer prices moderate [15]. Headline inflation currently ~3% (target: 2%);
  above Bank of England comfort zone; rate hikes likely [15]. Unemployment
  currently ~4%; forecast to rise to 5% by 2027 [10].
economy_macroReality_fr: >-
  Croissance du PIB prévue à 1–2 % annuellement pour 2026–2027 ; en dessous de
  la moyenne historique (2–3 %) en raison des vents contraires mondiaux et des
  défis structurels intérieurs [6]. Secteur des services (finance, assurance,
  services professionnels) croissance 1–2 % annuellement ; secteur manufacturier
  déclin 0–1 % annuellement ; secteur énergétique en transition [6]. Inflation
  actuellement ~3 % (cible : 2 %) ; au-dessus de la zone de confort de la Banque
  d'Angleterre ; les augmentations de taux sont probables [15]. Taux d'intérêt :
  taux de base de la Banque d'Angleterre à 4,5–5 % ; taux hypothécaires élevés ;
  crédit à la consommation coûteux [15]. Chômage : actuellement ~4 % ; prévision
  d'augmentation à 5 % en 2027 en raison du ralentissement économique [10].
  Salaires réels : stagnants depuis 2008 ; croissance des salaires réels prévue
  à 0–1 % annuellement [6]. Consolidation budgétaire en cours ; déficit
  gouvernemental ~4 % du PIB (2025–2026) ; le ratio déficit-PIB est gérable mais
  la hausse des taux d'intérêt augmente les coûts du service de la dette [14].
  Dette publique-PIB ~100 % ; élevée selon les normes historiques ; les coûts du
  service de la dette augmentent [14]. Les marchés de capitaux intérieurs
  (gilts, dépôts) sont la source de financement principale ; l'investissement
  étranger dans les gilts britanniques est significatif (~40 % du stock) [14].
  Le gouvernement s'engage à la discipline budgétaire ; la retenue des dépenses
  et les augmentations d'impôts sont en cours ; l'économie politique de la
  consolidation est difficile avec les demandes de services publics [2] [6].
  L'inflation des prix alimentaires modère par rapport aux pics de 2022–2024 ;
  les chaînes d'approvisionnement se sont normalisées ; la volatilité des prix
  de l'énergie persiste [10]. Les prix du pétrole et du gaz naturel sont
  volatiles ; les risques géopolitiques (Moyen-Orient, Russie) créent une
  pression à la hausse ; la transition vers l'énergie renouvelable s'accélère
  [7]. Faiblesse de la livre sterling (par rapport au dollar américain) augmente
  les coûts d'importation ; les importations d'énergie et de matières premières
  sont affectées ; le transfert aux prix à la consommation est modéré [15].
  L'inflation globale actuellement ~3 % (cible : 2 %) ; au-dessus de la zone de
  confort de la Banque d'Angleterre ; les augmentations de taux sont probables
  [15]. Le chômage actuellement ~4 % ; prévision d'augmentation à 5 % en 2027
  [10].
economy_externalVulnerability_en: >-
  Exports: $650 billion annually (2025); concentrated in financial services
  (40%), professional services (15%), pharmaceuticals (8%), machinery (7%),
  other [8]. Imports: $750 billion annually (2025); concentrated in machinery
  (20%), minerals (15%), vehicles (12%), chemicals (10%), other [8]. Trade
  balance: deficit of ~$100 billion annually; services surplus offset by goods
  deficit [8]. Export concentration: financial services heavily dependent on EU
  and U.S. markets (70% of exports); post-Brexit friction affects EU trade [8].
  Debt holders: ~60% of government debt held domestically (UK banks, pension
  funds, insurance companies); ~40% held by foreign investors [14]. Maturity
  wall: government debt maturity profile well-distributed; no acute refinancing
  crisis; average maturity ~8–10 years [14]. UK not under IMF program; no
  external financing constraints; credit rating stable [28]. Rising interest
  rates increase debt servicing costs; fiscal consolidation necessary to
  stabilize debt trajectory [14]. Energy import dependency: ~50% of electricity
  from renewables; natural gas imports from Norway, Netherlands, Russia
  (limited); oil imports from Middle East, Africa [7]. Financial system: London
  is global financial center; significant foreign investment; financial
  stability dependent on global conditions [13]. Shipping routes: UK dependent
  on international shipping; Suez Canal and Strait of Malacca important for
  trade; no acute shipping risk but geopolitical tensions monitored [24]. EU
  trade: post-Brexit friction; goods trade with EU declined 15–20%; services
  trade maintained [8].
economy_externalVulnerability_fr: >-
  Exportations : 650 milliards de dollars annuellement (2025) ; concentrées dans
  les services financiers (40 %), services professionnels (15 %), produits
  pharmaceutiques (8 %), machines (7 %), autres [8]. Importations : 750
  milliards de dollars annuellement (2025) ; concentrées dans les machines (20
  %), minéraux (15 %), véhicules (12 %), produits chimiques (10 %), autres [8].
  Solde commercial : déficit de ~100 milliards de dollars annuellement ; le
  surplus des services compense le déficit des biens [8]. Concentration des
  exportations : les services financiers dépendent fortement des marchés de l'UE
  et des États-Unis (70 % des exportations) ; les frictions post-Brexit
  affectent le commerce avec l'UE [8]. Détenteurs de la dette : ~60 % de la
  dette publique détenue au niveau intérieur (banques britanniques, fonds de
  pension, compagnies d'assurance) ; ~40 % détenue par des investisseurs
  étrangers [14]. Mur d'échéance : le profil d'échéance de la dette publique est
  bien distribué ; aucune crise de refinancement aiguë ; l'échéance moyenne
  ~8–10 ans [14]. Le Royaume-Uni n'est pas sous un programme du FMI ; aucune
  contrainte de financement externe ; la cote de crédit est stable [28]. La
  hausse des taux d'intérêt augmente les coûts du service de la dette ; la
  consolidation budgétaire est nécessaire pour stabiliser la trajectoire de la
  dette [14]. Dépendance aux importations d'énergie : ~50 % de l'électricité à
  partir d'énergies renouvelables ; importations de gaz naturel de Norvège,
  Pays-Bas, Russie (limité) ; importations de pétrole du Moyen-Orient, Afrique
  [7]. Système financier : Londres est centre financier mondial ;
  l'investissement étranger significatif ; la stabilité financière dépend des
  conditions mondiales [13]. Routes maritimes : le Royaume-Uni dépend du
  transport maritime international ; le canal de Suez et le détroit de Malacca
  sont importants pour le commerce ; aucun risque de navigation aiguë mais les
  tensions géopolitiques sont surveillées [24]. Commerce avec l'UE : frictions
  post-Brexit ; le commerce des biens avec l'UE a diminué de 15–20 % ; le
  commerce des services maintenu [8].
economy_politicalEconomy_en: >-
  Who benefits: financial services sector (London) benefits from global demand;
  professional services benefit from current model; manufacturing faces
  competitive pressure from imports; agriculture faces post-Brexit adjustment
  [6] [27]. Technology sector, professional services, financial services benefit
  from current model; agriculture, manufacturing face pressures [27]. No
  dominant oligarchic structure; business concentrated in large corporations
  (FTSE 100 companies) with dispersed ownership; no single family dominance
  [27]. Technical needs: Infrastructure investment; skills development; labor
  market reforms; fiscal consolidation; energy transition support [6] [7].
  Political possibility: Infrastructure investment supported but funding
  limited; skills development possible; labor market reforms contentious with
  unions; fiscal consolidation difficult with public service demands; energy
  transition reforms possible [2] [6]. Public sector wages: government committed
  to pay restraint; public sector unions seeking wage increases; pension
  obligations significant [14]. No price controls; market-based pricing;
  government provides targeted income support (Universal Credit, fuel price cap)
  [6]. Agricultural support: post-Brexit; government provides direct payments to
  farmers; agricultural subsidies transitioning [29].
economy_politicalEconomy_fr: >-
  Qui bénéficie : le secteur des services financiers (Londres) bénéficie de la
  demande mondiale ; les services professionnels bénéficient du modèle actuel ;
  la fabrication fait face à la pression concurrentielle des importations ;
  l'agriculture fait face à l'ajustement post-Brexit [6] [27]. Le secteur
  technologique, les services professionnels, les services financiers
  bénéficient du modèle actuel ; l'agriculture, la fabrication font face aux
  pressions [27]. Pas de structure oligarchique dominante ; les affaires sont
  concentrées dans les grandes sociétés (sociétés FTSE 100) avec une propriété
  dispersée ; pas de domination familiale unique [27]. Besoins techniques :
  investissement en infrastructure ; développement des compétences ; réformes du
  marché du travail ; consolidation budgétaire ; soutien à la transition
  énergétique [6] [7]. Possibilité politique : l'investissement en
  infrastructure est soutenu mais le financement est limité ; le développement
  des compétences est possible ; les réformes du marché du travail sont
  contentieuses avec les syndicats ; la consolidation budgétaire est difficile
  avec les demandes de services publics ; les réformes de la transition
  énergétique sont possibles [2] [6]. Salaires du secteur public : le
  gouvernement s'engage à la retenue des salaires ; les syndicats du secteur
  public demandent des augmentations de salaires ; les obligations de pension
  sont significatives [14]. Pas de contrôle des prix ; tarification basée sur le
  marché ; le gouvernement fournit un soutien ciblé (Universal Credit, plafond
  des prix de carburant) [6]. Soutien agricole : post-Brexit ; le gouvernement
  fournit des paiements directs aux agriculteurs ; les subventions agricoles en
  transition [29].
security_internal_en: >-
  Terrorism risk: Islamic extremists and far-right groups conduct occasional
  attacks; threat level currently SUBSTANTIAL [30]. Organized crime: drug
  trafficking, human trafficking, extortion present but not destabilizing; law
  enforcement maintains control [16]. Protests and labor strikes: periodic
  strikes in public sector (NHS, transport, education); street mobilization
  capacity moderate [5] [12]. Armed Forces (82,000 active personnel)
  operationally capable; equipment modern; recruitment and retention challenges
  [16]. Intelligence services: MI5, MI6, GCHQ operationally capable; credible
  threat assessment capacity [16]. Police capacity: 130,000 police personnel;
  training and equipment modern; human rights concerns (stop-and-search, racial
  bias) documented [16]. Corruption: low corruption levels compared to
  international standards; occasional scandals in politics and business [31].
security_internal_fr: >-
  Risque de terrorisme : les extrémistes islamiques et les groupes d'extrême
  droite mènent des attaques occasionnelles ; le niveau de menace est
  actuellement SUBSTANTIEL [30]. Crime organisé : le trafic de drogue, le trafic
  d'êtres humains, l'extorsion sont présents mais ne déstabilisent pas ;
  l'application de la loi maintient le contrôle [16]. Protestations et grèves du
  travail : les grèves périodiques du secteur public (NHS, transport, éducation)
  ; la capacité de mobilisation de rue est modérée [5] [12]. Forces armées (82
  000 personnel actif) opérationnellement capables ; équipement moderne ; défis
  de recrutement et de rétention [16]. Services de renseignement : MI5, MI6,
  GCHQ opérationnellement capables ; capacité d'évaluation des menaces crédible
  [16]. Capacité de la police : 130 000 personnel de police ; formation et
  équipement modernes ; préoccupations relatives aux droits de l'homme (arrêt et
  fouille, biais racial) documentées [16]. Corruption : faibles niveaux de
  corruption par rapport aux normes internationales ; scandales occasionnels en
  politique et affaires [31].
security_diplomacy_en: >-
  Treaty allies: NATO member; defense cooperation with U.S., France, Germany,
  other NATO members [20]. Transactional partners: G7 member; OECD member;
  Commonwealth member; World Bank, IMF shareholder [25]. U.S. alliance: "special
  relationship"; defense cooperation, intelligence sharing (Five Eyes alliance)
  [20]. EU relationship: post-Brexit; Trade and Cooperation Agreement in place;
  political tensions on Northern Ireland protocol, fishing rights [21]. Russia
  relationship: adversarial; sanctions on Russia over Ukraine; military support
  to Ukraine [22]. China relationship: competitive; technology competition;
  concerns over foreign investment in critical infrastructure [23]. Commonwealth
  relationships: historical ties with former colonies; trade relationships with
  Canada, Australia, India, others [24]. Regional leadership: G7 member; OECD
  member; permanent UN Security Council member [25]. Ukraine support: military
  aid, financial support, diplomatic support [22]. Middle East engagement:
  defense relationships with Gulf states; concerns over Yemen conflict, Iran
  nuclear program [32].
security_diplomacy_fr: >-
  Alliés des traités : membre de l'OTAN ; coopération en défense avec
  États-Unis, France, Allemagne, autres membres de l'OTAN [20]. Partenaires
  transactionnels : membre du G7 ; membre de l'OCDE ; membre du Commonwealth ;
  actionnaire de la Banque mondiale, FMI [25]. Alliance avec les États-Unis :
  "relation spéciale" ; coopération en défense, partage de renseignements
  (alliance Five Eyes) [20]. Relation avec l'UE : post-Brexit ; Accord de
  commerce et de coopération en place ; tensions politiques sur le protocole
  d'Irlande du Nord, droits de pêche [21]. Relation avec la Russie :
  adversariale ; sanctions contre la Russie pour l'Ukraine ; soutien militaire à
  l'Ukraine [22]. Relation avec la Chine : compétitive ; compétition
  technologique ; préoccupations concernant l'investissement étranger dans les
  infrastructures critiques [23]. Relations du Commonwealth : liens historiques
  avec d'anciennes colonies ; relations commerciales avec Canada, Australie,
  Inde, autres [24]. Leadership régional : membre du G7 ; membre de l'OCDE ;
  membre permanent du Conseil de sécurité de l'ONU [25]. Soutien à l'Ukraine :
  aide militaire, soutien financier, soutien diplomatique [22]. Engagement au
  Moyen-Orient : relations de défense avec les États du Golfe ; préoccupations
  concernant le conflit du Yémen, le programme nucléaire iranien [32].
