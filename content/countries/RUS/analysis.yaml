executiveSnapshot_en: >-
  Regime type: Centralized authoritarian state under President Vladimir Putin.
  Putin holds consolidated power as President (since 2000, with prime
  ministerial interlude 2008–2012). Constitutional amendments (2020) enable
  Putin to remain in power until 2036. No meaningful opposition; elections are
  managed events [1] [2].

  Political equilibrium: Putin's authority is unchallenged among the elite [3].
  The 2022 Ukraine invasion consolidated nationalist sentiment and
  military-security apparatus loyalty [4]. However, economic sanctions, military
  losses, and brain drain create latent pressure [5]. Elite purges continue in
  security services and military [6].

  Economy: GDP ~$1.8 trillion nominal (2025), heavily dependent on hydrocarbon
  exports (oil, gas) [7]. Sanctions have reduced growth to 1–2% annually; import
  substitution efforts underway but inefficient [8]. Inflation elevated; ruble
  volatile [9]. Military spending increased to ~6% of GDP [10].

  Top 3 risks: (1) Ukraine war escalation and NATO confrontation [11]; (2)
  Economic collapse from sustained sanctions [12]; (3) Elite succession crisis
  if Putin incapacitated [13].

  Watch items: Military modernization pace; NATO expansion; China relationship
  deepening; internal security apparatus tensions [14].

  Dependencies: Energy exports (60% of budget revenue); China as economic
  lifeline; military-industrial complex loyalty [15].

  Security: Nuclear-armed; large standing army (1.3M active) [16]; extensive
  internal security apparatus (FSB, GRU) [17]. Border tensions with Ukraine,
  NATO members, Georgia [18].

  Diplomacy: Isolated from West; deepening ties with China, Iran, North Korea
  [19]. BRICS member; seeks multipolar world order [20]. Confrontational stance
  toward NATO and US [21].

  Confidence: HIGH — Analysis based on official Russian sources, international
  sanctions databases, military assessments, and credible news organizations
  [22].

  Outlook: Medium-term instability likely. Ukraine war remains unresolved;
  sanctions persist; succession uncertainty looms. Putin's regime is resilient
  but faces structural economic and demographic challenges [23].
executiveSnapshot_fr: >-
  Type de régime : État autoritaire centralisé sous la présidence de Vladimir
  Poutine. Poutine détient le pouvoir consolidé en tant que président (depuis
  2000, avec intermède de premier ministre 2008–2012). Les amendements
  constitutionnels (2020) permettent à M. Poutine de rester au pouvoir jusqu'en
  2036. Pas d'opposition significative ; les élections sont des événements gérés
  [1] [2].

  Équilibre politique : L'autorité de Poutine est incontestée parmi l'élite [3].
  L'invasion de l'Ukraine en 2022 a consolidé le sentiment nationaliste et la
  loyauté de l'appareil militaire-sécuritaire [4]. Cependant, les sanctions
  économiques, les pertes militaires et l'exode des cerveaux créent une pression
  latente [5]. Les purges d'élite se poursuivent dans les services de sécurité
  et l'armée [6].

  Économie : PIB ~1,8 billion de dollars nominaux (2025), fortement dépendant
  des exportations d'hydrocarbures (pétrole, gaz) [7]. Les sanctions ont réduit
  la croissance à 1–2 % annuellement ; les efforts de substitution des
  importations sont en cours mais inefficaces [8]. L'inflation est élevée ; le
  rouble est volatil [9]. Les dépenses militaires ont augmenté à ~6 % du PIB
  [10].

  Top 3 risques : (1) Escalade de la guerre en Ukraine et confrontation avec
  l'OTAN [11] ; (2) Effondrement économique dû aux sanctions prolongées [12] ;
  (3) Crise de succession d'élite si Poutine est incapacité [13].

  Points de surveillance : Rythme de modernisation militaire ; expansion de
  l'OTAN ; approfondissement de la relation avec la Chine ; tensions au sein de
  l'appareil de sécurité interne [14].

  Dépendances : Exportations d'énergie (60 % des revenus budgétaires) ; la Chine
  comme bouée de sauvetage économique ; loyauté du complexe militaro-industriel
  [15].

  Sécurité : Armée nucléaire ; grande armée régulière (1,3M actifs) [16] ;
  appareil de sécurité interne étendu (FSB, GRU) [17]. Tensions frontalières
  avec l'Ukraine, les membres de l'OTAN, la Géorgie [18].

  Diplomatie : Isolée de l'Occident ; approfondissement des liens avec la Chine,
  l'Iran, la Corée du Nord [19]. Membre des BRICS ; cherche un ordre mondial
  multipolaire [20]. Posture de confrontation envers l'OTAN et les États-Unis
  [21].

  Confiance : HAUTE — L'analyse est basée sur des sources officielles russes,
  des bases de données de sanctions internationales, des évaluations militaires
  et des organisations de presse crédibles [22].

  Perspectives : L'instabilité à moyen terme est probable. La guerre en Ukraine
  reste non résolue ; les sanctions persistent ; l'incertitude de succession se
  profile. Le régime de Poutine est résilient mais fait face à des défis
  économiques et démographiques structurels [23].
political_powerStructure_en: >-
  President Vladimir Putin holds supreme executive authority as head of state
  and commander-in-chief of the armed forces [1] [2]. The Presidential
  Administration, led by the Chief of Staff, controls policy implementation and
  manages the bureaucracy [24]. The Security Council, chaired by Putin,
  coordinates defense and foreign policy among security agencies (FSB, GRU,
  Defense Ministry) [3] [4]. The Federal Assembly (bicameral parliament) is
  subordinate; the State Duma (lower house) is dominated by the ruling United
  Russia party and rubber-stamps executive legislation [5]. Regional governors
  are appointed by Putin and exercise limited autonomy [6].
political_powerStructure_fr: >-
  Le président Vladimir Poutine détient l'autorité exécutive suprême en tant que
  chef d'État et commandant en chef des forces armées [1] [2]. L'Administration
  présidentielle, dirigée par le chef de cabinet, contrôle la mise en œuvre des
  politiques et gère la bureaucratie [24]. Le Conseil de sécurité, présidé par
  Poutine, coordonne la défense et la politique étrangère entre les agences de
  sécurité (FSB, GRU, ministère de la Défense) [3] [4]. L'Assemblée fédérale
  (parlement bicaméral) est subordonnée ; la Douma d'État (chambre basse) est
  dominée par le parti Russie unie au pouvoir et approuve automatiquement la
  législation exécutive [5]. Les gouverneurs régionaux sont nommés par Poutine
  et exercent une autonomie limitée [6].
political_stabilityDrivers_en: >-
  Legitimacy derives from nationalist sentiment, particularly post-2022 Ukraine
  invasion, which consolidated public support for Putin [4]. The security
  apparatus (FSB, GRU, Interior Ministry) maintains internal control through
  surveillance and selective repression [7]. The military-industrial complex and
  energy sector elites remain loyal due to state contracts and patronage
  networks [8]. Orthodox Church provides moral legitimacy [9]. State media
  monopoly controls narrative [10].
political_stabilityDrivers_fr: >-
  La légitimité découle du sentiment nationaliste, en particulier après
  l'invasion de l'Ukraine en 2022, qui a consolidé le soutien public à Poutine
  [4]. L'appareil de sécurité (FSB, GRU, ministère de l'Intérieur) maintient le
  contrôle interne par la surveillance et la répression sélective [7]. Le
  complexe militaro-industriel et les élites du secteur énergétique restent
  loyaux en raison des contrats d'État et des réseaux de patronage [8]. L'Église
  orthodoxe fournit une légitimité morale [9]. Le monopole des médias d'État
  contrôle le récit [10].
political_shockAbsorbers_en: >-
  The centralized power structure allows rapid decision-making without
  institutional constraints [11]. The security apparatus can suppress dissent
  through arrests, harassment, and violence [12]. Energy revenues provide
  resources for patronage and military spending [13]. Nuclear deterrent prevents
  external military intervention [14]. However, institutional redundancy is
  limited; succession planning is opaque, creating vulnerability if Putin is
  incapacitated [15].
political_shockAbsorbers_fr: >-
  La structure de pouvoir centralisée permet une prise de décision rapide sans
  contraintes institutionnelles [11]. L'appareil de sécurité peut réprimer la
  dissidence par des arrestations, du harcèlement et de la violence [12]. Les
  revenus énergétiques fournissent des ressources pour le patronage et les
  dépenses militaires [13]. La dissuasion nucléaire empêche l'intervention
  militaire externe [14]. Cependant, la redondance institutionnelle est limitée
  ; la planification de la succession est opaque, créant une vulnérabilité si
  Poutine est incapacité [15].
economy_macroReality_en: >-
  Russia's economy is heavily dependent on hydrocarbon exports (oil and natural
  gas), which account for ~60% of federal budget revenue and 40% of total
  exports [7] [8]. Nominal GDP stands at approximately $1.8 trillion (2025),
  making Russia the world's 11th largest economy [25]. However, sanctions
  imposed after the 2022 Ukraine invasion have severely constrained growth,
  reducing it to 1–2% annually [9]. The manufacturing sector is underdeveloped;
  import substitution efforts have been inefficient and costly [10]. Inflation
  remains elevated at 5–7% annually; the ruble has depreciated significantly
  against hard currencies [26]. Military spending has increased to ~6% of GDP,
  crowding out civilian investment [11].
economy_macroReality_fr: >-
  L'économie russe dépend fortement des exportations d'hydrocarbures (pétrole et
  gaz naturel), qui représentent ~60 % des revenus budgétaires fédéraux et 40 %
  des exportations totales [7] [8]. Le PIB nominal s'élève à environ 1,8 billion
  de dollars (2025), ce qui fait de la Russie la 11ème plus grande économie du
  monde [25]. Cependant, les sanctions imposées après l'invasion de l'Ukraine en
  2022 ont gravement entravé la croissance, la réduisant à 1–2 % annuellement
  [9]. Le secteur manufacturier est sous-développé ; les efforts de substitution
  des importations ont été inefficaces et coûteux [10]. L'inflation reste élevée
  à 5–7 % annuellement ; le rouble s'est considérablement déprécié par rapport
  aux devises fortes [26]. Les dépenses militaires ont augmenté à ~6 % du PIB,
  évinçant l'investissement civil [11].
economy_externalVulnerability_en: >-
  Russia is highly vulnerable to commodity price fluctuations and sanctions
  [12]. Western sanctions target the energy sector, financial system, and
  technology imports, limiting access to advanced semiconductors and software
  [13]. The SWIFT banking system restrictions have forced Russia to develop
  alternative payment mechanisms (SPFS, Chinese systems) [14]. Capital flight
  and brain drain (estimated 500,000–1 million Russians emigrated since 2022)
  reduce human capital [27]. Dependence on China for technology and trade has
  increased, creating asymmetric vulnerability [15].
economy_externalVulnerability_fr: >-
  La Russie est très vulnérable aux fluctuations des prix des matières premières
  et aux sanctions [12]. Les sanctions occidentales ciblent le secteur
  énergétique, le système financier et les importations technologiques, limitant
  l'accès aux semi-conducteurs avancés et aux logiciels [13]. Les restrictions
  du système SWIFT bancaire ont forcé la Russie à développer des mécanismes de
  paiement alternatifs (SPFS, systèmes chinois) [14]. La fuite des capitaux et
  l'exode des cerveaux (estimés à 500 000–1 million de Russes émigrés depuis
  2022) réduisent le capital humain [27]. La dépendance à la Chine pour la
  technologie et le commerce a augmenté, créant une vulnérabilité asymétrique
  [15].
economy_politicalEconomy_en: >-
  The Russian economy is characterized by state capitalism: major sectors
  (energy, defense, banking, telecommunications) are controlled by state-owned
  enterprises or Putin-connected oligarchs [16]. Corruption is endemic; the
  World Bank Corruption Perception Index ranks Russia 137th out of 180 countries
  [28]. Labor unions are weak and co-opted by the state [17]. The middle class
  has shrunk due to capital controls and economic stagnation [18]. Pension
  system is underfunded; healthcare and education systems are deteriorating
  [19].
economy_politicalEconomy_fr: >-
  L'économie russe est caractérisée par le capitalisme d'État : les secteurs
  majeurs (énergie, défense, banque, télécommunications) sont contrôlés par des
  entreprises d'État ou des oligarques liés à Poutine [16]. La corruption est
  endémique ; l'indice de perception de la corruption de la Banque mondiale
  classe la Russie 137ème sur 180 pays [28]. Les syndicats sont faibles et
  cooptés par l'État [17]. La classe moyenne a rétrécit en raison des contrôles
  de capitaux et de la stagnation économique [18]. Le système de retraite est
  sous-financé ; les systèmes de santé et d'éducation se détériorent [19].
security_internal_en: >-
  Internal security is maintained through a vast apparatus including the Federal
  Security Service (FSB), Interior Ministry (MVD), and Federal Protective
  Service (FSO) [7] [17]. Surveillance is pervasive; the FSB monitors political
  opposition, civil society, and independent media [20]. Dissent is suppressed
  through arrests, torture allegations, and extrajudicial killings [21]. The
  2022 Ukraine invasion triggered a crackdown on anti-war activists; thousands
  have been arrested or fled the country [22]. However, organized resistance
  remains minimal due to the security apparatus's effectiveness and public
  fatigue [29].
security_internal_fr: >-
  La sécurité interne est maintenue par un vaste appareil incluant le Service
  fédéral de sécurité (FSB), le ministère de l'Intérieur (MVD) et le Service
  fédéral de protection (FSO) [7] [17]. La surveillance est omniprésente ; le
  FSB surveille l'opposition politique, la société civile et les médias
  indépendants [20]. La dissidence est réprimée par des arrestations, des
  allégations de torture et des meurtres extrajudiciaires [21]. L'invasion de
  l'Ukraine en 2022 a déclenché une répression contre les militants anti-guerre
  ; des milliers ont été arrêtés ou ont fui le pays [22]. Cependant, la
  résistance organisée reste minimale en raison de l'efficacité de l'appareil de
  sécurité et de la fatigue publique [29].
security_diplomacy_en: >-
  Russia's foreign policy is confrontational toward the West and transactional
  toward non-Western powers [19] [20]. The Ukraine invasion has made Russia a
  pariah in Western capitals; sanctions and diplomatic isolation persist [23].
  Russia has deepened ties with China, Iran, and North Korea, forming an
  informal anti-Western coalition [24]. BRICS membership provides a forum for
  challenging Western-dominated institutions [25]. Russia seeks to restore its
  sphere of influence in former Soviet states (Belarus, Kazakhstan, Moldova)
  [26]. NATO expansion remains a red line; Russia views NATO membership for
  Ukraine and Georgia as existential threats [27]. The Arctic is a new frontier
  for Russian strategic competition with NATO members [30].
security_diplomacy_fr: >-
  La politique étrangère russe est confrontationnelle envers l'Occident et
  transactionnelle envers les puissances non-occidentales [19] [20]. L'invasion
  de l'Ukraine a fait de la Russie un paria dans les capitales occidentales ;
  les sanctions et l'isolement diplomatique persistent [23]. La Russie a
  approfondi ses liens avec la Chine, l'Iran et la Corée du Nord, formant une
  coalition informelle anti-occidentale [24]. L'adhésion aux BRICS fournit un
  forum pour contester les institutions dominées par l'Occident [25]. La Russie
  cherche à restaurer sa sphère d'influence dans les anciens États soviétiques
  (Biélorussie, Kazakhstan, Moldavie) [26]. L'expansion de l'OTAN reste une
  ligne rouge ; la Russie considère l'adhésion de l'Ukraine et de la Géorgie à
  l'OTAN comme des menaces existentielles [27]. L'Arctique est une nouvelle
  frontière pour la concurrence stratégique russe avec les membres de l'OTAN
  [30].
