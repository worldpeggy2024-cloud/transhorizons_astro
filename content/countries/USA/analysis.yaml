executiveSnapshot_en: >-
  Regime type: Presidential democracy with separation of powers; power won
  through popular elections every 4 years [1]. Executive authority vested in
  President; legislative power held by bicameral Congress (Senate, House);
  judicial power held by Supreme Court [2]. 2024 election cycle and 2026
  midterms create near-term political uncertainty [3].

  Current political equilibrium: Partisan polarization at historic levels;
  Republican and Democratic parties deeply fragmented along ideological lines
  [4]. Congress gridlocked; executive power expanding through executive orders
  and emergency declarations [5]. Supreme Court conservative-dominated (6-3
  majority); recent decisions overturning precedents (Roe v. Wade, affirmative
  action) [6]. Elite cohesion fractured; institutional consensus eroding [7].

  Economic model: Largest economy globally at $27.4 trillion nominal GDP;
  service-dominated (80% of GDP) with technology and finance as growth engines
  [8]. Manufacturing base eroded (11% of GDP vs. 25% in 1970) but reshoring
  initiatives underway [9]. Dollar reserve currency status provides monetary
  policy flexibility [10]. Federal debt at 120% of GDP creates fiscal pressures
  [11].

  Top 3 risks (6–18 months): (1) Political dysfunction and democratic erosion —
  partisan polarization threatens institutional functioning and electoral
  integrity [4] [12]; (2) Fiscal crisis — federal deficit at 6.3% of GDP; debt
  trajectory unsustainable without reform [11] [13]; (3) China military
  confrontation (Taiwan) — strategic competition intensifying; Taiwan
  contingency creates existential risk [14].

  Top 3 watch items (4–12 weeks): (1) 2026 midterm election dynamics and control
  of Congress; (2) Federal Reserve interest rate decisions and inflation
  trajectory; (3) China-Taiwan military posturing and U.S. response.

  External dependencies: Dollar reserve currency status; foreign ownership of
  U.S. debt at $7.5 trillion [15]. Supply chain concentration in semiconductors,
  pharmaceuticals, rare earth elements creates vulnerability [16]. Energy import
  dependence declined (shale revolution) but refined products remain significant
  [17]. Geopolitical competition with China threatens technology dominance and
  supply chain resilience [14].

  Security posture: Gun violence endemic (45,000+ deaths annually) [18]; opioid
  crisis (100,000+ deaths yearly) concentrated in rural and post-industrial
  regions [19]. Organized crime and gang violence in major urban centers related
  to drug trafficking [20]. Domestic terrorism rising (right-wing and left-wing
  extremism) [21]. Cybercrime and ransomware attacks by foreign state actors
  (Russia, China, Iran) [22]. Border security challenges with Mexico (drug
  trafficking, migration pressures) [23].

  Diplomatic orientation: NATO leader and Article 5 guarantor for 31 member
  states [24]. Indo-Pacific strategy focuses on countering China through Quad
  (US, Japan, India, Australia) and AUKUS (US, UK, Australia) partnerships [25].
  Ukraine support major commitment ($113 billion) [26]. Taiwan security
  commitments increasingly explicit through arms sales [27]. Multilateral
  engagement selective; transatlantic relationship strained by trade disputes
  [28].

  Data confidence: HIGH for macro-economic data (BEA, Federal Reserve, BLS);
  HIGH for military capability (DoD); MEDIUM for political elite cohesion
  (forward-looking); MEDIUM for institutional resilience (contested norms); LOW
  for domestic extremism trajectory (emerging threat).

  Baseline outlook: U.S. retains structural advantages (military, technology,
  alliances) but faces medium-term challenges from partisan polarization, fiscal
  dynamics, and geopolitical competition with China; institutional stress
  increasing but democratic institutions likely to persist [29] [30].
executiveSnapshot_fr: >-
  Type de régime : Démocratie présidentielle avec séparation des pouvoirs; le
  pouvoir est remporté par des élections populaires tous les 4 ans [1].
  L'autorité exécutive est confiée au Président ; le pouvoir législatif est
  détenu par le Congrès bicaméral (Sénat, Chambre) ; le pouvoir judiciaire est
  détenu par la Cour suprême [2]. Le cycle électoral 2024 et les élections de
  mi-mandat 2026 créent une incertitude politique à court terme [3].

  Équilibre politique actuel : La polarisation partisane est à des niveaux
  historiques ; les partis républicain et démocrate sont profondément fragmentés
  selon les lignes idéologiques [4]. Le Congrès est bloqué ; le pouvoir exécutif
  s'étend par les décrets présidentiels et les déclarations d'urgence [5]. La
  Cour suprême à majorité conservatrice (6-3) ; les décisions récentes annulent
  les précédents (Roe c. Wade, action affirmative) [6]. La cohésion des élites
  est fracturée ; le consensus institutionnel s'érode [7].

  Modèle économique : Plus grande économie mondiale avec un PIB nominal de 27,4
  billions de dollars ; dominée par les services (80% du PIB) avec la
  technologie et la finance comme moteurs de croissance [8]. La base
  manufacturière s'est érodée (11% du PIB contre 25% en 1970) mais les
  initiatives de relocalisation sont en cours [9]. Le statut de monnaie de
  réserve du dollar offre une flexibilité politique monétaire [10]. La dette
  fédérale à 120% du PIB crée des pressions budgétaires [11].

  Top 3 risques (6–18 mois) : (1) Dysfonctionnement politique et érosion
  démocratique — la polarisation partisane menace le fonctionnement
  institutionnel et l'intégrité électorale [4] [12] ; (2) Crise budgétaire — le
  déficit fédéral à 6,3% du PIB ; la trajectoire de la dette est insoutenable
  sans réforme [11] [13] ; (3) Confrontation militaire avec la Chine (Taïwan) —
  la concurrence stratégique s'intensifie ; la contingence taïwanaise crée un
  risque existentiel [14].

  Top 3 éléments à surveiller (4–12 semaines) : (1) Dynamique des élections de
  mi-mandat 2026 et contrôle du Congrès ; (2) Décisions de taux d'intérêt de la
  Réserve fédérale et trajectoire de l'inflation ; (3) Positionnement militaire
  Chine-Taïwan et réponse américaine.

  Dépendances externes : Statut de monnaie de réserve du dollar ; propriété
  étrangère de la dette américaine à 7,5 billions de dollars [15]. La
  concentration de la chaîne d'approvisionnement en semi-conducteurs, produits
  pharmaceutiques, éléments de terres rares crée une vulnérabilité [16]. La
  dépendance aux importations d'énergie a diminué (révolution du schiste) mais
  les produits raffinés restent importants [17]. La concurrence géopolitique
  avec la Chine menace la dominance technologique et la résilience de la chaîne
  d'approvisionnement [14].

  Posture de sécurité : La violence armée est endémique (45 000+ décès annuels)
  [18] ; la crise des opioïdes (100 000+ décès par an) est concentrée dans les
  régions rurales et post-industrielles [19]. Le crime organisé et la violence
  des gangs dans les grands centres urbains liés au trafic de drogue [20]. Le
  terrorisme intérieur augmente (extrémisme de droite et de gauche) [21]. Les
  cybercrimes et les attaques par rançongiciel par les acteurs des États
  étrangers (Russie, Chine, Iran) [22]. Les défis de la sécurité frontalière
  avec le Mexique (trafic de drogue, pressions migratoires) [23].

  Orientation diplomatique : Leader de l'OTAN et garant de l'article 5 pour 31
  États membres [24]. La stratégie indo-pacifique se concentre sur la contention
  de la Chine par le biais des partenariats Quad (États-Unis, Japon, Inde,
  Australie) et AUKUS (États-Unis, Royaume-Uni, Australie) [25]. Le soutien à
  l'Ukraine est un engagement majeur (113 milliards de dollars) [26]. Les
  engagements de sécurité de Taïwan deviennent de plus en plus explicites par le
  biais des ventes d'armes [27]. L'engagement multilatéral est sélectif ; les
  relations transatlantiques sont tendues par les différends commerciaux [28].

  Confiance des données : ÉLEVÉE pour les données macroéconomiques (BEA, Réserve
  fédérale, BLS) ; ÉLEVÉE pour la capacité militaire (DoD) ; MOYENNE pour la
  cohésion des élites politiques (perspectives) ; MOYENNE pour la résilience
  institutionnelle (normes contestées) ; FAIBLE pour la trajectoire de
  l'extrémisme intérieur (menace émergente).

  Perspective de base : Les États-Unis conservent des avantages structurels
  (militaire, technologie, alliances) mais font face à des défis à moyen terme
  liés à la polarisation partisane, à la dynamique budgétaire et à la
  concurrence géopolitique avec la Chine ; le stress institutionnel augmente
  mais les institutions démocratiques sont susceptibles de persister [29] [30].
political_powerStructure_en: >-
  President commands executive branch; controls federal agencies, military
  (Commander-in-Chief), and foreign policy [1] [2]. Cabinet (15 departments)
  reports to President; White House staff (Chief of Staff, National Security
  Advisor, Domestic Policy Advisor) wield significant influence [31]. Congress
  divided into Senate (100 members, 2 per state) and House (435 members,
  apportioned by population) [2]. Senate controls treaty ratification, Supreme
  Court confirmation, impeachment trials [32]. House controls budget
  origination, impeachment [33]. Supreme Court (9 justices, lifetime tenure)
  exercises judicial review and interprets Constitution [34]. Federal Reserve
  (12 regional banks, Board of Governors) controls monetary policy; Chair
  requires Senate confirmation [35]. State governments retain significant
  autonomy over education, law enforcement, social policy [36]. No evidence of
  military factionalism or disloyalty to civilian authority; professional
  military culture strong [37]. Federal Bureau of Investigation (FBI) and
  Central Intelligence Agency (CIA) report to President through Attorney General
  and Director of National Intelligence [38]. Media: private ownership dominant;
  no state censorship; press freedom rated HIGH by Reporters Without Borders
  [39].
political_powerStructure_fr: >-
  Le Président commande la branche exécutive ; contrôle les agences fédérales,
  l'armée (Commandant en chef) et la politique étrangère [1] [2]. Le Cabinet (15
  départements) rend des comptes au Président ; le personnel de la
  Maison-Blanche (Chef de cabinet, Conseiller à la sécurité nationale,
  Conseiller à la politique intérieure) exerce une influence significative [31].
  Le Congrès est divisé en Sénat (100 membres, 2 par État) et Chambre (435
  membres, répartis selon la population) [2]. Le Sénat contrôle la ratification
  des traités, la confirmation de la Cour suprême, les procès en destitution
  [32]. La Chambre contrôle l'origine du budget, la destitution [33]. La Cour
  suprême (9 juges, mandat à vie) exerce le contrôle judiciaire et interprète la
  Constitution [34]. La Réserve fédérale (12 banques régionales, Conseil des
  gouverneurs) contrôle la politique monétaire ; le Président du Conseil doit
  être confirmé par le Sénat [35]. Les gouvernements des États conservent une
  autonomie significative en matière d'éducation, d'application de la loi, de
  politique sociale [36]. Aucune preuve de factionnalisme militaire ou de
  déloyauté envers l'autorité civile ; la culture militaire professionnelle est
  forte [37]. Le Federal Bureau of Investigation (FBI) et la Central
  Intelligence Agency (CIA) rendent des comptes au Président par l'intermédiaire
  du Procureur général et du Directeur du renseignement national [38]. Médias :
  propriété privée dominante ; pas de censure d'État ; la liberté de la presse
  est classée ÉLEVÉE par Reporters sans frontières [39].
political_stabilityDrivers_en: >-
  Legitimacy rests on democratic elections, competitive party system, and
  peaceful power transitions despite deep divisions [40]. Constitutional
  framework endured 230+ years through institutional resilience [41].
  Independent judiciary and free press serve as institutional checks [42].
  Strong civil society and NGO ecosystem mobilize citizens [43]. Military
  subordination to civilian authority deeply embedded in institutional culture
  [44]. Decentralized federalism allows policy experimentation and reduces
  single-point failure risk [45]. Economic dynamism and entrepreneurship enable
  adaptation [46]. However, democratic norms increasingly contested; judicial
  politicization rising; election denial rhetoric spreading [47]. Partisan
  polarization fragmenting elite consensus [48]. Wealth inequality (Gini: 0.48)
  widening; social cohesion eroding [49].
political_stabilityDrivers_fr: >-
  La légitimité repose sur les élections démocratiques, un système de partis
  compétitif et les transitions pacifiques du pouvoir malgré les profondes
  divisions [40]. Le cadre constitutionnel a duré 230+ ans grâce à la résilience
  institutionnelle [41]. La magistrature indépendante et la presse libre servent
  de contrôles institutionnels [42]. La société civile forte et l'écosystème des
  ONG mobilisent les citoyens [43]. La subordination militaire à l'autorité
  civile est profondément ancrée dans la culture institutionnelle [44]. Le
  fédéralisme décentralisé permet l'expérimentation politique et réduit le
  risque de défaillance unique [45]. Le dynamisme économique et l'esprit
  d'entreprise permettent l'adaptation [46]. Cependant, les normes démocratiques
  sont de plus en plus contestées ; la politisation judiciaire augmente ; le
  discours de déni électoral se propage [47]. La polarisation partisane
  fragmente le consensus des élites [48]. L'inégalité des richesses (Gini :
  0,48) s'élargit ; la cohésion sociale s'érode [49].
political_shockAbsorbers_en: >-
  Absorbers: Federal system allows states to experiment with policies;
  decentralized governance reduces vulnerability to central collapse [50].
  Institutional redundancy and checks-and-balances prevent power concentration
  [51]. Economic diversity across regions (tech hubs, manufacturing, energy,
  agriculture) provides resilience [52]. Private sector dynamism and
  entrepreneurship enable rapid adaptation [53]. Civil society networks and NGOs
  provide social safety nets [54]. Deep capital markets and strong dollar
  provide monetary policy flexibility [55]. Accelerants: Contested elections
  could trigger post-election violence or constitutional crisis [56]. Inflation
  spike could trigger fiscal crisis and austerity backlash [57]. Elite split
  within ruling party could fracture institutional consensus [58]. Cybersecurity
  attack on critical infrastructure could trigger cascading failures [59]. China
  military confrontation (Taiwan) could escalate to direct conflict [14].
  Domestic extremism and political violence could undermine democratic
  institutions [21].
political_shockAbsorbers_fr: >-
  Absorbants : Le système fédéral permet aux États d'expérimenter les politiques
  ; la gouvernance décentralisée réduit la vulnérabilité à l'effondrement
  central [50]. La redondance institutionnelle et les freins et contrepoids
  empêchent la concentration du pouvoir [51]. La diversité économique entre les
  régions (centres technologiques, fabrication, énergie, agriculture) offre une
  résilience [52]. Le dynamisme du secteur privé et l'esprit d'entreprise
  permettent une adaptation rapide [53]. Les réseaux de la société civile et les
  ONG fournissent des filets de sécurité sociale [54]. Les marchés de capitaux
  profonds et le dollar fort offrent une flexibilité politique monétaire [55].
  Accélérateurs : Les élections contestées pourraient déclencher une violence
  post-électorale ou une crise constitutionnelle [56]. Une augmentation de
  l'inflation pourrait déclencher une crise budgétaire et une réaction de
  rigueur [57]. Une division des élites au sein du parti au pouvoir pourrait
  fragmenter le consensus institutionnel [58]. Une cyberattaque sur les
  infrastructures critiques pourrait déclencher des défaillances en cascade
  [59]. Une confrontation militaire Chine-Taïwan pourrait s'escalader en conflit
  direct [14]. L'extrémisme intérieur et la violence politique pourraient saper
  les institutions démocratiques [21].
economy_macroReality_en: >-
  U.S. economy at $27.4 trillion nominal GDP represents ~25% of global economic
  output [8]. Service sector dominates at 80% of GDP; technology and finance
  primary growth engines [60]. Manufacturing declined from 25% of GDP (1970) to
  11% (2024); reshoring initiatives underway but slow [9]. Labor market
  relatively tight with unemployment at 4.2%; wage growth moderated from 2022
  peaks [61]. Inflation declined from 9.1% (June 2022) to 3.2% but remains above
  Federal Reserve 2% target [62]. Productivity growth slowed, raising long-term
  competitiveness concerns [63]. Federal deficit at 6.3% of GDP; federal debt at
  120% of GDP [11] [13]. Fiscal consolidation politically difficult; partisan
  disagreement on tax and spending priorities [64]. Interest rates elevated to
  combat inflation; debt servicing costs rising [65]. Corporate tax effective
  rates declined; tax competition with other nations [66].
economy_macroReality_fr: >-
  L'économie américaine à 27,4 billions de dollars de PIB nominal représente
  ~25% de la production économique mondiale [8]. Le secteur des services domine
  à 80% du PIB ; la technologie et la finance sont les principaux moteurs de
  croissance [60]. La fabrication a diminué de 25% du PIB (1970) à 11% (2024) ;
  les initiatives de relocalisation sont en cours mais lentes [9]. Le marché du
  travail est relativement tendu avec un chômage à 4,2% ; la croissance des
  salaires s'est modérée par rapport aux pics de 2022 [61]. L'inflation a
  diminué de 9,1% (juin 2022) à 3,2% mais reste au-dessus de l'objectif de 2% de
  la Réserve fédérale [62]. La croissance de la productivité a ralenti,
  soulevant des préoccupations concernant la compétitivité à long terme [63]. Le
  déficit fédéral à 6,3% du PIB ; la dette fédérale à 120% du PIB [11] [13]. La
  consolidation budgétaire est politiquement difficile ; le désaccord partisan
  sur les priorités fiscales et de dépenses [64]. Les taux d'intérêt sont élevés
  pour combattre l'inflation ; les coûts de service de la dette augmentent [65].
  Les taux d'imposition effectifs des sociétés ont diminué ; la concurrence
  fiscale avec d'autres nations [66].
economy_externalVulnerability_en: >-
  U.S. runs persistent trade deficit; particularly with China ($350 billion
  annually) [67]. Dollar reserve currency status provides monetary flexibility
  but faces long-term challenges from digital currencies [68]. Foreign ownership
  of U.S. debt at $7.5 trillion; vulnerability to capital flight [15]. Supply
  chain concentration in semiconductors, pharmaceuticals, rare earth elements
  creates chokepoints [16]. Energy import dependence declined (shale revolution)
  but refined products remain significant [17]. Geopolitical competition with
  China threatens technology dominance and supply chain resilience [14].
  Sanctions regime on Russia and Iran creates economic friction [69].
  Transatlantic trade disputes (steel/aluminum tariffs) strain relationships
  [70].
economy_externalVulnerability_fr: >-
  Les États-Unis enregistrent un déficit commercial persistant ;
  particulièrement avec la Chine (350 milliards de dollars annuels) [67]. Le
  statut de monnaie de réserve du dollar offre une flexibilité monétaire mais
  fait face à des défis à long terme des monnaies numériques [68]. La propriété
  étrangère de la dette américaine à 7,5 billions de dollars ; vulnérabilité à
  la fuite de capitaux [15]. La concentration de la chaîne d'approvisionnement
  en semi-conducteurs, produits pharmaceutiques, éléments de terres rares crée
  des goulots [16]. La dépendance aux importations d'énergie a diminué
  (révolution du schiste) mais les produits raffinés restent importants [17]. La
  concurrence géopolitique avec la Chine menace la dominance technologique et la
  résilience de la chaîne d'approvisionnement [14]. Le régime de sanctions
  contre la Russie et l'Iran crée des frictions économiques [69]. Les différends
  commerciaux transatlantiques (tarifs sur l'acier/l'aluminium) tendent les
  relations [70].
economy_politicalEconomy_en: >-
  Who benefits: Technology sector (Silicon Valley, Seattle) benefits from
  current model; financial sector (New York) benefits from dollar dominance and
  capital market depth [71]. Energy sector (oil, natural gas, renewables)
  benefits from diverse energy sources [72]. Manufacturing concentrated in
  Midwest faces competitive pressure from China and Vietnam [73]. Agriculture
  benefits from commodity prices and subsidies [74]. Who loses: Manufacturing
  workers in post-industrial regions; rural communities; low-wage service
  workers [75]. Technical needs: Fiscal consolidation; corporate tax reform;
  labor market reforms; infrastructure investment; energy transition support
  [76]. Political possibility: Fiscal consolidation blocked by partisan
  disagreement [13]. Corporate tax reform difficult due to lobbying [77]. Labor
  market reforms blocked by business opposition [78]. Infrastructure investment
  supported but funding limited [79]. Energy transition reforms possible but
  facing fossil fuel industry opposition [80]. Healthcare costs consume 17% of
  GDP; system fragmented between public (Medicare, Medicaid) and private
  insurance; reform politically difficult [81]. Wealth inequality (Gini: 0.48)
  among highest in OECD; wage stagnation and capital concentration [82].
  Education funding disparities across states create unequal opportunity [83].
  Social safety net fragmented; limited universal coverage [84].
economy_politicalEconomy_fr: >-
  Qui bénéficie : Le secteur technologique (Silicon Valley, Seattle) bénéficie
  du modèle actuel ; le secteur financier (New York) bénéficie de la dominance
  du dollar et de la profondeur du marché des capitaux [71]. Le secteur
  énergétique (pétrole, gaz naturel, énergies renouvelables) bénéficie de
  sources d'énergie diversifiées [72]. La fabrication concentrée dans le Midwest
  fait face à une pression concurrentielle de la Chine et du Vietnam [73].
  L'agriculture bénéficie des prix des matières premières et des subventions
  [74]. Qui perd : Les travailleurs de la fabrication dans les régions
  post-industrielles ; les communautés rurales ; les travailleurs des services à
  bas salaires [75]. Besoins techniques : Consolidation budgétaire ; réforme de
  l'impôt sur les sociétés ; réformes du marché du travail ; investissement dans
  les infrastructures ; soutien à la transition énergétique [76]. Possibilité
  politique : La consolidation budgétaire est bloquée par le désaccord partisan
  [13]. La réforme de l'impôt sur les sociétés est difficile en raison du
  lobbying [77]. Les réformes du marché du travail sont bloquées par
  l'opposition des entreprises [78]. L'investissement dans les infrastructures
  est soutenu mais le financement est limité [79]. Les réformes de la transition
  énergétique sont possibles mais font face à l'opposition de l'industrie des
  combustibles fossiles [80]. Les coûts des soins de santé consomment 17% du PIB
  ; le système est fragmenté entre l'assurance publique (Medicare, Medicaid) et
  privée ; la réforme est politiquement difficile [81]. L'inégalité des
  richesses (Gini : 0,48) parmi les plus élevées de l'OCDE ; la stagnation des
  salaires et la concentration du capital [82]. Les disparités de financement de
  l'éducation entre les États créent une égalité des chances inégale [83]. Le
  filet de sécurité sociale est fragmenté ; couverture universelle limitée [84].
security_internal_en: >-
  Gun violence endemic with 45,000+ deaths annually including mass shootings
  [18]. Opioid crisis claims 100,000+ lives yearly, concentrated in rural and
  post-industrial regions [19]. Organized crime and gang violence in major urban
  centers related to drug trafficking [20]. Domestic terrorism emerging as
  significant threat with right-wing and left-wing extremism rising [21].
  Cybercrime and ransomware attacks by foreign state actors (Russia, China,
  Iran) targeting government and private sector [22]. Federal Bureau of
  Investigation (FBI) and local law enforcement maintain control but resources
  strained [85]. No active insurgency or armed groups challenging state
  authority [86]. Military (2.1 million active and reserve personnel)
  operationally capable; equipment modern; recruitment and retention challenges
  [87]. Intelligence agencies (CIA, NSA, FBI) professional and subordinate to
  civilian authority [88]. Low corruption in security forces; professional
  military and police culture [89].
security_internal_fr: >-
  La violence armée est endémique avec 45 000+ décès annuels, y compris les
  fusillades de masse [18]. La crise des opioïdes tue 100 000+ personnes par an,
  concentrée dans les régions rurales et post-industrielles [19]. Le crime
  organisé et la violence des gangs dans les grands centres urbains liés au
  trafic de drogue [20]. Le terrorisme intérieur émerge comme une menace
  importante avec l'extrémisme de droite et de gauche en hausse [21]. Les
  cybercrimes et les attaques par rançongiciel par les acteurs des États
  étrangers (Russie, Chine, Iran) ciblant le gouvernement et le secteur privé
  [22]. Le Federal Bureau of Investigation (FBI) et les forces de l'ordre
  locales maintiennent le contrôle mais les ressources sont tendues [85]. Aucune
  insurrection active ou groupes armés contestant l'autorité de l'État [86].
  L'armée (2,1 millions de personnels actifs et de réserve) est
  opérationnellement capable ; l'équipement est moderne ; les défis de
  recrutement et de rétention [87]. Les agences de renseignement (CIA, NSA, FBI)
  sont professionnelles et subordonnées à l'autorité civile [88]. Faible
  corruption dans les forces de sécurité ; culture militaire et policière
  professionnelle [89].
security_diplomacy_en: >-
  Treaty allies: NATO (31 member states); Article 5 guarantor; leadership tested
  by policy divergence [24]. Indo-Pacific strategy: Quad (US, Japan, India,
  Australia) and AUKUS (US, UK, Australia) partnerships solid but requiring
  continuous commitment [25]. Ukraine support major commitment ($113 billion
  military and humanitarian aid) [26]. Taiwan security commitments increasingly
  explicit through arms sales and military support [27]. Middle East presence
  significant but declining; bases in Qatar, Bahrain, and other locations [90].
  Multilateral engagement selective; withdrawal from Iran nuclear deal and Paris
  Climate Agreement under Trump, then re-engagement under Biden [91].
  Transatlantic relationship strained by trade disputes (steel/aluminum tariffs)
  and policy divergence on Russia, China, Middle East [28]. China strategic
  competition intensifying across technology, military, economic domains [14].
  Russia sanctions regime and Ukraine support create tension [92]. Mexico border
  security and migration challenges [23]. Japan and South Korea strong security
  partners; North Korea nuclear threat monitored [93]. India partnership growing
  as China counterweight [94].
security_diplomacy_fr: >-
  Alliés du traité : OTAN (31 États membres) ; garant de l'article 5 ; le
  leadership est testé par les divergences politiques [24]. Stratégie
  indo-pacifique : Les partenariats Quad (États-Unis, Japon, Inde, Australie) et
  AUKUS (États-Unis, Royaume-Uni, Australie) sont solides mais nécessitent un
  engagement continu [25]. Le soutien à l'Ukraine est un engagement majeur avec
  113 milliards de dollars d'aide militaire et humanitaire [26]. Les engagements
  de sécurité de Taïwan deviennent de plus en plus explicites par le biais des
  ventes d'armes et du soutien militaire [27]. La présence au Moyen-Orient est
  significative mais en déclin ; des bases au Qatar, à Bahreïn et dans d'autres
  endroits [90]. L'engagement multilatéral est sélectif ; retrait de l'accord
  nucléaire iranien et de l'Accord de Paris sur le climat sous Trump, puis
  réengagement sous Biden [91]. Les relations transatlantiques sont tendues par
  les différends commerciaux (tarifs sur l'acier/l'aluminium) et les divergences
  politiques sur la Russie, la Chine, le Moyen-Orient [28]. La concurrence
  stratégique avec la Chine s'intensifie dans les domaines technologique,
  militaire et économique [14]. Le régime de sanctions contre la Russie et le
  soutien à l'Ukraine créent des tensions [92]. La sécurité frontalière avec le
  Mexique et les défis migratoires [23]. Le Japon et la Corée du Sud sont des
  partenaires de sécurité forts ; la menace nucléaire de la Corée du Nord est
  surveillée [93]. Le partenariat avec l'Inde se renforce comme contrepoids à la
  Chine [94].
