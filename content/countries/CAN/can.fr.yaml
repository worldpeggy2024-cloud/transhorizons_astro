risks:
  - title: "Friction commerciale américaine / Escalade tarifaire"
    trigger: "L'administration américaine impose des tarifs sur les produits canadiens ou renégocie unilatéralement l'ALÉCC [gc-trade]."
    probability: High
    impact: High
    timeHorizon: "0–3 mois"
    leadingIndicators: "Annonces de politique commerciale américaine ; négociations commerciales bilatérales ; pression du Congrès sur les importations [gc-trade]."
    mitigants: "Canaux de renégociation de l'ALÉCC ; exemptions sectorielles ; mesures tarifaires de rétorsion ; diversification des exportations [gc-trade] [global-affairs-ca]."
    lastAssessed: "2026-04-19"

  - title: "Effondrement du gouvernement minoritaire"
