executiveSnapshot:
  - "Regime type: Parliamentary democracy with Westminster system [pm-ca]; power won through federal elections, currently held by Liberal minority government led by Prime Minister Mark Carney [parl-ca]. Executive authority vested in Prime Minister and Cabinet; legislative power shared with bicameral Parliament."
  - "Current political equilibrium: Liberal minority government (2025–present) dependent on New Democratic Party (NDP) confidence-and-supply agreement for legislative passage [parl-ca]. Conservative opposition positioned as principal challenger; Bloc Québécois holds regional leverage in Quebec; Green Party holds single seat."
  - "Economic model: Advanced post-industrial economy; services sector dominates (70%+ of GDP) with particular strength in financial services, technology, energy, and natural resources [imf] [statcan]. Commodity exports (energy, metals, agricultural products) generate significant foreign exchange; manufacturing concentrated in automotive and aerospace sectors."
  - "Top 3 risks (6–18 months): (1) U.S. trade friction — tariff escalation or trade agreement renegotiation could disrupt $2.3 trillion bilateral trade relationship [gc-trade]; (2) Fiscal sustainability — federal debt-to-GDP ratio elevated at ~95% (2025); rising interest rates increase debt servicing costs [imf]; (3) Energy transition disruption — oil and gas sector transition creates regional economic vulnerability in Alberta and Saskatchewan [iea]."
  - "Top 3 watch items (4–12 weeks): (1) U.S. trade policy announcements [gc-trade]; (2) Bank of Canada interest rate decisions [boc]; (3) Federal budget negotiations and NDP support durability [parl-ca]."
  - "External dependencies: 75%+ of exports go to U.S.; automotive, agricultural, and energy sectors heavily dependent on U.S. market access [gc-trade]. Net energy exporter; crude oil and natural gas exports critical to fiscal revenue [iea]. Sovereign debt primarily held domestically; access to international capital markets remains stable [imf]."
  - "Security posture: Low internal violence risk; RCMP and provincial police maintain effective law enforcement; no active insurgency or terrorism threat [csis]. Border security stable; no militarized border disputes. Arctic sovereignty assertions ongoing but not militarized. Cybersecurity threats from state and non-state actors increasing [cse]."
  - "Diplomatic orientation: NATO member and U.S. ally; strong alignment with Western democracies (G7, OECD, Five Eyes intelligence partnership) [parl-ca] [global-affairs-ca]. Hedging toward Indo-Pacific engagement (CPTPP member); cautious relationship with China (technology competition, human rights concerns); pragmatic relationship with Russia (sanctions aligned with Western coalition) [global-affairs-ca]."
  - "Data confidence: HIGH for macro-economic data [imf] [statcan]; HIGH for governance structure [pm-ca]; MEDIUM for political coalition durability (forward-looking assessments) [parl-ca]; MEDIUM for energy transition timeline (policy-dependent) [iea]."
  - "Baseline outlook: Continued political stability under minority government [parl-ca]; moderate economic growth (2–3% annually) constrained by fiscal consolidation and external trade headwinds [imf]; energy transition accelerating but creating regional adjustment pressures [iea]; no near-term regime change risk."

political:
  powerStructure: |
    Prime Minister Mark Carney (Liberal) holds executive authority; Cabinet of ~30 ministers;
    Prime Minister's Office (PMO) controls policy agenda and communications [pm-ca] [parl-ca].
    Carney's authority derives from Liberal plurality in House of Commons (155 of 338 seats) and
    NDP confidence-and-supply agreement. Royal Canadian Mounted Police (RCMP) reports to Minister
    of Public Safety; Canadian Armed Forces report to Minister of Defence; Canadian Security
    Intelligence Service (CSIS) reports to Minister of National Security. No evidence of security
    service factionalism or disloyalty to civilian authority [csis]. Supreme Court of Canada
    (9 justices) independent and insulated from political pressure; lower courts (Federal,
    Provincial, Superior) functional and impartial [wjp]. Elections Canada (federal) and
    provincial election commissions operate independently; no evidence of electoral manipulation
    or fraud [elections-ca]. Media: public broadcaster (CBC/Radio-Canada) operates independently;
    private media (Globe and Mail, National Post, CTV, Global News) maintain editorial independence;
    digital/social media increasingly fragmented [rsf]. No state censorship; press freedom rated
    HIGH by Reporters Without Borders [rsf].

  stabilityDrivers: |
    Legitimacy rests on democratic elections and the welfare state's performance [parl-ca].
    Economic growth averaging 2–3% annually; unemployment low (~5%); public services (healthcare,
    education) functional but under fiscal pressure [imf] [statcan]. Canadian identity strong;
    national pride in multicultural model; no significant separatist movements outside historical
    Quebec context [pew]. Multiculturalism as official policy; immigration levels politically
    contested but not delegitimizing; Indigenous reconciliation agenda ongoing but progress uneven
    [trc-ca]. Armed Forces loyalty: Canadian Armed Forces (120,000 active personnel) demonstrate
    consistent loyalty to civilian authority; no evidence of military factionalism or coup risk
    [csis]. Police loyalty: RCMP and provincial police forces respond to civilian political
    authority; no evidence of security service capture by ruling party [csis]. Ruling coalition:
    Liberal Party + NDP (confidence-and-supply); represents ~60% of House seats; sufficient to
    pass legislation [parl-ca]. Business elites generally support Liberal economic policies; some
    friction over carbon pricing and energy transition pace [chamber-ca]. Provincial premiers
    (especially Ontario, Quebec, Alberta) exercise significant influence; federal-provincial
    coordination mechanisms functional but sometimes contentious [parl-ca].

  shockAbsorbers: |
    Absorbers: Deep capital markets and AAA-adjacent sovereign credit [imf]. Bank of Canada
    independent and credible; inflation-targeting framework functional; currency (Canadian dollar)
    stable [boc]. Employment Insurance, Canada Pension Plan, provincial healthcare systems provide
    shock absorption; coverage extensive but funding pressures rising [statcan]. Federal-provincial
    fiscal arrangements (equalization payments, transfer programs) institutionalized; elite
    consensus on democratic governance strong [parl-ca]. Accelerants: Inflation spikes from food
    and energy price volatility could trigger subsidy demands and fiscal pressure [imf].
    Contested elections: 2029 federal election could produce hung parliament or unexpected result;
    minority government dynamics create instability risk [parl-ca]. Corruption scandals: any major
    corruption revelations could undermine government legitimacy; current government faces moderate
    allegations (lobbying, contract awards) but no systemic scandal [public-accounts-ca]. Elite
    splits: potential split within Liberal party over energy transition pace or fiscal policy;
    Conservative party unity could fracture over social policy [parl-ca].

economy:
  macroReality: |
    GDP growth is forecast at 2–3% annually for 2026–2027; below historical average due to fiscal
    headwinds and external uncertainty [imf]. Services sector (financial services, technology,
    professional services) growing 3–4% annually [imf]; energy sector exports stable; construction
    and real estate activity moderate [statcan]. Fiscal consolidation constraining public investment;
    business investment cautious due to policy uncertainty; labor supply constraints in skilled
    trades; infrastructure aging in some regions [imf] [statcan]. Federal deficit ~$30–40 billion
    annually (2025–2026); deficit-to-GDP ratio ~1.5–2% [imf]. Federal debt-to-GDP ~95%; elevated
    by historical standards; debt servicing costs rising as interest rates increase [imf]. Domestic
    capital markets (bonds, deposits) primary financing source; no reliance on external borrowing;
    credit rating stable (AAA/Aa1) [imf]. Government committed to deficit reduction; spending
    restraint and revenue measures underway; political economy of consolidation difficult in minority
    government context [parl-ca] [imf]. Food price inflation moderating from 2023–2024 peaks;
    supply chains normalized; no acute food security risk [statcan-food]. Oil and natural gas prices
    volatile; geopolitical risks (Middle East, Russia) create upside pressure; renewable energy
    transition reducing long-term energy cost inflation [iea]. Canadian dollar weakness (vs. U.S.
    dollar) increases import costs; energy and commodity imports affected; pass-through to consumer
    prices moderate [boc]. Headline inflation currently ~2.5% (target: 2%); within Bank of Canada
    comfort zone; no acute inflation crisis [boc].

  externalVulnerability: |
    Exports: $660 billion annually (2025); concentrated in energy (35%), metals/minerals (15%),
    agricultural products (10%), manufactured goods (25%), services (15%) [gc-trade] [statcan-trade].
    Imports: $700 billion annually (2025); concentrated in machinery/equipment (30%), vehicles (15%),
    chemicals (10%), energy (5%), other [gc-trade]. Trade balance: slight deficit; energy exports
    offset by machinery/equipment imports [gc-trade]. Export concentration: heavy dependence on U.S.
    market (75%+ of exports); commodity price volatility creates revenue instability [gc-trade].
    Debt holders: ~90% of federal debt held domestically (Canadian pension funds, insurance companies,
    banks, individuals); ~10% held by foreign investors [imf]. Maturity wall: federal debt maturity
    profile well-distributed; no acute refinancing crisis; average maturity ~5–6 years [imf]. Canada
    not under IMF program; no external financing constraints; IMF rates Canada as stable [imf-surveillance].
    Rising interest rates increase debt servicing costs; fiscal consolidation necessary to stabilize
    debt trajectory [imf]. Canada aligned with Western sanctions on Russia; limited direct economic
    impact (trade with Russia <1% of total) [gc-trade]. Oil and natural gas price volatility affects
    fiscal revenue and trade balance; energy sector represents ~10% of GDP; commodity price shock
    could trigger fiscal stress [iea]. St. Lawrence Seaway and Great Lakes critical for trade; Arctic
    shipping routes emerging but not yet economically significant; no acute shipping risk [gc-trade].

  politicalEconomy: |
    Who benefits: Alberta and Saskatchewan benefit from energy exports; Ontario and Quebec benefit
    from manufacturing and services; Atlantic provinces dependent on federal transfers [statcan].
    Energy, financial services, technology, professional services benefit from current model;
    agriculture benefits from commodity prices; manufacturing faces competitive pressure [statcan].
    No dominant oligarchic structure; business concentrated in large corporations (banks, energy
    companies, technology firms) with dispersed ownership; no single family or clan dominance
    [chamber-ca]. Technical needs: Carbon pricing acceleration; fiscal consolidation; labor market
    reforms; infrastructure investment; energy transition support [iea]. Political possibility:
    Carbon pricing politically contentious; fiscal consolidation difficult in minority government;
    labor market reforms blocked by NDP; infrastructure investment supported but funding limited
    [parl-ca] [imf]. Energy transition reforms possible with NDP support; fiscal consolidation
    requires cross-party consensus; no major reforms likely in minority government context [parl-ca].
    Energy subsidies limited; agricultural subsidies moderate; no major fuel/food subsidies [imf].
    Federal public sector wages competitive; no acute wage pressure; pension obligations significant
    (~$300 billion liability) [tbs-ca]. Canada Pension Plan (CPP) and Old Age Security (OAS) provide
    retirement income; sustainability concerns for OAS as population ages; CPP actuarially sound [osfi].
    No price controls; market-based pricing; government provides targeted income support (Canada Child
    Benefit, Goods and Services Tax credit) [imf].

security:
  internal: |
    No active insurgency; no armed groups challenging state authority [csis]. Organized crime present
    (drug trafficking, human trafficking) but not destabilizing; law enforcement maintains control
    [csis]. Minimal communal violence; no active ethnic or religious conflict; Indigenous-settler
    tensions present but not violent [csis] [trc-ca]. Low terrorism risk; no active terrorist groups;
    occasional lone-wolf incidents; threat level assessed as LOW by CSIS [cse]. Canadian Armed Forces
    (120,000 active, 30,000 reserve) operationally capable; equipment aging in some areas; recruitment
    and retention challenges [dnd-ca]. CSIS operates domestically; Canadian Armed Forces Intelligence
    and Security operates internationally; Five Eyes partnership provides intelligence sharing [cse].
    Low corruption in security forces; professional military and police culture; no evidence of
    security force capture [csis]. U.S. (stable, integrated); Mexico (via USMCA trade); no
    militarized border disputes [gc-trade]. U.S. gun violence spillover into Canada (illegal
    firearms); U.S. drug trafficking (fentanyl) significant problem [csis]. Asylum seekers from
    U.S. (irregular crossings) manageable; no mass refugee influx [csis]. No active cross-border
    militia activity; Indigenous sovereignty movements present but non-violent [trc-ca].

  diplomacy: |
    Treaty allies: NATO member; NORAD partner (U.S. air defense integration); Five Eyes
    intelligence partner (UK, Australia, New Zealand, U.S.) [global-affairs-ca]. Transactional
    partners: USMCA trade partner (Mexico, U.S.); CPTPP member (11 Indo-Pacific nations); G7
    member; OECD member [global-affairs-ca] [gc-trade]. U.S. alignment: Deep integration (trade,
    defense, intelligence); Canada dependent on U.S. market and security umbrella; no strategic
    divergence [gc-trade] [global-affairs-ca]. China hedging: Technology competition (5G,
    semiconductors, AI); human rights concerns (Uyghurs, Hong Kong); trade relationship significant
    but cautious; no military confrontation [global-affairs-ca]. Russia pragmatism: Sanctions
    aligned with Western coalition; no direct military confrontation; Arctic sovereignty assertions
    monitored [global-affairs-ca]. USMCA: Trilateral trade agreement; renegotiation discussions
    ongoing; critical for Canadian trade [gc-trade]. NATO: Active participant; contributes to
    Eastern European defense; Arctic security focus [global-affairs-ca]. CPTPP: Indo-Pacific trade
    engagement; strategic hedging toward China [global-affairs-ca]. Arctic sovereignty assertions
    (Northwest Passage, continental shelf) ongoing but not militarized; U.S. recognition of
    Canadian Arctic claims important [global-affairs-ca]. Indigenous self-determination narrative;
    federal-provincial jurisdiction disputes; no external sovereignty challenges [parl-ca] [trc-ca].

