executiveSnapshot_en: >-
  Regime type: Federal parliamentary democracy with bicameral legislature; power
  won through universal adult suffrage (1.4 billion voters) in five-year
  election cycles [1]. Prime Minister Narendra Modi (Bharatiya Janata Party /
  BJP) holds executive authority; Cabinet of ~50 ministers; President
  (ceremonial head of state) elected by electoral college [1] [2]. Parliamentary
  system: Lok Sabha (lower house, 543 elected seats) holds legislative power;
  Rajya Sabha (upper house, 245 seats) represents states [1]. Constitutional
  framework: Indian Constitution (1950) provides federal structure; Supreme
  Court (31 justices) serves as final arbiter [3]. Election Commission of India
  operates independently; no evidence of electoral manipulation in 2024 general
  elections [4].

  Current political equilibrium: BJP-led National Democratic Alliance (NDA)
  holds 293 Lok Sabha seats (2024–2029); Modi government has comfortable
  majority [2]. Opposition Indian National Congress (INC) fractured; regional
  parties hold significant influence in state governments [2]. Political
  polarization acute along communal (Hindu-Muslim) and caste lines; regional vs.
  national identity tensions persistent [5]. Ruling coalition: BJP + regional
  allies (AIADMK, JDU, Shiv Sena factions); internal tensions over resource
  distribution and policy priorities [2]. Opposition capacity: Congress
  weakened; regional parties (DMK, TMC, AAP) emerging as challengers; street
  mobilization capacity high (farmers, labor, civil society) [6].

  Economic model: Lower-middle-income economy with $3.7 trillion nominal GDP
  (2025); services sector dominates (55% of GDP) with IT services, business
  process outsourcing, finance [7]. Manufacturing sector (25% of GDP) growing;
  key sectors: automobiles, pharmaceuticals, textiles, electronics, steel [7].
  Agriculture sector (18% of GDP) employs 40% of workforce; vulnerable to
  monsoon variability and climate shocks [8]. Export-oriented IT and services
  sector generates significant foreign exchange; remittances from diaspora
  (~$110 billion annually) critical to balance of payments [9]. Domestic
  consumption strong; 1.4 billion population creates massive consumer market;
  middle class expansion driving growth [7]. Informal economy significant (~45%
  of GDP); labor market characterized by high unemployment and underemployment
  [10].

  Top 3 risks (6–18 months): (1) Communal violence escalation — Hindu-Muslim
  tensions, caste-based violence, religious polarization could trigger riots and
  destabilize regions [5] [11]; (2) Economic slowdown — global trade
  contraction, domestic consumption weakness, fiscal pressures could reduce
  growth below 5% [7] [12]; (3) Agricultural crisis — monsoon failure, crop
  collapse, farmer distress could trigger protests and political instability [8]
  [13].

  Top 3 watch items (4–12 weeks): (1) Monsoon rainfall patterns and agricultural
  output; (2) Communal tensions and religious polarization incidents; (3)
  Reserve Bank of India monetary policy and rupee stability.

  External dependencies: Exports: $450 billion annually (2025); concentrated in
  IT services (40%), textiles (10%), pharmaceuticals (8%), automotive (7%),
  other [14]. Imports: $550 billion annually (2025); concentrated in crude oil
  (35%), electronics (15%), machinery (12%), precious metals (8%), other [14].
  Oil import dependency: ~80% of crude oil imported; primary suppliers: Iraq,
  Saudi Arabia, UAE, Russia [15]. Debt holders: foreign investors hold ~40% of
  government bonds; external debt manageable (~$600 billion) but refinancing
  risk present with rising global rates [16]. Remittances: diaspora (20+
  million) sends ~$110 billion annually; critical for balance of payments and
  rural household income [9]. Technology and capital: foreign direct investment
  (FDI) in IT, manufacturing, finance; tech sector dependent on U.S. market
  access [17]. Strategic partnerships: U.S. alliance deepening (defense,
  technology); Russia relationship pragmatic (energy, defense); China
  relationship competitive (trade, border) [18].

  Security posture: Internal violence: communal riots, caste violence, Maoist
  insurgency in central India (Naxalite movement) affecting 10+ states;
  terrorism risk from Pakistan-based groups and domestic extremists [5] [11]
  [19]. State capacity: Indian Armed Forces (1.4 million active personnel)
  maintain effective control; police forces (2.1 million) handle law
  enforcement; no evidence of military factionalism [20]. Intelligence services:
  Research and Analysis Wing (RAW) operates internationally; Intelligence Bureau
  (IB) operates domestically; credible threat assessment capacity [20]. Border
  risks: Pakistan (Kashmir dispute, cross-border terrorism); China (border
  dispute in Ladakh, Arunachal Pradesh); Bangladesh (refugee flows, border
  demarcation) [21]. Nuclear weapons: India possesses 160–170 warheads; Pakistan
  possesses 170+ warheads; risk of nuclear escalation in Kashmir conflict
  remains [22]. Cybersecurity threats: increasing state-sponsored hacking from
  China, Pakistan; critical infrastructure vulnerability [23].

  Diplomatic orientation: U.S. alignment strengthening (Quad partnership with
  Japan, Australia; defense cooperation; technology partnership) [18]. Russia
  pragmatism: historical defense relationship; energy dependence (oil, gas);
  sanctions-neutral stance [18]. China competition: border disputes; trade
  imbalances; technology competition; no military confrontation but strategic
  rivalry [18]. Regional leadership: SAARC member (South Asian Association);
  BRICS member (Brazil, Russia, China, South Africa); Indian Ocean naval
  dominance [24]. Non-aligned tradition: maintains strategic autonomy; hedges
  between U.S. and China; pragmatic approach to international coalitions [18].
  Pakistan relationship: Kashmir dispute unresolved; cross-border terrorism;
  nuclear risk; diplomatic engagement sporadic [21]. Afghanistan: strategic
  interest in stability; concerns about Taliban government and Pakistan
  influence [24].

  Data confidence: HIGH for macro-economic data (IMF, World Bank, Reserve Bank
  of India); HIGH for political structure (official sources); MEDIUM for
  communal violence trends (ACLED data); MEDIUM for agricultural output
  forecasts (monsoon-dependent); LOW for Naxalite insurgency scope (remote
  areas, limited data access).

  Baseline outlook: Continued political stability under Modi government;
  moderate economic growth (5–6% annually) constrained by global headwinds and
  domestic consumption weakness; communal tensions persistent but manageable;
  agricultural vulnerability to climate shocks increasing; no near-term regime
  change risk but 2029 elections will be contested.
executiveSnapshot_fr: >-
  Type de régime : Démocratie parlementaire fédérale avec législature
  bicamérale; le pouvoir est remporté par le suffrage universel des adultes (1,4
  milliard d'électeurs) dans des cycles électoraux de cinq ans [1]. Le Premier
  ministre Narendra Modi (Bharatiya Janata Party / BJP) détient l'autorité
  exécutive ; Cabinet de ~50 ministres ; Président (chef d'État cérémoniel) élu
  par collège électoral [1] [2]. Système parlementaire : Lok Sabha (chambre
  basse, 543 sièges élus) détient le pouvoir législatif ; Rajya Sabha (chambre
  haute, 245 sièges) représente les États [1]. Cadre constitutionnel :
  Constitution indienne (1950) fournit la structure fédérale ; Cour suprême (31
  juges) sert d'arbitre final [3]. Commission électorale de l'Inde fonctionne de
  manière indépendante ; aucune preuve de manipulation électorale aux élections
  générales de 2024 [4].

  Équilibre politique actuel : Alliance démocratique nationale (NDA) dirigée par
  le BJP détient 293 sièges à la Lok Sabha (2024–2029) ; le gouvernement Modi a
  une majorité confortable [2]. Congrès national indien (INC) fragmenté ; les
  partis régionaux détiennent une influence significative dans les gouvernements
  des États [2]. Polarisation politique aiguë selon les lignes communautaires
  (hindou-musulman) et les castes ; tensions entre identité régionale et
  nationale persistantes [5]. Coalition au pouvoir : BJP + alliés régionaux
  (AIADMK, JDU, factions Shiv Sena) ; tensions internes sur la distribution des
  ressources et les priorités politiques [2]. Capacité de l'opposition : Congrès
  affaibli ; les partis régionaux (DMK, TMC, AAP) émergent comme challengers ;
  la capacité de mobilisation de rue est élevée (agriculteurs, travailleurs,
  société civile) [6].

  Modèle économique : Économie à revenu intermédiaire inférieur avec PIB nominal
  de 3,7 billions de dollars (2025) ; le secteur des services domine (55 % du
  PIB) avec services informatiques, externalisation des processus commerciaux,
  finance [7]. Secteur manufacturier (25 % du PIB) en croissance ; secteurs clés
  : automobiles, produits pharmaceutiques, textiles, électronique, acier [7].
  Secteur agricole (18 % du PIB) emploie 40 % de la main-d'œuvre ; vulnérable à
  la variabilité de la mousson et aux chocs climatiques [8]. Secteur
  informatique et services orienté vers l'exportation génère des devises
  étrangères significatives ; les envois de fonds de la diaspora (~110 milliards
  de dollars annuellement) sont critiques pour l'équilibre des paiements [9].
  Consommation intérieure forte ; population de 1,4 milliard crée un marché de
  consommateurs massif ; l'expansion de la classe moyenne stimule la croissance
  [7]. Économie informelle significative (~45 % du PIB) ; marché du travail
  caractérisé par un chômage élevé et un sous-emploi [10].

  Les 3 principaux risques (6–18 mois) : (1) Escalade de la violence
  communautaire — tensions hindou-musulman, violence basée sur les castes,
  polarisation religieuse pourraient déclencher des émeutes et déstabiliser les
  régions [5] [11] ; (2) Ralentissement économique — contraction du commerce
  mondial, faiblesse de la consommation intérieure, pressions budgétaires
  pourraient réduire la croissance en dessous de 5 % [7] [12] ; (3) Crise
  agricole — défaillance de la mousson, effondrement des récoltes, détresse des
  agriculteurs pourraient déclencher des protestations et l'instabilité
  politique [8] [13].

  Les 3 principaux éléments à surveiller (4–12 semaines) : (1) Modèles de
  précipitations de mousson et production agricole ; (2) Tensions communautaires
  et incidents de polarisation religieuse ; (3) Politique monétaire de la Banque
  de réserve de l'Inde et stabilité de la roupie.

  Dépendances externes : Exportations : 450 milliards de dollars annuellement
  (2025) ; concentrées dans les services informatiques (40 %), textiles (10 %),
  produits pharmaceutiques (8 %), automobile (7 %), autres [14]. Importations :
  550 milliards de dollars annuellement (2025) ; concentrées dans le pétrole
  brut (35 %), électronique (15 %), machines (12 %), métaux précieux (8 %),
  autres [14]. Dépendance aux importations de pétrole : ~80 % du pétrole brut
  importé ; fournisseurs principaux : Irak, Arabie Saoudite, Émirats Arabes
  Unis, Russie [15]. Détenteurs de la dette : les investisseurs étrangers
  détiennent ~40 % des obligations d'État ; la dette externe est gérable (~600
  milliards de dollars) mais le risque de refinancement est présent avec la
  hausse des taux mondiaux [16]. Envois de fonds : la diaspora (20+ millions)
  envoie ~110 milliards de dollars annuellement ; critique pour l'équilibre des
  paiements et le revenu des ménages ruraux [9]. Technologie et capital :
  investissement direct étranger (IDE) dans l'informatique, la fabrication, la
  finance ; le secteur technologique dépend de l'accès au marché américain [17].
  Partenariats stratégiques : l'alliance américaine s'approfondit (défense,
  technologie) ; la relation russe est pragmatique (énergie, défense) ; la
  relation chinoise est compétitive (commerce, frontière) [18].

  Posture de sécurité : Violence interne : émeutes communautaires, violence
  basée sur les castes, insurrection maoïste en Inde centrale (mouvement
  naxalite) affectant 10+ États ; risque de terrorisme de groupes basés au
  Pakistan et d'extrémistes intérieurs [5] [11] [19]. Capacité de l'État : Les
  forces armées indiennes (1,4 million de personnel actif) maintiennent un
  contrôle efficace ; les forces de police (2,1 millions) gèrent l'application
  de la loi ; aucune preuve de factionnalisme militaire [20]. Services de
  renseignement : Research and Analysis Wing (RAW) opère à l'international ;
  Intelligence Bureau (IB) opère au niveau intérieur ; capacité d'évaluation des
  menaces crédible [20]. Risques frontaliers : Pakistan (différend du Cachemire,
  terrorisme transfrontalier) ; Chine (différend frontalier au Ladakh, Arunachal
  Pradesh) ; Bangladesh (flux de réfugiés, démarcation frontalière) [21]. Armes
  nucléaires : l'Inde possède 160–170 ogives ; le Pakistan possède 170+ ogives ;
  le risque d'escalade nucléaire dans le conflit du Cachemire demeure [22].
  Menaces cybernétiques : piratage parrainé par l'État croissant de la Chine, du
  Pakistan ; vulnérabilité des infrastructures critiques [23].

  Orientation diplomatique : L'alignement américain se renforce (partenariat
  Quad avec Japon, Australie ; coopération en défense ; partenariat
  technologique) [18]. Pragmatisme russe : relation historique de défense ;
  dépendance énergétique (pétrole, gaz) ; position neutre sur les sanctions
  [18]. Compétition chinoise : différends frontaliers ; déséquilibres
  commerciaux ; compétition technologique ; aucune confrontation militaire mais
  rivalité stratégique [18]. Leadership régional : membre de l'ASACR
  (Association sud-asiatique) ; membre des BRICS (Brésil, Russie, Chine, Afrique
  du Sud) ; domination navale de l'océan Indien [24]. Tradition non-alignée :
  maintient l'autonomie stratégique ; se couvre entre les États-Unis et la Chine
  ; approche pragmatique des coalitions internationales [18]. Relation avec le
  Pakistan : différend du Cachemire non résolu ; terrorisme transfrontalier ;
  risque nucléaire ; engagement diplomatique sporadique [21]. Afghanistan :
  intérêt stratégique dans la stabilité ; préoccupations concernant le
  gouvernement taliban et l'influence du Pakistan [24].

  Confiance des données : ÉLEVÉE pour les données macroéconomiques (FMI, Banque
  mondiale, Banque de réserve de l'Inde) ; ÉLEVÉE pour la structure politique
  (sources officielles) ; MOYENNE pour les tendances de la violence
  communautaire (données ACLED) ; MOYENNE pour les prévisions de production
  agricole (dépendant de la mousson) ; BASSE pour la portée de l'insurrection
  naxalite (zones éloignées, accès aux données limité).

  Perspective de base : Stabilité politique continue sous le gouvernement Modi ;
  croissance économique modérée (5–6 % annuellement) limitée par les vents
  contraires mondiaux et la faiblesse de la consommation intérieure ; tensions
  communautaires persistantes mais gérables ; vulnérabilité agricole aux chocs
  climatiques croissante ; aucun risque de changement de régime à court terme
  mais les élections de 2029 seront contestées.
political_powerStructure_en: >-
  Prime Minister Narendra Modi (BJP) holds executive authority; Cabinet of ~50
  ministers; Modi's authority derives from BJP-led NDA coalition holding 293 Lok
  Sabha seats [1] [2]. Modi's inner circle includes: Home Minister, Finance
  Minister, Defense Minister, External Affairs Minister; PMO (Prime Minister's
  Office) controls policy agenda [2]. President (ceremonial role) elected by
  electoral college; current president Ram Nath Kovind; no executive power [1].
  Lok Sabha (543 elected seats) holds legislative power; Rajya Sabha (245 seats)
  represents states; Speaker of Lok Sabha elected by members [1]. Supreme Court
  of India (31 justices) independent; Chief Justice heads court; lower courts
  (High Courts in 28 states, District Courts) functional [3]. Election
  Commission of India operates independently; conducts elections; no evidence of
  electoral manipulation in 2024 general elections [4]. Media: state broadcaster
  (Doordarshan, All India Radio) operates under government influence; private
  media (Times of India, Hindu, NDTV, India Today) maintain editorial
  independence but face pressure [25]. No state censorship; press freedom rated
  MEDIUM by Reporters Without Borders; self-censorship present in some outlets
  [25]. Armed Forces: Indian Army (1.2 million), Navy (67,000), Air Force
  (140,000); report to Minister of Defence; no evidence of military factionalism
  or disloyalty [20]. Intelligence services: Research and Analysis Wing (RAW)
  operates internationally; Intelligence Bureau (IB) operates domestically; both
  report to Prime Minister [20]. Police forces: Central Bureau of Investigation
  (CBI), Central Reserve Police Force (CRPF), state police; report to Home
  Minister; no evidence of security force capture [20].
political_powerStructure_fr: >-
  Le Premier ministre Narendra Modi (BJP) détient l'autorité exécutive ; Cabinet
  de ~50 ministres ; l'autorité de Modi provient de la coalition NDA dirigée par
  le BJP détenant 293 sièges à la Lok Sabha [1] [2]. Le cercle intérieur de Modi
  comprend : Ministre de l'Intérieur, Ministre des Finances, Ministre de la
  Défense, Ministre des Affaires étrangères ; PMO (Bureau du Premier ministre)
  contrôle l'agenda politique [2]. Président (rôle cérémoniel) élu par collège
  électoral ; président actuel Ram Nath Kovind ; pas de pouvoir exécutif [1].
  Lok Sabha (543 sièges élus) détient le pouvoir législatif ; Rajya Sabha (245
  sièges) représente les États ; le Président de la Lok Sabha est élu par les
  membres [1]. Cour suprême de l'Inde (31 juges) indépendante ; le Juge en chef
  dirige la cour ; les cours inférieures (Hautes cours dans 28 États, Cours de
  district) fonctionnelles [3]. Commission électorale de l'Inde fonctionne de
  manière indépendante ; mène les élections ; aucune preuve de manipulation
  électorale aux élections générales de 2024 [4]. Médias : radiodiffuseur d'État
  (Doordarshan, All India Radio) opère sous l'influence gouvernementale ; les
  médias privés (Times of India, Hindu, NDTV, India Today) maintiennent
  l'indépendance éditoriale mais font face à des pressions [25]. Pas de censure
  d'État ; la liberté de presse est évaluée comme MOYENNE par Reporters sans
  frontières ; l'autocensure est présente dans certains médias [25]. Forces
  armées : Armée indienne (1,2 million), Marine (67 000), Force aérienne (140
  000) ; rapportent au Ministre de la Défense ; aucune preuve de factionnalisme
  militaire ou de déloyauté [20]. Services de renseignement : Research and
  Analysis Wing (RAW) opère à l'international ; Intelligence Bureau (IB) opère
  au niveau intérieur ; tous deux rapportent au Premier ministre [20]. Forces de
  police : Bureau central d'enquête (CBI), Force de police de réserve centrale
  (CRPF), police d'État ; rapportent au Ministre de l'Intérieur ; aucune preuve
  de capture des forces de sécurité [20].
political_stabilityDrivers_en: >-
  Legitimacy rests on democratic elections and Hindu nationalist ideology
  (Hindutva) [2] [5]. Economic growth averaging 6–7% annually (2014–2024);
  unemployment high (~6–8%); public services (healthcare, education) underfunded
  but expanding [7] [10]. Hindu nationalism provides legitimacy to Modi
  government; appeals to Hindu majority (80% of population); alienates Muslim
  minority (14%) and other religious groups [5]. Caste system: hierarchical
  social structure; affirmative action (reservations) for Scheduled Castes and
  Scheduled Tribes; caste-based violence persistent [26]. Armed Forces loyalty:
  Indian Armed Forces demonstrate consistent loyalty to civilian authority; no
  evidence of military factionalism or coup risk [20]. Police loyalty: Central
  and state police forces respond to civilian political authority; no evidence
  of security force capture by ruling party [20]. Ruling coalition: BJP +
  regional allies (AIADMK, JDU, Shiv Sena factions); represents ~54% of Lok
  Sabha seats; sufficient to pass legislation [2]. Business elites generally
  support BJP economic policies; some friction over labor reforms and
  environmental regulations [27]. Regional leaders (Chief Ministers) exercise
  significant influence; federal-state coordination mechanisms functional but
  sometimes contentious [2]. Opposition capacity: Congress fractured; regional
  parties (DMK, TMC, AAP) emerging as challengers; street mobilization capacity
  high [6].
political_stabilityDrivers_fr: >-
  La légitimité repose sur les élections démocratiques et l'idéologie
  nationaliste hindoue (Hindutva) [2] [5]. Croissance économique moyenne de 6–7
  % annuellement (2014–2024) ; chômage élevé (~6–8 %) ; les services publics
  (santé, éducation) sous-financés mais en expansion [7] [10]. Le nationalisme
  hindou fournit la légitimité au gouvernement Modi ; attire la majorité hindoue
  (80 % de la population) ; aliène la minorité musulmane (14 %) et d'autres
  groupes religieux [5]. Système de castes : structure sociale hiérarchique ;
  action positive (réserves) pour les Castes répertoriées et les Tribus
  répertoriées ; la violence basée sur les castes est persistante [26]. Loyauté
  des forces armées : les forces armées indiennes démontrent une loyauté
  constante à l'autorité civile ; aucune preuve de factionnalisme militaire ou
  de risque de coup d'État [20]. Loyauté de la police : les forces de police
  centrale et d'État répondent à l'autorité politique civile ; aucune preuve de
  capture des forces de sécurité par le parti au pouvoir [20]. Coalition au
  pouvoir : BJP + alliés régionaux (AIADMK, JDU, factions Shiv Sena) ;
  représente ~54 % des sièges à la Lok Sabha ; suffisant pour adopter la
  législation [2]. Les élites commerciales soutiennent généralement les
  politiques économiques du BJP ; certaines frictions sur les réformes du
  travail et les réglementations environnementales [27]. Les leaders régionaux
  (Ministres en chef) exercent une influence significative ; les mécanismes de
  coordination fédérale-État sont fonctionnels mais parfois contentieux [2].
  Capacité de l'opposition : Congrès fragmenté ; les partis régionaux (DMK, TMC,
  AAP) émergent comme challengers ; la capacité de mobilisation de rue est
  élevée [6].
political_shockAbsorbers_en: >-
  Absorbers: Reserve Bank of India independent and credible; inflation-targeting
  framework functional; currency (Indian rupee) managed float [28]. Foreign
  exchange reserves substantial (~$600 billion); buffer against external shocks
  [16]. Domestic capital markets functional; government bond market deep; access
  to international capital markets stable [16]. Federal-state fiscal
  arrangements institutionalized; revenue-sharing mechanisms functional [2].
  Elite consensus on democratic governance strong; no evidence of elite
  consensus breakdown [2]. Accelerants: Inflation spikes from food and energy
  price volatility could trigger subsidy demands and fiscal pressure [7] [12].
  Contested elections: 2029 general elections could produce hung parliament or
  unexpected result; electoral volatility increasing [2]. Communal violence: any
  major communal riot could trigger cascading violence and destabilize multiple
  regions [5] [11]. Corruption scandals: any major corruption revelations could
  undermine government legitimacy; current government faces allegations
  (corporate favoritism, electoral bonds) [29]. Elite splits: potential split
  within BJP over economic policy or communal agenda; opposition fragmentation
  could fracture further [2].
political_shockAbsorbers_fr: >-
  Absorbeurs : Banque de réserve de l'Inde indépendante et crédible ; cadre de
  ciblage de l'inflation fonctionnel ; roupie indienne flottante gérée [28].
  Réserves de change substantielles (~600 milliards de dollars) ; tampon contre
  les chocs externes [16]. Marchés de capitaux intérieurs fonctionnels ; marché
  des obligations d'État profond ; accès aux marchés de capitaux internationaux
  stable [16]. Arrangements budgétaires fédéral-État institutionnalisés ;
  mécanismes de partage des revenus fonctionnels [2]. Consensus des élites sur
  la gouvernance démocratique fort ; aucune preuve d'effondrement du consensus
  des élites [2]. Accélérateurs : Les pics d'inflation dus à la volatilité des
  prix alimentaires et énergétiques pourraient déclencher des demandes de
  subventions et des pressions budgétaires [7] [12]. Élections contestées : les
  élections générales de 2029 pourraient produire un parlement suspendu ou un
  résultat inattendu ; la volatilité électorale augmente [2]. Violence
  communautaire : toute émeute communautaire majeure pourrait déclencher une
  violence en cascade et déstabiliser plusieurs régions [5] [11]. Scandales de
  corruption : toute révélation de corruption majeure pourrait saper la
  légitimité gouvernementale ; le gouvernement actuel fait face à des
  allégations (favoritisme des entreprises, obligations électorales) [29].
  Divisions des élites : division potentielle au sein du BJP sur la politique
  économique ou l'agenda communautaire ; la fragmentation de l'opposition
  pourrait se fragmenter davantage [2].
economy_macroReality_en: >-
  GDP growth forecast at 5–6% annually for 2026–2027; below historical average
  (7–8%) due to global headwinds and domestic consumption weakness [7]. Services
  sector (IT, finance, business process outsourcing) growing 8–10% annually;
  manufacturing sector growing 6–7% annually; agriculture sector vulnerable to
  monsoon variability [7] [8]. Fiscal consolidation underway; government deficit
  ~4% of GDP (2025–2026); deficit-to-GDP ratio manageable but rising interest
  rates increase debt servicing costs [16]. Federal debt-to-GDP ~82%; elevated
  by historical standards; debt servicing costs rising [16]. Domestic capital
  markets (bonds, deposits) primary financing source; foreign investment
  significant (~$80 billion annually in FDI) [16] [17]. Government committed to
  fiscal discipline; spending restraint and revenue measures underway; political
  economy of consolidation difficult with welfare demands [2] [7]. Food price
  inflation moderating from 2023–2024 peaks; supply chains normalized;
  monsoon-dependent agriculture creates seasonal price volatility [8] [12]. Oil
  and natural gas prices volatile; geopolitical risks (Middle East, Russia)
  create upside pressure; renewable energy transition accelerating [15]. Indian
  rupee weakness (vs. U.S. dollar) increases import costs; energy and commodity
  imports affected; pass-through to consumer prices moderate [28]. Headline
  inflation currently ~5.5% (target: 4%); above Reserve Bank of India comfort
  zone; rate hikes likely [28]. Unemployment high (~6–8%); underemployment
  significant; labor market slack absorbs inflation pressure [10].
economy_macroReality_fr: >-
  La croissance du PIB est prévue à 5–6 % annuellement pour 2026–2027 ; en
  dessous de la moyenne historique (7–8 %) en raison des vents contraires
  mondiaux et de la faiblesse de la consommation intérieure [7]. Le secteur des
  services (informatique, finance, externalisation des processus commerciaux)
  croît de 8–10 % annuellement ; le secteur manufacturier croît de 6–7 %
  annuellement ; le secteur agricole est vulnérable à la variabilité de la
  mousson [7] [8]. Consolidation budgétaire en cours ; déficit gouvernemental ~4
  % du PIB (2025–2026) ; le ratio déficit-PIB est gérable mais la hausse des
  taux d'intérêt augmente les coûts du service de la dette [16]. Dette
  fédérale-PIB ~82 % ; élevée selon les normes historiques ; les coûts du
  service de la dette augmentent [16]. Les marchés de capitaux intérieurs
  (obligations, dépôts) sont la source de financement principale ;
  l'investissement étranger est significatif (~80 milliards de dollars
  annuellement en IDE) [16] [17]. Le gouvernement s'engage à la discipline
  budgétaire ; la retenue des dépenses et les mesures de revenus sont en cours ;
  l'économie politique de la consolidation est difficile avec les demandes de
  bien-être [2] [7]. L'inflation des prix alimentaires modère par rapport aux
  pics de 2023–2024 ; les chaînes d'approvisionnement se sont normalisées ;
  aucun risque aigu de sécurité alimentaire [8] [12]. Les prix du pétrole et du
  gaz naturel sont volatiles ; les risques géopolitiques (Moyen-Orient, Russie)
  créent une pression à la hausse ; la transition vers l'énergie renouvelable
  s'accélère [15]. La faiblesse de la roupie indienne (par rapport au dollar
  américain) augmente les coûts d'importation ; les importations d'énergie et de
  matières premières sont affectées ; le transfert aux prix à la consommation
  est modéré [28]. L'inflation globale est actuellement ~5,5 % (cible : 4 %) ;
  au-dessus de la zone de confort de la Banque de réserve de l'Inde ; les
  augmentations de taux sont probables [28]. Le chômage est élevé (~6–8 %) ; le
  sous-emploi est significatif ; le jeu du marché du travail absorbe la pression
  inflationniste [10].
economy_externalVulnerability_en: >-
  Exports: $450 billion annually (2025); concentrated in IT services (40%),
  textiles (10%), pharmaceuticals (8%), automotive (7%), other [14]. Imports:
  $550 billion annually (2025); concentrated in crude oil (35%), electronics
  (15%), machinery (12%), precious metals (8%), other [14]. Trade balance:
  deficit of ~$100 billion annually; crude oil imports and capital goods imports
  drive deficit [14]. Export concentration: IT services heavily dependent on
  U.S. market (60% of IT exports); pharmaceutical exports dependent on U.S. and
  European markets [14]. Debt holders: ~60% of federal debt held domestically
  (Indian banks, insurance companies, pension funds); ~40% held by foreign
  investors [16]. Maturity wall: federal debt maturity profile well-distributed;
  no acute refinancing crisis; average maturity ~5–6 years [16]. India not under
  IMF program; no external financing constraints; IMF rates India as stable
  [30]. Rising interest rates increase debt servicing costs; fiscal
  consolidation necessary to stabilize debt trajectory [16]. Oil import
  dependency: ~80% of crude oil imported; primary suppliers: Iraq (25%), Saudi
  Arabia (20%), UAE (15%), Russia (10%), others [15]. Remittances: diaspora
  sends ~$110 billion annually; critical for balance of payments and rural
  household income [9]. Sanctions exposure: India maintains pragmatic
  relationship with Russia; limited direct economic impact (trade with Russia
  ~$15 billion annually) [18]. Shipping routes: Indian Ocean critical for trade;
  Suez Canal and Strait of Malacca important for oil imports; no acute shipping
  risk but geopolitical tensions monitored [24].
economy_externalVulnerability_fr: >-
  Exportations : 450 milliards de dollars annuellement (2025) ; concentrées dans
  les services informatiques (40 %), textiles (10 %), produits pharmaceutiques
  (8 %), automobile (7 %), autres [14]. Importations : 550 milliards de dollars
  annuellement (2025) ; concentrées dans le pétrole brut (35 %), électronique
  (15 %), machines (12 %), métaux précieux (8 %), autres [14]. Solde commercial
  : déficit de ~100 milliards de dollars annuellement ; les importations de
  pétrole brut et les importations de biens d'équipement entraînent le déficit
  [14]. Concentration des exportations : les services informatiques dépendent
  fortement du marché américain (60 % des exportations informatiques) ; les
  exportations pharmaceutiques dépendent des marchés américain et européen [14].
  Détenteurs de la dette : ~60 % de la dette fédérale détenue au niveau
  intérieur (banques indiennes, compagnies d'assurance, fonds de pension) ; ~40
  % détenue par des investisseurs étrangers [16]. Mur d'échéance : le profil
  d'échéance de la dette fédérale est bien distribué ; aucune crise de
  refinancement aiguë ; l'échéance moyenne ~5–6 ans [16]. L'Inde n'est pas sous
  un programme du FMI ; aucune contrainte de financement externe ; le FMI évalue
  l'Inde comme stable [30]. La hausse des taux d'intérêt augmente les coûts du
  service de la dette ; la consolidation budgétaire est nécessaire pour
  stabiliser la trajectoire de la dette [16]. Dépendance aux importations de
  pétrole : ~80 % du pétrole brut importé ; fournisseurs principaux : Irak (25
  %), Arabie Saoudite (20 %), Émirats Arabes Unis (15 %), Russie (10 %), autres
  [15]. Envois de fonds : la diaspora envoie ~110 milliards de dollars
  annuellement ; critique pour l'équilibre des paiements et le revenu des
  ménages ruraux [9]. Exposition aux sanctions : l'Inde maintient une relation
  pragmatique avec la Russie ; impact économique direct limité (commerce avec la
  Russie ~15 milliards de dollars annuellement) [18]. Routes maritimes : l'océan
  Indien est critique pour le commerce ; le canal de Suez et le détroit de
  Malacca sont importants pour les importations de pétrole ; aucun risque de
  navigation aiguë mais les tensions géopolitiques sont surveillées [24].
economy_politicalEconomy_en: >-
  Who benefits: IT services sector (Bangalore, Hyderabad, Pune) benefits from
  global demand; pharmaceutical sector benefits from generic drug production;
  agriculture benefits from commodity prices; manufacturing benefits from FDI
  inflows [7] [27]. Financial services, technology, professional services
  benefit from current model; agriculture faces competitive pressure from
  imports; informal sector faces regulatory pressure [27]. No dominant
  oligarchic structure; business concentrated in large corporations (Tata,
  Reliance, Infosys, TCS) with dispersed ownership; no single family dominance
  [27]. Technical needs: Labor market reforms; fiscal consolidation;
  infrastructure investment; agricultural productivity improvement; energy
  transition support [7] [8]. Political possibility: Labor market reforms
  blocked by opposition and unions; fiscal consolidation difficult with welfare
  demands; infrastructure investment supported but funding limited [2] [7].
  Energy transition reforms possible; renewable energy capacity expanding
  rapidly [15]. Food subsidies significant (~$20 billion annually); fuel
  subsidies reduced but still present; government provides targeted income
  support (MGNREGA, direct benefit transfers) [7]. Federal public sector wages
  competitive; no acute wage pressure; pension obligations significant [16]. No
  price controls; market-based pricing; government provides targeted income
  support (MGNREGA rural employment guarantee, direct benefit transfers) [7].
  Agricultural support: minimum support prices (MSP) for crops; agricultural
  subsidies (fertilizers, electricity) significant (~$30 billion annually) [8].
economy_politicalEconomy_fr: >-
  Qui bénéficie : le secteur des services informatiques (Bangalore, Hyderabad,
  Pune) bénéficie de la demande mondiale ; le secteur pharmaceutique bénéficie
  de la production de médicaments génériques ; l'agriculture bénéficie des prix
  des matières premières ; la fabrication bénéficie des entrées d'IDE [7] [27].
  Les services financiers, la technologie, les services professionnels
  bénéficient du modèle actuel ; l'agriculture fait face à la pression
  concurrentielle des importations ; le secteur informel fait face à la pression
  réglementaire [27]. Pas de structure oligarchique dominante ; les affaires
  sont concentrées dans les grandes sociétés (Tata, Reliance, Infosys, TCS) avec
  une propriété dispersée ; pas de domination familiale unique [27]. Besoins
  techniques : réformes du marché du travail ; consolidation budgétaire ;
  investissement en infrastructure ; amélioration de la productivité agricole ;
  soutien à la transition énergétique [7] [8]. Possibilité politique : les
  réformes du marché du travail sont bloquées par l'opposition et les syndicats
  ; la consolidation budgétaire est difficile avec les demandes de bien-être ;
  l'investissement en infrastructure est soutenu mais le financement est limité
  [2] [7]. Les réformes de la transition énergétique sont possibles ; la
  capacité d'énergie renouvelable s'expande rapidement [15]. Les subventions
  alimentaires sont significatives (~20 milliards de dollars annuellement) ; les
  subventions de carburant ont été réduites mais sont toujours présentes ; le
  gouvernement fournit un soutien ciblé (MGNREGA, transferts de prestations
  directes) [7]. Les salaires du secteur public fédéral sont compétitifs ;
  aucune pression de salaires aiguë ; les obligations de pension sont
  significatives [16]. Pas de contrôle des prix ; tarification basée sur le
  marché ; le gouvernement fournit un soutien ciblé (garantie d'emploi rural
  MGNREGA, transferts de prestations directes) [7]. Soutien agricole : prix de
  soutien minimum (MSP) pour les récoltes ; les subventions agricoles (engrais,
  électricité) sont significatives (~30 milliards de dollars annuellement) [8].
security_internal_en: >-
  Communal violence: Hindu-Muslim riots periodic; caste-based violence endemic;
  religious polarization increasing under Modi government [5] [11]. Naxalite
  insurgency: Maoist movement active in central India (Chhattisgarh, Jharkhand,
  Odisha, Maharashtra); affects 10+ states; estimated 10,000–15,000 active
  combatants; low-intensity conflict [19]. Terrorism risk: Pakistan-based groups
  (Lashkar-e-Taiba, Jaish-e-Muhammad) conduct cross-border terrorism in Kashmir;
  domestic extremists (Hindu and Islamic) conduct occasional attacks [11] [19].
  Organized crime: drug trafficking, human trafficking, extortion present but
  not destabilizing; law enforcement maintains control [20]. Indian Armed Forces
  (1.4 million active personnel) operationally capable; equipment aging in some
  areas; recruitment and retention challenges [20]. Intelligence services:
  Research and Analysis Wing (RAW) operates internationally; Intelligence Bureau
  (IB) operates domestically; credible threat assessment capacity [20].
  Corruption in security forces: endemic corruption in police forces; military
  corruption lower but present; no evidence of security force capture by ruling
  party [20]. Police capacity: 2.1 million police personnel; training and
  equipment variable across states; human rights concerns (extrajudicial
  killings, torture) documented [20].
security_internal_fr: >-
  Violence communautaire : les émeutes hindou-musulman sont périodiques ; la
  violence basée sur les castes est endémique ; la polarisation religieuse
  augmente sous le gouvernement Modi [5] [11]. Insurrection naxalite : le
  mouvement maoïste est actif en Inde centrale (Chhattisgarh, Jharkhand, Odisha,
  Maharashtra) ; affecte 10+ États ; estimé 10 000–15 000 combattants actifs ;
  conflit de faible intensité [19]. Risque de terrorisme : les groupes basés au
  Pakistan (Lashkar-e-Taiba, Jaish-e-Muhammad) mènent le terrorisme
  transfrontalier au Cachemire ; les extrémistes intérieurs (hindou et
  islamique) mènent des attaques occasionnelles [11] [19]. Crime organisé : le
  trafic de drogue, le trafic d'êtres humains, l'extorsion sont présents mais ne
  déstabilisent pas ; l'application de la loi maintient le contrôle [20]. Forces
  armées indiennes (1,4 million de personnel actif) opérationnellement capables
  ; équipement vieillissant dans certains domaines ; défis de recrutement et de
  rétention [20]. Services de renseignement : Research and Analysis Wing (RAW)
  opère à l'international ; Intelligence Bureau (IB) opère au niveau intérieur ;
  capacité d'évaluation des menaces crédible [20]. Corruption dans les forces de
  sécurité : corruption endémique dans les forces de police ; la corruption
  militaire est plus basse mais présente ; aucune preuve de capture des forces
  de sécurité par le parti au pouvoir [20]. Capacité de la police : 2,1 millions
  de personnel de police ; la formation et l'équipement varient selon les États
  ; les préoccupations relatives aux droits de l'homme (meurtres
  extrajudiciaires, torture) sont documentées [20].
security_diplomacy_en: >-
  Treaty allies: Quad partnership (U.S., Japan, Australia); defense cooperation
  with U.S., France, Russia [18]. Transactional partners: SAARC member (South
  Asian Association); BRICS member (Brazil, Russia, China, South Africa); Indian
  Ocean Rim Association [24]. U.S. alignment: Strategic partnership deepening
  (defense cooperation, technology partnership, intelligence sharing); India
  dependent on U.S. market for IT exports [18]. Russia pragmatism: historical
  defense relationship; energy dependence (oil, gas); defense equipment
  supplier; sanctions-neutral stance [18]. China competition: border disputes
  (Ladakh, Arunachal Pradesh); trade imbalances; technology competition; no
  military confrontation but strategic rivalry [18]. Pakistan relationship:
  Kashmir dispute unresolved; cross-border terrorism; nuclear risk; diplomatic
  engagement sporadic; 2019 Balakot airstrikes demonstrated willingness to
  escalate [21]. Bangladesh: refugee flows from Myanmar; border demarcation
  issues; economic cooperation growing [24]. Afghanistan: strategic interest in
  stability; concerns about Taliban government and Pakistan influence; India
  maintains embassy in Kabul [24]. Regional leadership: Indian Ocean naval
  dominance; Indian Navy conducts freedom of navigation operations; strategic
  presence in Indo-Pacific [24]. Non-aligned tradition: maintains strategic
  autonomy; hedges between U.S. and China; pragmatic approach to international
  coalitions; India voted to abstain on Russia-Ukraine UN resolution [18].
security_diplomacy_fr: >-
  Alliés des traités : partenariat Quad (États-Unis, Japon, Australie) ;
  coopération en défense avec États-Unis, France, Russie [18]. Partenaires
  transactionnels : membre de l'ASACR (Association sud-asiatique) ; membre des
  BRICS (Brésil, Russie, Chine, Afrique du Sud) ; Association du Bassin de
  l'océan Indien [24]. Alignement américain : le partenariat stratégique
  s'approfondit (coopération en défense, partenariat technologique, partage de
  renseignements) ; l'Inde dépend du marché américain pour les exportations
  informatiques [18]. Pragmatisme russe : relation historique de défense ;
  dépendance énergétique (pétrole, gaz) ; fournisseur d'équipement de défense ;
  position neutre sur les sanctions [18]. Compétition chinoise : différends
  frontaliers (Ladakh, Arunachal Pradesh) ; déséquilibres commerciaux ;
  compétition technologique ; aucune confrontation militaire mais rivalité
  stratégique [18]. Relation avec le Pakistan : différend du Cachemire non
  résolu ; terrorisme transfrontalier ; risque nucléaire ; engagement
  diplomatique sporadique ; les frappes aériennes de Balakot en 2019 ont
  démontré la volonté d'escalade [21]. Bangladesh : flux de réfugiés du Myanmar
  ; problèmes de démarcation frontalière ; la coopération économique croît [24].
  Afghanistan : intérêt stratégique dans la stabilité ; préoccupations
  concernant le gouvernement taliban et l'influence du Pakistan ; l'Inde
  maintient une ambassade à Kaboul [24]. Leadership régional : domination navale
  de l'océan Indien ; la marine indienne mène des opérations de liberté de
  navigation ; présence stratégique dans l'Indo-Pacifique [24]. Tradition
  non-alignée : maintient l'autonomie stratégique ; se couvre entre les
  États-Unis et la Chine ; approche pragmatique des coalitions internationales ;
  l'Inde s'est abstenue sur la résolution de l'ONU Russie-Ukraine [18].
