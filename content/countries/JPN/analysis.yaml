executiveSnapshot_en: >-
  Regime type: Constitutional monarchy with parliamentary democracy [1];
  bicameral legislature (House of Representatives, House of Councillors);
  executive power held by Prime Minister Shigeru Ishiba (Liberal Democratic
  Party, LDP) since October 2024 [2]. Emperor Naruhito serves as ceremonial head
  of state with no executive authority [1]. House of Representatives (465 seats)
  holds legislative primacy; House of Councillors (248 seats) provides secondary
  review; Supreme Court (15 justices) serves as final arbiter on constitutional
  matters [1] [3]. Electoral system: mixed-member proportional; next general
  election by October 2028 [2]. Civil service: non-partisan professional
  bureaucracy; ministries (METI, MOFA, MOD, MOF) report to Cabinet [1].

  Current political equilibrium: LDP-Komeito coalition holds 288 seats in the
  House of Representatives (62% of 465 seats), providing a comfortable
  legislative majority [2]. Constitutional Democratic Party (CDP, main
  opposition) holds 96 seats; Japan Innovation Party holds 41 seats; Democratic
  Party for the People holds 28 seats; Japan Communist Party holds 10 seats;
  other parties and independents hold 2 seats [2]. Political polarization low by
  Western standards; consensus-based policymaking tradition; economic stagnation
  and demographic decline are primary political fault lines [4]. LDP internal
  factions (Abe legacy, Kishida faction, Ishiba faction) compete for influence
  but maintain party unity on major policy [2]. Opposition fragmented; CDP
  leadership contests ongoing; regional parties hold limited influence [2].
  Civil society: strong independent media; business associations (Keidanren)
  influential; labor unions (Rengo) moderate; street mobilization capacity low
  [5].

  Economic model: Advanced economy with $4.2 trillion nominal GDP (2025);
  world's fourth-largest economy [6]. Manufacturing-export driven (25% of GDP)
  with dominant automotive (Toyota, Honda, Nissan), electronics (Sony,
  Panasonic), robotics, and semiconductor sectors [6] [7]. Services sector (70%
  of GDP) dominated by finance, insurance, telecommunications, retail [6].
  Technology sector: world leader in semiconductors, robotics, AI; R&D
  investment at 3.6% of GDP [7]. Energy sector: heavily dependent on imports
  (92% of energy); post-Fukushima transition from nuclear to renewables and LNG
  [8]. Domestic consumption constrained by aging population; high household
  savings (~10% of disposable income); real wages stagnant since 2000 [6] [9].

  Top 3 risks (6-18 months): (1) Geopolitical escalation - China-Taiwan
  tensions, North Korea missile tests could trigger military mobilization and
  economic disruption [10] [11]; (2) Economic stagnation - weak growth (1-2%
  annually), demographic decline, aging workforce could trigger recession and
  fiscal pressures [6] [12]; (3) Energy crisis - LNG import disruption from
  geopolitical shocks could trigger power shortages and inflation [8] [13].

  Top 3 watch items (4-12 weeks): (1) Bank of Japan monetary policy decisions
  and yen trajectory; (2) U.S.-Japan alliance stability amid Trump
  administration policy shifts; (3) China-Taiwan military activity and Senkaku
  Islands tensions.

  External dependencies: Exports $800 billion annually (2025); concentrated in
  vehicles (20%), electronics (15%), machinery (12%), chemicals (8%) [14].
  Imports $750 billion annually; concentrated in energy (40%), minerals (15%),
  machinery (12%), chemicals (10%) [14]. Trade surplus ~$50 billion annually;
  manufacturing exports offset by energy imports [14]. Energy import dependency:
  92% of energy imported; LNG from Australia, Qatar; oil from Middle East; coal
  from Australia, Indonesia [8]. Debt holders: ~95% of government debt held
  domestically (Japanese banks, pension funds, insurance companies); minimal
  foreign holdings [15]. U.S. alliance: critical for security; U.S. military
  bases in Japan; defense cooperation and technology sharing [16].

  Security posture: Internal violence very low; terrorism risk minimal;
  occasional protests and labor strikes [5] [17]. Self-Defence Forces (247,000
  active personnel) operationally capable; police forces (300,000) handle law
  enforcement; no evidence of security force disloyalty [18]. Intelligence
  services: Public Security Intelligence Agency (PSIA) operates domestically;
  Defence Intelligence Headquarters (DIH) operates internationally [18]. Border
  security: island nation provides natural protection; immigration enforcement
  active [19]. Japan does NOT possess nuclear weapons; pacifist constitution
  (Article 9) limits military capabilities; hosts U.S. nuclear umbrella [3].
  Cybersecurity threats from state-sponsored actors (China, Russia) targeting
  critical infrastructure and financial sector [20].

  Diplomatic orientation: U.S. alliance strong; defense cooperation, technology
  sharing, security guarantees through U.S.-Japan Security Treaty [16]. China
  relationship competitive; trade interdependence (~20% of trade); tensions over
  Taiwan, Senkaku Islands, historical issues [10]. South Korea relationship
  cooperative but tense; historical grievances; trade relationships; military
  cooperation on North Korea [21]. ASEAN strategic partnerships; trade
  relationships with Vietnam, Thailand, Indonesia, Philippines [22]. G7 member;
  OECD member; Quad member (with U.S., India, Australia); CPTPP member [16]
  [22].

  Data confidence: HIGH for macro-economic data (Bank of Japan, METI, Statistics
  Bureau); HIGH for political structure (National Diet, official sources);
  MEDIUM for geopolitical risk assessments (China-Taiwan tensions, North Korea);
  MEDIUM for energy transition timeline (policy-dependent); HIGH for security
  assessments (official sources).

  Baseline outlook: LDP government pursuing moderate economic reform; weak
  growth (1-2% annually) constrained by demographic decline and global
  headwinds; energy transition progressing but slowly; geopolitical tensions
  rising but managed through U.S. alliance; defense spending increasing toward
  2% of GDP target; no near-term regime change risk; 2028 general election will
  be contested but LDP likely to retain power.
executiveSnapshot_fr: >-
  Type de regime : Monarchie constitutionnelle avec democratie parlementaire
  [1]; legislature bicamerale (Chambre des representants, Chambre des
  conseillers) ; pouvoir executif detenu par le Premier ministre Shigeru Ishiba
  (Parti liberal-democrate, PLD) depuis octobre 2024 [2]. L'empereur Naruhito
  sert de chef d'Etat ceremoniel sans autorite executive [1]. La Chambre des
  representants (465 sieges) detient la primaute legislative ; la Chambre des
  conseillers (248 sieges) fournit un examen secondaire ; la Cour supreme (15
  juges) sert d'arbitre final sur les questions constitutionnelles [1] [3].
  Systeme electoral : proportionnel mixte ; prochaines elections generales d'ici
  octobre 2028 [2]. Fonction publique : bureaucratie professionnelle non
  partisane [1].

  Equilibre politique actuel : La coalition PLD-Komeito detient 288 sieges a la
  Chambre des representants (62% des 465 sieges), offrant une majorite
  legislative confortable [2]. Le Parti constitutionnel democratique (PCD,
  principale opposition) detient 96 sieges ; le Parti de l'innovation du Japon
  detient 41 sieges ; le Parti democratique pour le peuple detient 28 sieges ;
  le Parti communiste japonais detient 10 sieges [2]. La polarisation politique
  est faible selon les normes occidentales ; tradition de prise de decision par
  consensus ; la stagnation economique et le declin demographique sont les
  principales lignes de fracture politiques [4]. Les factions internes du PLD
  (heritage Abe, faction Kishida, faction Ishiba) rivalisent pour l'influence
  mais maintiennent l'unite du parti sur les politiques majeures [2].
  L'opposition est fragmentee ; le PCD reste divise ; les partis regionaux ont
  une influence limitee [2]. Societe civile : medias independants forts ;
  associations patronales (Keidanren) influentes ; syndicats (Rengo) moderes ;
  capacite de mobilisation de rue faible [5].

  Modele economique : Economie avancee avec un PIB nominal de 4,2 billions de
  dollars (2025) ; quatrieme economie mondiale [6]. Economie axee sur la
  fabrication et l'exportation (25% du PIB) avec des secteurs dominants :
  automobile (Toyota, Honda, Nissan), electronique (Sony, Panasonic), robotique
  et semi-conducteurs [6] [7]. Le secteur des services (70% du PIB) est domine
  par la finance, l'assurance, les telecommunications et le commerce de detail
  [6]. Secteur technologique : leader mondial en semi-conducteurs, robotique, IA
  ; investissement en R&D a 3,6% du PIB [7]. Secteur energetique : fortement
  dependant des importations (92% de l'energie) ; transition post-Fukushima du
  nucleaire vers les renouvelables et le GNL [8]. Consommation interieure
  contrainte par le vieillissement de la population ; epargne des menages elevee
  (~10% du revenu disponible) ; salaires reels stagnants depuis 2000 [6] [9].

  Top 3 risques (6-18 mois) : (1) Escalade geopolitique - les tensions
  Chine-Taiwan, les tests de missiles nord-coreens pourraient declencher une
  mobilisation militaire et une perturbation economique [10] [11] ; (2)
  Stagnation economique - croissance faible (1-2% annuellement), declin
  demographique, vieillissement de la main-d'oeuvre pourraient declencher une
  recession et des pressions fiscales [6] [12] ; (3) Crise energetique -
  perturbation des importations de GNL due a des chocs geopolitiques pourrait
  declencher des penuries d'electricite et de l'inflation [8] [13].

  Top 3 points de surveillance (4-12 semaines) : (1) Decisions de politique
  monetaire de la Banque du Japon et trajectoire du yen ; (2) Stabilite de
  l'alliance americano-japonaise face aux changements de politique de
  l'administration Trump ; (3) Activite militaire Chine-Taiwan et tensions aux
  iles Senkaku.

  Dependances externes : Exportations de 800 milliards de dollars annuellement
  (2025) ; concentrees dans les vehicules (20%), l'electronique (15%), les
  machines (12%), les produits chimiques (8%) [14]. Importations de 750
  milliards de dollars annuellement ; concentrees dans l'energie (40%), les
  mineraux (15%), les machines (12%), les produits chimiques (10%) [14].
  Excedent commercial ~50 milliards de dollars annuellement [14]. Dependance aux
  importations energetiques : 92% de l'energie importee ; GNL d'Australie, du
  Qatar ; petrole du Moyen-Orient ; charbon d'Australie, d'Indonesie [8].
  Detenteurs de la dette : ~95% de la dette publique detenue au niveau national
  [15]. Alliance americaine : essentielle pour la securite ; bases militaires
  americaines au Japon ; cooperation en matiere de defense et partage
  technologique [16].

  Posture de securite : Violence interne tres faible ; risque de terrorisme
  minimal ; manifestations et greves occasionnelles [5] [17]. Forces
  d'autodefense (247 000 personnels actifs) operationnellement capables ; forces
  de police (300 000) assurent l'application de la loi ; aucune preuve de
  deloyaute des forces de securite [18]. Services de renseignement : l'Agence de
  renseignement de securite publique (PSIA) opere au niveau national ; le
  Quartier general du renseignement de defense (DIH) opere au niveau
  international [18]. Securite frontaliere : la nature insulaire offre une
  protection naturelle ; controle de l'immigration actif [19]. Le Japon ne
  possede PAS d'armes nucleaires ; la constitution pacifiste (Article 9) limite
  les capacites militaires ; beneficie du parapluie nucleaire americain [3].
  Menaces de cybersecurite d'acteurs etatiques (Chine, Russie) ciblant les
  infrastructures critiques et le secteur financier [20].

  Orientation diplomatique : Alliance americaine forte ; cooperation en matiere
  de defense, partage technologique, garanties de securite par le Traite de
  securite americano-japonais [16]. Relation competitive avec la Chine ;
  interdependance commerciale (~20% du commerce) ; tensions sur Taiwan, les iles
  Senkaku, les questions historiques [10]. Relation cooperative mais tendue avec
  la Coree du Sud ; griefs historiques ; relations commerciales ; cooperation
  militaire sur la Coree du Nord [21]. Partenariats strategiques avec l'ASEAN
  [22]. Membre du G7, de l'OCDE, du Quad (avec les Etats-Unis, l'Inde,
  l'Australie), du PTPGP [16] [22].

  Confiance dans les donnees : ELEVEE pour les donnees macroeconomiques (Banque
  du Japon, METI, Bureau des statistiques) ; ELEVEE pour la structure politique
  (Diete nationale, sources officielles) ; MOYENNE pour les evaluations des
  risques geopolitiques (tensions Chine-Taiwan, Coree du Nord) ; MOYENNE pour le
  calendrier de transition energetique (dependant de la politique) ; ELEVEE pour
  les evaluations de securite (sources officielles).

  Perspective de reference : Le gouvernement PLD poursuit une reforme economique
  moderee ; croissance faible (1-2% annuellement) contrainte par le declin
  demographique et les vents contraires mondiaux ; transition energetique en
  cours mais lente ; tensions geopolitiques croissantes mais gerees par
  l'alliance americaine ; depenses de defense en augmentation vers l'objectif de
  2% du PIB ; aucun risque de changement de regime a court terme ; les elections
  generales de 2028 seront contestees mais le PLD devrait conserver le pouvoir.
political_powerStructure_en: >-
  Prime Minister Shigeru Ishiba (LDP) holds executive authority; Cabinet of ~20
  ministers; Prime Minister's inner circle includes Deputy PM, Minister of
  Finance, Minister of Foreign Affairs, Minister of Defence [1] [2]. Ishiba's
  authority derives from LDP holding 247 House of Representatives seats plus
  Komeito coalition partner (41 seats) for combined 288 seats [2]. Emperor
  Naruhito (ceremonial role); no executive power; provides constitutional
  legitimacy [1]. House of Representatives (465 elected seats) holds legislative
  primacy; Speaker elected by members; government must maintain confidence of
  House [1]. House of Councillors (248 members); provides secondary review; can
  delay but not block legislation indefinitely; half elected every 3 years [1].
  Supreme Court of Japan (15 justices); independent; final arbiter on
  constitutional matters; judicial review power established but rarely exercised
  [3]. National Election Commission operates independently; no evidence of
  electoral manipulation in October 2024 general election [2]. Media: NHK
  (public broadcaster) operates under law with independent editorial control;
  private media (Asahi Shimbun, Yomiuri Shimbun, Nikkei, TBS, Fuji Television)
  maintain editorial independence; press freedom strong but press club system
  limits access [23]. Self-Defence Forces: Ground (147,000), Maritime (45,000),
  Air (55,000); report to Minister of Defence; no evidence of military
  factionalism; professional force loyal to civilian authority [18].
  Intelligence services: PSIA, DIH report to government; oversight by Diet
  Intelligence Committee [18].
political_powerStructure_fr: >-
  Le Premier ministre Shigeru Ishiba (PLD) detient l'autorite executive ;
  Cabinet d'environ 20 ministres ; le cercle restreint du Premier ministre
  comprend le vice-PM, le ministre des Finances, le ministre des Affaires
  etrangeres, le ministre de la Defense [1] [2]. L'autorite d'Ishiba decoule du
  PLD detenant 247 sieges a la Chambre des representants plus le partenaire de
  coalition Komeito (41 sieges) pour un total de 288 sieges [2]. L'empereur
  Naruhito (role ceremoniel) ; aucun pouvoir executif ; fournit la legitimite
  constitutionnelle [1]. La Chambre des representants (465 sieges elus) detient
  la primaute legislative [1]. La Chambre des conseillers (248 membres) ;
  fournit un examen secondaire [1]. La Cour supreme du Japon (15 juges) ;
  independante ; arbitre final sur les questions constitutionnelles [3]. La
  Commission electorale nationale opere de maniere independante ; aucune preuve
  de manipulation electorale lors des elections generales d'octobre 2024 [2].
  Medias : NHK (diffuseur public) opere sous la loi avec un controle editorial
  independant ; les medias prives (Asahi Shimbun, Yomiuri Shimbun, Nikkei, TBS,
  Fuji Television) maintiennent l'independance editoriale ; liberte de la presse
  forte mais le systeme des clubs de presse limite l'acces [23]. Forces
  d'autodefense : Terrestre (147 000), Maritime (45 000), Aerienne (55 000) ;
  relevent du ministre de la Defense ; aucune preuve de factionnalisme militaire
  ; force professionnelle loyale a l'autorite civile [18].
political_stabilityDrivers_en: >-
  Legitimacy rests on democratic elections and constitutional monarchy; Emperor
  provides symbolic continuity [1] [2]. Economic growth averaging 1-2% annually
  (2015-2025); below historical average; real wages stagnant; demographic
  decline constraining growth but not delegitimizing [6]. Institutional
  strength: Japan has strong democratic institutions, independent judiciary,
  professional civil service; ranked highly on World Justice Project Rule of Law
  Index [3] [24]. LDP government mandate: won October 2024 election with
  coalition majority; public support for economic reform and defense
  modernization [2]. Business community (Keidanren): generally supportive of LDP
  government; concerns over labor shortages and energy costs; strong lobbying
  influence [25]. Labor unions (Rengo): organized labor federation; moderate
  strike capacity; public sector unions active; cooperative relationship with
  government [5]. Armed Forces loyalty: Self-Defence Forces demonstrate
  consistent loyalty to civilian authority; no evidence of military factionalism
  or coup risk [18]. Opposition weakness: CDP strengthened in 2024 election but
  remains fragmented; limited immediate threat to LDP government [2].
  Demographic stability: aging population creates long-term fiscal challenges
  but no acute social instability; social safety net functional [9] [12].
political_stabilityDrivers_fr: >-
  La legitimite repose sur les elections democratiques et la monarchie
  constitutionnelle ; l'Empereur fournit une continuite symbolique [1] [2].
  Croissance economique en moyenne de 1-2% annuellement (2015-2025) ; en dessous
  de la moyenne historique ; salaires reels stagnants ; le declin demographique
  contraint la croissance mais ne delegitime pas [6]. Force institutionnelle :
  le Japon possede des institutions democratiques fortes, un pouvoir judiciaire
  independant, une fonction publique professionnelle ; bien classe sur l'Indice
  de l'etat de droit du World Justice Project [3] [24]. Mandat du gouvernement
  PLD : a remporte les elections d'octobre 2024 avec une majorite de coalition ;
  soutien public pour la reforme economique et la modernisation de la defense
  [2]. Communaute des affaires (Keidanren) : generalement favorable au
  gouvernement PLD ; preoccupations concernant les penuries de main-d'oeuvre et
  les couts energetiques [25]. Syndicats (Rengo) : federation syndicale
  organisee ; capacite de greve moderee ; syndicats du secteur public actifs ;
  relation cooperative avec le gouvernement [5]. Loyaute des Forces armees : les
  Forces d'autodefense demontrent une loyaute constante a l'autorite civile ;
  aucune preuve de factionnalisme militaire ou de risque de coup d'Etat [18].
  Faiblesse de l'opposition : le PCD s'est renforce en 2024 mais reste fragmente
  ; menace immediate limitee pour le gouvernement PLD [2]. Stabilite
  demographique : le vieillissement de la population cree des defis fiscaux a
  long terme mais pas d'instabilite sociale aigue ; filet de securite sociale
  fonctionnel [9] [12].
political_shockAbsorbers_en: >-
  Absorbers: Bank of Japan independent and credible; inflation-targeting
  framework functional; yen freely floating [15]. Foreign exchange reserves
  adequate ($1.2 trillion); government can borrow at low rates (JGB yields ~1%)
  [15]. Institutional resilience: strong democratic institutions, independent
  judiciary, professional civil service; no evidence of institutional fragility
  [3]. Elite consensus on democratic governance strong; no evidence of elite
  consensus breakdown [3]. Social safety net: national pension system, universal
  healthcare, unemployment insurance provide shock absorption [9]. Accelerants:
  Geopolitical escalation (China-Taiwan conflict, North Korea missile tests)
  could trigger military mobilization and economic disruption [10] [11]. Energy
  crisis: LNG import disruption could trigger power shortages and inflation [8].
  Recession: global trade contraction, domestic consumption weakness could
  trigger unemployment increase and fiscal pressures [6]. Demographic collapse:
  accelerating population decline (birth rate 1.2) could trigger labor shortages
  and fiscal pressures [12]. Political fragmentation: LDP loss of majority could
  produce hung parliament in 2028 election [2]. Yen crisis: sharp depreciation
  could trigger import cost inflation and capital flight [15].
political_shockAbsorbers_fr: >-
  Amortisseurs : Banque du Japon independante et credible ; cadre de ciblage de
  l'inflation fonctionnel ; yen librement flottant [15]. Reserves de change
  adequates (1,2 billion de dollars) ; le gouvernement peut emprunter a des taux
  bas (rendements JGB ~1%) [15]. Resilience institutionnelle : institutions
  democratiques fortes, pouvoir judiciaire independant, fonction publique
  professionnelle ; aucune preuve de fragilite institutionnelle [3]. Consensus
  des elites sur la gouvernance democratique fort ; aucune preuve de rupture du
  consensus des elites [3]. Filet de securite sociale : systeme de retraite
  national, couverture maladie universelle, assurance chomage fournissent une
  absorption des chocs [9]. Accelerateurs : Escalade geopolitique (conflit
  Chine-Taiwan, tests de missiles nord-coreens) pourrait declencher une
  mobilisation militaire et une perturbation economique [10] [11]. Crise
  energetique : perturbation des importations de GNL pourrait declencher des
  penuries d'electricite et de l'inflation [8]. Recession : contraction du
  commerce mondial, faiblesse de la consommation interieure pourraient
  declencher une augmentation du chomage et des pressions fiscales [6].
  Effondrement demographique : acceleration du declin de la population (taux de
  natalite 1,2) pourrait declencher des penuries de main-d'oeuvre et des
  pressions fiscales [12]. Fragmentation politique : perte de la majorite du PLD
  pourrait produire un parlement suspendu lors des elections de 2028 [2]. Crise
  du yen : depreciation brutale pourrait declencher une inflation des couts
  d'importation et une fuite des capitaux [15].
economy_macroReality_en: >-
  GDP growth forecast at 1-2% annually for 2026-2027; below historical average
  (2-3%) due to demographic decline and global headwinds [6]. Manufacturing
  sector (25% of GDP) growing 0-1% annually; automotive exports strong but
  facing EV transition pressure; services sector growing 1-2% annually [6] [7].
  Inflation currently ~2.5% (target: 2%); within Bank of Japan comfort zone;
  gradual rate normalization underway after decades of ultra-low rates [15].
  Bank of Japan policy rate at 0.5%; mortgage rates low; consumer credit cheap;
  yield curve control phased out in 2024 [15]. Unemployment currently ~2.4%;
  labor market extremely tight due to demographic decline; forecast to remain
  below 3% [12]. Real wages stagnant since 2000; nominal wage growth
  accelerating but real wage growth forecast at 0-1% annually [6] [9].
  Government debt-to-GDP ~250%; highest among advanced economies; debt servicing
  costs manageable due to low interest rates and domestic holdings (~95%) [15].
  Federal deficit ~3% of GDP (2025-2026); fiscal consolidation constrained by
  aging-related spending (pensions, healthcare) [15]. Food price inflation
  moderating from 2022-2024 peaks; supply chains normalized; energy price
  volatility persists [13]. Japanese yen weakness (vs. U.S. dollar) increases
  import costs; energy and commodity imports affected; pass-through to consumer
  prices moderate [15]. Oil and natural gas prices volatile; geopolitical risks
  (Middle East, Russia) create upside pressure; renewable energy transition
  accelerating but slowly [8].
economy_macroReality_fr: >-
  La croissance du PIB est prevue a 1-2% annuellement pour 2026-2027 ; en
  dessous de la moyenne historique (2-3%) en raison du declin demographique et
  des vents contraires mondiaux [6]. Le secteur manufacturier (25% du PIB) croit
  de 0-1% annuellement ; les exportations automobiles sont fortes mais font face
  a la pression de la transition vers les vehicules electriques ; le secteur des
  services croit de 1-2% annuellement [6] [7]. L'inflation est actuellement
  ~2,5% (cible : 2%) ; dans la zone de confort de la Banque du Japon ;
  normalisation progressive des taux en cours apres des decennies de taux
  ultra-bas [15]. Taux directeur de la Banque du Japon a 0,5% ; taux
  hypothecaires bas ; credit a la consommation bon marche [15]. Chomage
  actuellement ~2,4% ; marche du travail extremement tendu en raison du declin
  demographique [12]. Salaires reels stagnants depuis 2000 ; croissance des
  salaires nominaux en acceleration mais croissance des salaires reels prevue a
  0-1% annuellement [6] [9]. Dette publique/PIB ~250% ; la plus elevee parmi les
  economies avancees ; couts du service de la dette geres grace aux taux
  d'interet bas et aux avoirs nationaux (~95%) [15]. Deficit federal ~3% du PIB
  (2025-2026) ; consolidation fiscale contrainte par les depenses liees au
  vieillissement (retraites, soins de sante) [15].
economy_externalVulnerability_en: >-
  Exports: $800 billion annually (2025); concentrated in vehicles (20%),
  electronics (15%), machinery (12%), chemicals (8%), other (45%) [14]. Imports:
  $750 billion annually (2025); concentrated in energy (40%), minerals (15%),
  machinery (12%), chemicals (10%), other (23%) [14]. Trade balance: surplus of
  ~$50 billion annually; manufacturing exports offset by energy imports [14].
  Export concentration: vehicles heavily dependent on U.S. and EU markets (60%
  of vehicle exports); geopolitical tensions or tariffs could disrupt trade
  [14]. Debt holders: ~95% of government debt held domestically (Japanese banks,
  pension funds, insurance companies); ~5% held by foreign investors [15].
  Maturity wall: government debt maturity profile well-distributed; no acute
  refinancing crisis; average maturity ~7-8 years [15]. Japan not under IMF
  program; no external financing constraints; credit rating stable (A+/A1) [26].
  Rising interest rates increase debt servicing costs; fiscal consolidation
  necessary to stabilize debt trajectory [15]. Energy import dependency: 92% of
  energy imported; LNG from Australia (35%), Qatar (12%); oil from Saudi Arabia
  (35%), UAE (25%); coal from Australia (65%), Indonesia (20%) [8]. China trade:
  goods trade with China remains strong (~20% of Japan's total trade); services
  trade maintained; decoupling limited to sensitive technology sectors [14].
  Shipping routes: Japan dependent on international shipping; Strait of Malacca
  critical for energy imports; South China Sea tensions monitored [22].
economy_externalVulnerability_fr: >-
  Exportations : 800 milliards de dollars annuellement (2025) ; concentrees dans
  les vehicules (20%), l'electronique (15%), les machines (12%), les produits
  chimiques (8%), autres (45%) [14]. Importations : 750 milliards de dollars
  annuellement (2025) ; concentrees dans l'energie (40%), les mineraux (15%),
  les machines (12%), les produits chimiques (10%), autres (23%) [14]. Balance
  commerciale : excedent de ~50 milliards de dollars annuellement [14].
  Concentration des exportations : les vehicules dependent fortement des marches
  americain et europeen (60% des exportations de vehicules) ; les tensions
  geopolitiques ou les tarifs pourraient perturber le commerce [14]. Detenteurs
  de la dette : ~95% de la dette publique detenue au niveau national ; ~5%
  detenue par des investisseurs etrangers [15]. Profil d'echeance : bien
  distribue ; aucune crise de refinancement aigue ; echeance moyenne ~7-8 ans
  [15]. Le Japon n'est pas sous programme du FMI ; aucune contrainte de
  financement externe ; notation de credit stable (A+/A1) [26]. Dependance aux
  importations energetiques : 92% de l'energie importee ; GNL d'Australie (35%),
  du Qatar (12%) ; petrole d'Arabie saoudite (35%), des EAU (25%) ; charbon
  d'Australie (65%), d'Indonesie (20%) [8]. Commerce avec la Chine : le commerce
  de biens avec la Chine reste fort (~20% du commerce total du Japon) ; le
  decouplage limite aux secteurs technologiques sensibles [14]. Routes maritimes
  : le Japon depend du transport maritime international ; le detroit de Malacca
  est essentiel pour les importations energetiques ; les tensions en mer de
  Chine meridionale sont surveillees [22].
economy_politicalEconomy_en: >-
  Who benefits: automotive sector (Toyota, Honda, Nissan) benefits from global
  demand and yen weakness; electronics sector (Sony, Panasonic, Toshiba)
  benefits from semiconductor demand; large corporations (Nikkei 225) benefit
  from current model; SMEs face labor shortages and cost pressures [6] [25].
  Tokyo metropolitan area concentrates economic activity; rural regions face
  depopulation and economic decline; regional disparities widening [9].
  Corporate structure: large conglomerates (keiretsu) historically dominant;
  cross-shareholding declining; foreign ownership increasing; no single family
  or oligarchic dominance [25]. Technical needs: labor market reform
  (immigration, women's participation); fiscal consolidation; energy transition;
  digital transformation; defense spending increase [6] [12]. Political
  possibility: immigration reform politically sensitive; fiscal consolidation
  difficult with aging-related spending; energy transition supported but nuclear
  restart contested; defense spending increase gaining political support [2].
  Labor market: tight labor market due to demographic decline; wage pressures
  rising; labor unions moderate; public sector unions active but cooperative
  [5]. Tax policy: corporate tax rate 23.2% (2026); consumption tax 10%;
  progressive income tax; no major tax reform planned [15]. Social contract:
  universal healthcare, national pension system, unemployment insurance;
  sustainability concerns as population ages; pension reform politically
  difficult [9] [12].
economy_politicalEconomy_fr: >-
  Qui en beneficie : le secteur automobile (Toyota, Honda, Nissan) beneficie de
  la demande mondiale et de la faiblesse du yen ; le secteur electronique (Sony,
  Panasonic, Toshiba) beneficie de la demande de semi-conducteurs ; les grandes
  entreprises (Nikkei 225) beneficient du modele actuel ; les PME font face a
  des penuries de main-d'oeuvre et des pressions sur les couts [6] [25]. La
  region metropolitaine de Tokyo concentre l'activite economique ; les regions
  rurales font face a la depopulation et au declin economique ; les disparites
  regionales s'elargissent [9]. Structure d'entreprise : les grands conglomerats
  (keiretsu) historiquement dominants ; les participations croisees en declin ;
  la propriete etrangere en augmentation ; aucune dominance familiale ou
  oligarchique [25]. Besoins techniques : reforme du marche du travail
  (immigration, participation des femmes) ; consolidation fiscale ; transition
  energetique ; transformation numerique ; augmentation des depenses de defense
  [6] [12]. Possibilite politique : la reforme de l'immigration est
  politiquement sensible ; la consolidation fiscale est difficile avec les
  depenses liees au vieillissement ; la transition energetique est soutenue mais
  le redemarrage nucleaire est conteste ; l'augmentation des depenses de defense
  gagne un soutien politique [2]. Marche du travail : marche du travail tendu en
  raison du declin demographique ; pressions salariales en hausse ; syndicats
  moderes ; syndicats du secteur public actifs mais cooperatifs [5]. Politique
  fiscale : taux d'imposition des societes 23,2% (2026) ; taxe a la consommation
  10% ; impot sur le revenu progressif ; aucune reforme fiscale majeure prevue
  [15]. Contrat social : couverture maladie universelle, systeme de retraite
  national, assurance chomage ; preoccupations de durabilite a mesure que la
  population vieillit ; la reforme des retraites est politiquement difficile [9]
  [12].
security_internal_en: >-
  Internal violence very low; terrorism risk minimal; no active insurgency or
  armed groups challenging state authority [17]. Organized crime: yakuza
  (organized crime syndicates) historically present but declining membership
  under police enforcement; not destabilizing [17]. Police forces: 300,000
  officers; professional; no evidence of politicization or corruption [18].
  Cybersecurity: state-sponsored hacking from China, Russia targeting critical
  infrastructure; financial sector, power grid, telecommunications at risk;
  National Center of Incident Readiness and Strategy for Cybersecurity (NISC)
  coordinates response [20]. Natural disaster vulnerability: Japan highly
  vulnerable to earthquakes, tsunamis, typhoons; disaster preparedness strong
  but catastrophic events could trigger economic disruption [27]. Self-Defence
  Forces (247,000 active personnel) operationally capable; modern equipment;
  professional training; defense spending $50 billion annually (1.3% of GDP),
  increasing toward 2% target [18] [28]. Intelligence services: PSIA operates
  domestically; DIH operates internationally; credible threat assessment
  capacity; Five Eyes cooperation expanding [18]. Border security: island nation
  provides natural protection; Coast Guard active; immigration enforcement
  functional [19]. Nuclear weapons: Japan does NOT possess nuclear weapons;
  Article 9 of Constitution limits military to self-defense; hosts U.S. nuclear
  umbrella through alliance [3]. Missile defense: Aegis destroyers, PAC-3
  systems; capable of intercepting North Korean ballistic missiles [18].
security_internal_fr: >-
  Violence interne tres faible ; risque de terrorisme minimal ; aucune
  insurrection active ni groupe arme contestant l'autorite de l'Etat [17]. Crime
  organise : les yakuza (syndicats du crime organise) historiquement presents
  mais en declin sous l'application policiere ; non destabilisants [17]. Forces
  de police : 300 000 agents ; professionnelles ; aucune preuve de politisation
  ou de corruption [18]. Cybersecurite : piratage informatique parraine par des
  Etats (Chine, Russie) ciblant les infrastructures critiques ; secteur
  financier, reseau electrique, telecommunications a risque ; le Centre national
  de preparation et de strategie pour la cybersecurite (NISC) coordonne la
  reponse [20]. Vulnerabilite aux catastrophes naturelles : le Japon est tres
  vulnerable aux tremblements de terre, tsunamis, typhons ; la preparation aux
  catastrophes est forte mais des evenements catastrophiques pourraient
  declencher une perturbation economique [27]. Forces d'autodefense (247 000
  personnels actifs) operationnellement capables ; equipement moderne ;
  formation professionnelle ; depenses de defense de 50 milliards de dollars
  annuellement (1,3% du PIB), en augmentation vers l'objectif de 2% [18] [28].
  Services de renseignement : la PSIA opere au niveau national ; le DIH opere au
  niveau international ; capacite d'evaluation des menaces credible ;
  cooperation Five Eyes en expansion [18]. Securite frontaliere : la nature
  insulaire offre une protection naturelle ; garde-cotes actifs ; controle de
  l'immigration fonctionnel [19]. Armes nucleaires : le Japon ne possede PAS
  d'armes nucleaires ; l'Article 9 de la Constitution limite les forces armees a
  l'autodefense ; beneficie du parapluie nucleaire americain par l'alliance [3].
  Defense antimissile : destroyers Aegis, systemes PAC-3 ; capables
  d'intercepter les missiles balistiques nord-coreens [18].
security_diplomacy_en: >-
  Treaty allies: U.S.-Japan Security Treaty (1960); U.S. military bases in Japan
  (Okinawa, Yokosuka, Misawa); 54,000 U.S. troops stationed in Japan; defense
  cooperation, technology sharing, security guarantees [16]. Quad partnership:
  strategic partnership with U.S., India, Australia to counter China; maritime
  security, technology cooperation, supply chain resilience [16] [22]. China
  hedging: trade interdependence (~20% of trade); tensions over Taiwan, Senkaku
  Islands, historical issues; no military confrontation but strategic rivalry
  intensifying [10]. South Korea: cooperative but tense; historical grievances
  (comfort women, forced labor); trade relationships; military cooperation on
  North Korea through U.S. mediation [21]. Russia: adversarial; sanctions on
  Russia over Ukraine; Northern Territories/Kuril Islands dispute unresolved;
  limited economic cooperation [10]. ASEAN: strategic partnerships with Vietnam,
  Thailand, Indonesia, Philippines; infrastructure investment; trade
  relationships; China containment strategy [22]. NATO: not a member but
  participates as Indo-Pacific partner; contributes to Ukraine support;
  cybersecurity cooperation [16]. CPTPP: member of Comprehensive and Progressive
  Agreement for Trans-Pacific Partnership; trade diversification away from China
  dependence [22]. Red lines: Taiwan contingency (Japan would face pressure to
  support U.S. response); Senkaku Islands sovereignty; North Korean
  nuclear/missile threats; Article 9 constitutional revision debate ongoing [3]
  [10].
security_diplomacy_fr: >-
  Allies par traite : Traite de securite americano-japonais (1960) ; bases
  militaires americaines au Japon (Okinawa, Yokosuka, Misawa) ; 54 000 soldats
  americains stationnes au Japon ; cooperation en matiere de defense, partage
  technologique, garanties de securite [16]. Partenariat Quad : partenariat
  strategique avec les Etats-Unis, l'Inde, l'Australie pour contrer la Chine ;
  securite maritime, cooperation technologique, resilience des chaines
  d'approvisionnement [16] [22]. Couverture contre la Chine : interdependance
  commerciale (~20% du commerce) ; tensions sur Taiwan, les iles Senkaku, les
  questions historiques ; pas de confrontation militaire mais rivalite
  strategique s'intensifiant [10]. Coree du Sud : cooperative mais tendue ;
  griefs historiques (femmes de reconfort, travail force) ; relations
  commerciales ; cooperation militaire sur la Coree du Nord par la mediation
  americaine [21]. Russie : adversaire ; sanctions contre la Russie pour
  l'Ukraine ; differend des Territoires du Nord/iles Kouriles non resolu ;
  cooperation economique limitee [10]. ASEAN : partenariats strategiques avec le
  Vietnam, la Thailande, l'Indonesie, les Philippines ; investissement en
  infrastructure ; relations commerciales ; strategie de containment de la Chine
  [22]. OTAN : pas membre mais participe en tant que partenaire indo-pacifique ;
  contribue au soutien a l'Ukraine ; cooperation en cybersecurite [16]. PTPGP :
  membre de l'Accord de partenariat transpacifique global et progressiste ;
  diversification commerciale loin de la dependance a la Chine [22]. Lignes
  rouges : contingence de Taiwan (le Japon ferait face a des pressions pour
  soutenir la reponse americaine) ; souverainete des iles Senkaku ; menaces
  nucleaires/missiles nord-coreennes ; debat en cours sur la revision
  constitutionnelle de l'Article 9 [3] [10].
