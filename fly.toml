# Fly.io configuration for Astro + Node.js
app = "transhorizons-astro"
primary_region = "iad"

[build]
builder = "paketobuildpacks"

[env]
NODE_ENV = "production"

[[services]]
internal_port = 3000
protocol = "tcp"

[services.concurrency]
type = "connections"
hard_limit = 25
soft_limit = 20

[[services.ports]]
port = 80
handlers = ["http"]
force_https = true

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[checks]
[checks.http_check]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/health"
protocol = "http"
timeout = "5s"
type = "http"
port = 3000
