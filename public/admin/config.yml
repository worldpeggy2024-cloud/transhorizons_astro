backend:
  name: git-gateway

local_backend: true

media_folder: public/images
public_folder: /images

collections:
  - name: articles
    label: Articles
    label_singular: Article
    folder: content/articles
    create: true
    identifier_field: title
    format: yaml
    extension: yaml
    fields:
      - { name: title,        label: Title,          widget: string }
      - { name: subtitle,     label: Subtitle,       widget: string }
      - { name: category,     label: Category,       widget: string }
      - { name: readTime,     label: Read Time,      widget: string }
      - { name: heroImage,    label: Hero Image URL, widget: string }
      - { name: date,         label: Date,           widget: string }
      - { name: introductionTitle, label: Introduction Title, widget: string, required: false }
      - { name: introduction, label: Introduction,   widget: text }
      - name: sections
        label: Sections
        widget: list
        fields:
          - { name: title,         label: Section Title,   widget: string }
          - { name: content,       label: Content,         widget: text }
          - { name: image,         label: Image URL,       widget: string, required: false }
          - name: imagePosition
            label: Image Position
            widget: select
            options: [left, right]
            required: false
      - name: keyTakeaways
        label: Key Takeaways
        widget: list
        fields:
          - { name: title,       label: Title,       widget: string }
          - { name: description, label: Description, widget: text }
      - name: relatedProjects
        label: Related Projects
        widget: list
        fields:
          - { name: id,       label: Slug ID,  widget: string }
          - { name: title,    label: Title,    widget: string }
          - { name: category, label: Category, widget: string }
